// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê CALENDAR ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function Cal({toast,events,setEvents,org,t}){
  const[year,setYear]=useState(new Date().getFullYear());const[month,setMonth]=useState(new Date().getMonth());
  const[view,setView]=useState('month');
  const[filter,setFilter]=useState('all');const[modal,setModal]=useState(null);const[hover,setHover]=useState(null);
  const months=t('months');const monthsShort=t('monthsShort');const ds=t('days');
  const today=new Date();
  const chList=org.channels.length?org.channels:[{name:'Muu',color:'#8b95a8',ic:'--'}];
  const getColor=(chName)=>{const ch=chList.find(c=>c.name===chName);return ch?ch.color:'#8b95a8'};
  const defaultCh=chList[0]?.name||'Muu';

  // Events for a given month/year, optionally filtered
  const getMonthEvents=(m,y)=>{let evs=events.filter(e=>(e.month===undefined&&m===3&&y===2025)||(e.month===m&&e.year===y));if(filter!=='all')evs=evs.filter(e=>e.ch===filter);return evs};
  const getYearEvents=(y)=>events.filter(e=>(e.year===y)||(e.month===undefined&&y===2025));
  const monthEvents=getMonthEvents(month,year);

  // Month grid
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const prevDays=new Date(year,month,0).getDate();
  const cs=[];
  for(let i=firstDay-1;i>=0;i--)cs.push({n:prevDays-i,o:true});
  for(let d=1;d<=daysInMonth;d++)cs.push({n:d,o:false,tod:today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d});
  const rm=7-cs.length%7;if(rm<7)for(let i=1;i<=rm;i++)cs.push({n:i,o:true});

  const prev=()=>{if(view==='year')setYear(y=>y-1);else if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)};
  const next=()=>{if(view==='year')setYear(y=>y+1);else if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)};
  const goMonth=(m)=>{setMonth(m);setView('month')};

  const openNew=(day)=>setModal({t:'',ch:defaultCh,day,month,year});
  const saveEv=()=>{if(!modal.t.trim())return;setEvents(p=>[...p,{day:modal.day,month:modal.month,year:modal.year,t:modal.t,co:getColor(modal.ch),ch:modal.ch}]);toast('Julkaisu lis√§tty!','success');setModal(null)};
  const delEv=(idx)=>{setEvents(p=>p.filter((_,i)=>i!==idx));toast('Poistettu','info')};

  // ‚îÄ‚îÄ YEAR CLOCK (SVG) ‚îÄ‚îÄ
  const YearClock=()=>{
    const cx=140,cy=140,outerR=130,innerR=50;const yearEvs=getYearEvents(year);
    const chNames=[...new Set(yearEvs.map(e=>e.ch))];if(!chNames.length&&!chList.length)return null;
    const usedChs=chList.filter(c=>chNames.includes(c.name));if(!usedChs.length&&chNames.length)usedChs.push({name:chNames[0],color:'#8b95a8'});
    const bandW=usedChs.length?(outerR-innerR)/Math.max(usedChs.length,1):outerR-innerR;
    const sectorAngle=Math.PI*2/12;

    const polarToCart=(cx,cy,r,angle)=>({x:cx+r*Math.cos(angle-Math.PI/2),y:cy+r*Math.sin(angle-Math.PI/2)});
    const arcPath=(cx,cy,r1,r2,a1,a2)=>{const s1=polarToCart(cx,cy,r1,a1),e1=polarToCart(cx,cy,r1,a2),s2=polarToCart(cx,cy,r2,a2),e2=polarToCart(cx,cy,r2,a1);const large=a2-a1>Math.PI?1:0;return`M${s1.x},${s1.y} A${r1},${r1} 0 ${large} 1 ${e1.x},${e1.y} L${s2.x},${s2.y} A${r2},${r2} 0 ${large} 0 ${e2.x},${e2.y} Z`};

    return(<div className="clock-wrap"><div style={{position:'relative'}}>
      <svg width={cx*2} height={cy*2} viewBox={`0 0 ${cx*2} ${cy*2}`}>
        {/* Grid lines */}
        {Array.from({length:12}).map((_,mi)=>{const a=mi*sectorAngle;const p1=polarToCart(cx,cy,innerR-2,a);const p2=polarToCart(cx,cy,outerR+2,a);
          return<line key={mi} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="var(--border)" strokeWidth="0.5"/>})}
        {/* Sectors per channel */}
        {Array.from({length:12}).map((_,mi)=>{const a1=mi*sectorAngle+0.02;const a2=(mi+1)*sectorAngle-0.02;
          const mEvs=yearEvs.filter(e=>(e.month===mi)||(e.month===undefined&&mi===3));
          return usedChs.map((ch,ci)=>{const count=mEvs.filter(e=>e.ch===ch.name).length;if(!count)return null;
            const r1=innerR+ci*bandW;const r2=Math.min(r1+bandW*Math.min(count,5)/5,outerR);
            return<path key={`${mi}-${ci}`} d={arcPath(cx,cy,r1+1,r2,a1,a2)} fill={ch.color} opacity={0.7}
              style={{cursor:'pointer',transition:'opacity .15s'}}
              onMouseEnter={()=>setHover({m:mi,ch:ch.name,count})} onMouseLeave={()=>setHover(null)}
              onClick={()=>goMonth(mi)}/>})
        })}
        {/* Month labels */}
        {Array.from({length:12}).map((_,mi)=>{const a=mi*sectorAngle+sectorAngle/2;const p=polarToCart(cx,cy,outerR+14,a);
          return<text key={mi} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
            style={{fontSize:'.55rem',fill:'var(--t3)',fontWeight:600,fontFamily:'var(--font)',cursor:'pointer'}} onClick={()=>goMonth(mi)}>{monthsShort[mi]}</text>})}
        {/* Center */}
        <circle cx={cx} cy={cy} r={innerR-2} fill="var(--card)"/>
        <text x={cx} y={cy-8} textAnchor="middle" style={{fontSize:'1.4rem',fill:'var(--t1)',fontWeight:800,fontFamily:'var(--font)'}}>{year}</text>
        <text x={cx} y={cy+12} textAnchor="middle" style={{fontSize:'.6rem',fill:'var(--t3)',fontWeight:600,fontFamily:'var(--font)'}}>{yearEvs.length} julkaisua</text>
      </svg>
      {hover&&<div className="clock-hover" style={{top:60,left:cx+30}}><strong>{monthsShort[hover.m]}</strong>: {hover.count} {hover.ch}</div>}
    </div>
    <div className="clock-legend">{chList.map((c,i)=><div key={i} className="clock-leg-item"><div className="clock-leg-dot" style={{background:c.color}}/>{c.name}</div>)}
      <div style={{marginTop:'.75rem',fontSize:'.68rem',color:'var(--t3)',fontWeight:500}}>{t('clickMonthToOpen')}</div>
    </div></div>)};

  // ‚îÄ‚îÄ CHANNEL FILTERS ‚îÄ‚îÄ
  const FilterBar=()=><div className="cal-filters">
    <button className={`cal-ch-btn ${filter==='all'?'act':''}`} style={filter==='all'?{background:'var(--pri)',borderColor:'var(--pri)',color:'#fff'}:{}} onClick={()=>setFilter('all')}>{t('all')}</button>
    {chList.map(c=><button key={c.name} className={`cal-ch-btn ${filter===c.name?'act':''}`}
      style={filter===c.name?{background:c.color,borderColor:c.color,color:'#fff'}:{borderColor:c.color+'40',color:c.color}} onClick={()=>setFilter(filter===c.name?'all':c.name)}>{c.name}</button>)}
  </div>;

  return(<div className="page-enter">
    <div className="cal-h"><h2>{view==='month'?months[month]+' '+year:year}</h2>
      <div style={{display:'flex',gap:'.75rem',alignItems:'center'}}>
        <div className="cal-views"><button className={`cal-view-btn ${view==='month'?'act':''}`} onClick={()=>setView('month')}>{t('month')}</button><button className={`cal-view-btn ${view==='year'?'act':''}`} onClick={()=>setView('year')}>{t('year')}</button></div>
        <div style={{display:'flex',gap:'.35rem'}}><button className="btn btn-secondary btn-sm" onClick={prev}>{'\u2190'}</button><button className="btn btn-secondary btn-sm" onClick={()=>{setMonth(today.getMonth());setYear(today.getFullYear())}}>{t('today')}</button><button className="btn btn-secondary btn-sm" onClick={next}>{'\u2192'}</button></div>
      </div></div>

    <FilterBar/>

    {view==='month'&&<>
      <div className="cal-grid">{ds.map(d=><div key={d} className="cal-dh">{d}</div>)}{cs.map((c,i)=>{const evs=c.o?[]:monthEvents.filter(e=>e.day===c.n);return<div key={i} className={`cal-d ${c.o?'oth':''} ${c.tod?'tod':''}`} onClick={()=>!c.o&&openNew(c.n)} style={{cursor:c.o?'default':'pointer'}}><div className="cal-dn">{c.n}</div>{evs.map((e,j)=>{const co=getColor(e.ch);return<div key={j} className="cal-ev" style={{background:co+'28',color:co,borderLeft:`2px solid ${co}`}} onClick={ev=>{ev.stopPropagation();toast(e.t+' ('+e.ch+')','info')}}>{e.t}</div>})}</div>})}</div>
    </>}

    {view==='year'&&<>
      <YearClock/>
      <div className="yr-grid">{Array.from({length:12}).map((_,mi)=>{const mEvs=getMonthEvents(mi,year);const isTod=today.getFullYear()===year&&today.getMonth()===mi;
        return<div key={mi} className={`yr-cell ${isTod?'tod':''}`} onClick={()=>goMonth(mi)}>
          <h4>{monthsShort[mi]}</h4>
          {mEvs.length>0?<><div className="yr-cell-dots">{mEvs.slice(0,20).map((e,j)=><div key={j} className="yr-dot" style={{background:getColor(e.ch)}}/>)}</div>
            <div className="yr-cell-count">{mEvs.length} {mEvs.length===1?t('publication'):t('publications_plural')}</div></>
          :<div className="yr-cell-count">{t('noPublications')}</div>}
        </div>})}</div>
    </>}

    {modal&&<div className="modal-ov" onClick={()=>setModal(null)}><div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h"><h3>{t('addPublication')} ‚Äî {modal.day}.{modal.month+1}.{modal.year}</h3><button className="modal-x" onClick={()=>setModal(null)}>{'\u2715'}</button></div>
      <div className="modal-b">
        <div className="field"><label>{t('publicationName')}</label><input className="input" value={modal.t} onChange={e=>setModal(p=>({...p,t:e.target.value}))} placeholder={t('publicationNamePh')}/></div>
        <div className="field"><label>{t('channel')}</label><select className="input" value={modal.ch} onChange={e=>setModal(p=>({...p,ch:e.target.value}))}>
          {chList.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}</select></div>
      </div>
      <div className="modal-f"><button className="btn btn-secondary" onClick={()=>setModal(null)}>{t('cancel')}</button><button className="btn btn-primary" onClick={saveEv} disabled={!modal.t.trim()}>{t('add')}</button></div>
    </div></div>}
  </div>);}


// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê STRATEGY ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function Strat({toast,org,setOrg,t,chStats}){
  const[exp,sE]=useState(['goals','brand','aud','tone','channels','upload','team']);
  const fileRef=useRef(null);const[uploading,setUploading]=useState(false);
  const[parseResults,setParseResults]=useState(null);const[selParsed,setSelParsed]=useState({});

  const handleFile=async(file)=>{setUploading(true);try{
    const text=await readFileAsText(file);
    if(!text){toast('Tiedostotyyppia ei tueta','info');setUploading(false);return}
    setOrg(p=>({...p,strategyText:text,strategyFileName:file.name}));
    await wait(1500);// simulate analysis
    const parsed=parseStrategyText(text);
    if(parsed.goals.length||parsed.auds.length||parsed.vals.length||parsed.tone.length){
      setParseResults(parsed);
      // pre-select all
      const sel={};parsed.goals.forEach((_,i)=>sel['goals'+i]=true);parsed.auds.forEach((_,i)=>sel['auds'+i]=true);
      parsed.vals.forEach((_,i)=>sel['vals'+i]=true);parsed.tone.forEach((_,i)=>sel['tone'+i]=true);
      setSelParsed(sel);toast(t('documentLoaded'),'success')
    } else {setOrg(p=>({...p,strategyText:text,strategyFileName:file.name}));toast(t('documentLoaded'),'success')}
  }catch(e){toast('Virhe: '+e.message,'info')}setUploading(false)};

  const applyParsed=()=>{if(!parseResults)return;
    const newGoals=parseResults.goals.filter((_,i)=>selParsed['goals'+i]);
    const newAuds=parseResults.auds.filter((_,i)=>selParsed['auds'+i]);
    const newVals=parseResults.vals.filter((_,i)=>selParsed['vals'+i]);
    const newTones=parseResults.tone.filter((_,i)=>selParsed['tone'+i]);
    setOrg(p=>({...p,goals:[...p.goals,...newGoals],auds:[...p.auds,...newAuds],vals:[...p.vals,...newVals],tone:[...new Set([...p.tone,...newTones])]}));
    setParseResults(null);setSelParsed({});toast(t('added'),'success')};
  const[modal,setM]=useState(null); // null | 'goal' | 'aud' | 'val' | 'tone'
  const[editIdx,setEditIdx]=useState(-1); // -1 = new
  // edit fields
  const[fm,setFm]=useState('');const[ft,setFt]=useState('');const[fd,setFd]=useState('');const[fi,setFi]=useState('');const[fc,setFc]=useState([]);
  const[toneInput,setTI]=useState('');
  const tog=s=>sE(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  const openAdd=(type)=>{setM(type);setEditIdx(-1);setFm('');setFt('');setFd('');setFi('');setFc([])};
  const openEdit=(type,idx)=>{setM(type);setEditIdx(idx);
    if(type==='goal'){const g=org.goals[idx];setFm(g.m);setFt(g.t);setFd(g.d||'')}
    else if(type==='aud'){const a=org.auds[idx];setFt(a.n);setFd(a.d||'');setFc(a.c||[])}
    else if(type==='val'){const v=org.vals[idx];setFi(v.i);setFt(v.t);setFd(v.d||'')}};

  const saveItem=()=>{if(!ft.trim())return;
    if(modal==='goal'){const item={m:fm||'\u2014',t:ft,d:fd,p:0};
      setOrg(p=>({...p,goals:editIdx===-1?[...p.goals,item]:p.goals.map((g,i)=>i===editIdx?item:g)}))}
    else if(modal==='aud'){const item={n:ft,d:fd,c:fc.length?fc:['Some']};
      setOrg(p=>({...p,auds:editIdx===-1?[...p.auds,item]:p.auds.map((a,i)=>i===editIdx?item:a)}))}
    else if(modal==='val'){const item={i:fi||ft[0]?.toUpperCase()||'*',t:ft,d:fd};
      setOrg(p=>({...p,vals:editIdx===-1?[...p.vals,item]:p.vals.map((v,i)=>i===editIdx?item:v)}))}
    setM(null);toast(editIdx===-1?'Lis√§tty!':'P√§ivitetty!','success')};

  const delItem=(type,idx)=>{
    if(type==='goal')setOrg(p=>({...p,goals:p.goals.filter((_,i)=>i!==idx)}));
    else if(type==='aud')setOrg(p=>({...p,auds:p.auds.filter((_,i)=>i!==idx)}));
    else if(type==='val')setOrg(p=>({...p,vals:p.vals.filter((_,i)=>i!==idx)}));
    toast('Poistettu','info')};

  const addTone=()=>{if(toneInput.trim()&&!org.tone.includes(toneInput.trim())){setOrg(p=>({...p,tone:[...p.tone,toneInput.trim()]}));setTI('')}};
  const rmTone=(idx)=>setOrg(p=>({...p,tone:p.tone.filter((_,i)=>i!==idx)}));
  const chOpts=org.channels.length?org.channels.map(c=>c.name):['Instagram','Facebook','TikTok','LinkedIn'];
  // Channel management
  const[newChName,setNewChName]=useState('');const[newChColor,setNewChColor]=useState('#9b7cf6');const[showChColors,setShowChColors]=useState(null);
  const addCh=()=>{if(newChName.trim()&&!org.channels.find(c=>c.name===newChName)){setOrg(p=>({...p,channels:[...p.channels,{name:newChName,color:newChColor,ic:'+'}]}));setNewChName('');toast('Kanava lis√§tty!','success')}};
  const rmCh=(name)=>setOrg(p=>({...p,channels:p.channels.filter(c=>c.name!==name)}));
  const setChColor=(name,color)=>setOrg(p=>({...p,channels:p.channels.map(c=>c.name===name?{...c,color}:c)}));

  const modalTitle={goal:editIdx===-1?t('addGoal'):t('editGoal'),aud:editIdx===-1?t('addAudience'):t('editAudience'),val:editIdx===-1?t('addValue'):t('editValue')};

  // Strategy completeness
  const stratItems=[
    {k:'goals',l:t('goals'),n:org.goals.length,c:'var(--green)',sec:'goals'},
    {k:'auds',l:t('audiences'),n:org.auds.length,c:'var(--pri-l)',sec:'aud'},
    {k:'vals',l:t('brandValues'),n:org.vals.length,c:'var(--purple)',sec:'brand'},
    {k:'tone',l:t('tones'),n:org.tone.length,c:'var(--yellow)',sec:'tone'},
    {k:'chs',l:t('channels'),n:org.channels.length,c:'var(--cyan)',sec:'channels'},
    {k:'team',l:t('teamMembers'),n:(org.team||[]).length,c:'var(--pink)',sec:'team'}];

    <div className="strat-hero"><div className="ob"><span>{org.s||org.name}</span><span style={{opacity:.7}}>{t('strategy')}</span></div><h2>{org.name||t('organization')}</h2>{org.slogan&&<div style={{fontSize:'1rem',opacity:.9,marginBottom:'.75rem',fontWeight:500}}>"{org.slogan}"</div>}<p style={{fontSize:'.9rem',opacity:.8,lineHeight:1.7,fontWeight:500}}>{t('strategyGuides')}</p>
      {/* Inline completeness */}
      <div style={{marginTop:'1rem',display:'flex',gap:'.5rem',flexWrap:'wrap'}}>{stratItems.map(s=><span key={s.k} onClick={()=>{if(!exp.includes(s.sec))sE(p=>[...p,s.sec])}} style={{padding:'.3rem .7rem',borderRadius:9999,fontSize:'.68rem',fontWeight:700,cursor:'pointer',background:s.n>0?s.c+'18':'rgba(255,255,255,.08)',color:s.n>0?s.c:'rgba(255,255,255,.4)',border:`1px solid ${s.n>0?s.c+'30':'rgba(255,255,255,.08)'}`}}>{s.n>0?'\u2713':'\u25cb'} {s.l} {s.n>0?`(${s.n})`:''}</span>)}</div>
    </div>

    {/* PDF Upload */}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê CHAT ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function Chat({toast,org,t,chStats,orgCtx,events,prj,onClose}){const nm=org.s||org.name||t('organization');
  const[msgs,setM]=useState([{r:'assistant',c:`Hei! ${org.name?'Tunnen '+nm+':n strategian, kanavat, kampanjat ja viestinn√§n kontekstin.':'Strategiaa ei ole viel√§ syotetty.'}\n\nKysy tavoitteista, kohderyhmista, julkaisuista, projekteista, br√§ndista tai sis√§lt√∂ideoista!`}]);const[inp,setI]=useState('');const[ty,setTy]=useState(false);const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:'smooth'})},[msgs]);
  const send=async()=>{if(!inp.trim())return;const m=inp.trim();setI('');setM(p=>[...p,{r:'user',c:m}]);setTy(true);await wait(700+Math.random()*500);setTy(false);setM(p=>[...p,{r:'assistant',c:genChat(m,org,chStats,orgCtx,events,prj)}])};
  return(<div className="ai-chat"><div className="ai-chat-h"><div className="ava" style={{width:34,height:34,fontSize:'.72rem'}}>AI</div><div style={{flex:1}}><h3 style={{fontSize:'.85rem',fontWeight:700}}>AI-kumppani</h3><p style={{fontSize:'.65rem',color:'var(--t3)',fontWeight:500}}>{nm} ‚Äî viestinn√§n konteksti</p></div>{onClose&&<button style={{background:'none',border:'none',color:'var(--t3)',fontSize:'1.1rem',cursor:'pointer',padding:'.25rem'}} onClick={onClose}>{'\u2715'}</button>}</div>
  <div className="ai-chat-msgs">{msgs.map((m,i)=><div key={i} className={`ai-bub ${m.r}`}><div className="ai-av">{m.r==='assistant'?'AI':'ME'}</div><div className="ai-bub-c">{m.c.split('\n').map((l,j)=>l?<p key={j}>{l}</p>:<br key={j}/>)}</div></div>)}{ty&&<div className="ai-bub assistant"><div className="ai-av">AI</div><div className="ai-bub-c"><div className="typing"><span/><span/><span/></div></div></div>}<div ref={ref}/></div>
  <div className="ai-chat-sugs">{(orgCtx?.program?['Seuraajat?','Ohjelmisto?','Kampanjat?','Kumppanit?','Br√§ndi?','Meta-mainonta?','Tiimi?','Ideoita?']:['Seuraajat?','Julkaisut?','Kampanjat?','Projektit?','Br√§ndi?','Tiimi?','Tavoitteet?','Ideoita?']).map((s,i)=><button key={i} className="chat-sug" onClick={()=>setI(s)}>{s}</button>)}</div>
  <div className="ai-chat-in-area"><input className="chat-in" placeholder="Kysy strategiasta, julkaisuista, projekteista..." value={inp} onChange={e=>setI(e.target.value)} onKeyPress={e=>e.key==='Enter'&&send()}/><button className="chat-send" onClick={send} disabled={!inp.trim()}>{'\u2192'}</button></div></div>);}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê MEDIA BANK ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
// AI-powered keyword generator (simulated ‚Äî analyses filename, folder, known patterns)
const generateAIKeywords=(file)=>{
  const name=file.name.toLowerCase();const folder=file.folder;
  const kw=new Set();
  // From folder
  if(folder==='valokuvat'){kw.add('valokuva');kw.add('photo')}
  if(folder==='grafiikat'){kw.add('grafiikka');kw.add('somekuva')}
  if(folder==='logot'){kw.add('logo');kw.add('brandi')}
  if(folder==='videot'){kw.add('video')}
  // LLFF festival photos
  if(name.includes('lapinlahden-elokuvajuhlat')||name.includes('llff')){
    kw.add('LLFF');kw.add('festivaali');kw.add('elokuvajuhlat');kw.add('Lapinlahti');
    kw.add('elokuva');kw.add('kulttuuri');kw.add('Helsinki');
    const numMatch2=name.match(/elokuvajuhlat-(\d+)/);
    if(numMatch2){const n=parseInt(numMatch2[1]);
      if(n<=20){kw.add('tunnelma');kw.add('yleis√∂')}
      else if(n<=40){kw.add('n√§yt√∂s');kw.add('tapahtuma')}
      else if(n<=60){kw.add('yhteis√∂');kw.add('piha')}
      else{kw.add('ilta');kw.add('ulkoilma')}
    }
    return[...kw];
  }
  // VERTU event photos ‚Äî outdoor group/portrait photos from summer event
  if(name.includes('vertu')){kw.add('VERTU-tapahtuma');kw.add('vertaistuki');kw.add('tapahtuma');kw.add('henkil√∂kuvat');kw.add('kesa 2025')}
  // Photo number ranges might indicate different scenes
  const numMatch=name.match(/ab-(\d+)/);
  if(numMatch){
    const n=parseInt(numMatch[1]);
    if(n<100){kw.add('ryhmakuva');kw.add('ulkokuva')}
    else if(n<200){kw.add('sisatilat');kw.add('keskustelu')}
    else if(n<300){kw.add('muotokuva');kw.add('henkil√∂kuva')}
    else{kw.add('ryhmakuva');kw.add('poseeraus')}
  }
  // AVL grafiikat ‚Äî social media infographics about brain health
  if(folder==='grafiikat'){
    kw.add('aivovammaliitto');kw.add('aivoterveys');kw.add('some');kw.add('infografiikka');
    kw.add('Instagram');kw.add('Facebook');kw.add('tietoisuus');kw.add('kampanja');
    kw.add('aivovaurio');kw.add('AVH');kw.add('ennaltaehk√§isy')
  }
  if(folder==='valokuvat'){kw.add('aivovammaliitto');kw.add('vertaistuki');kw.add('yhteiso')}
  return[...kw];
};

function MediaBank({toast,t}){
  // Org-aware manifest: AVL uses MEDIA_MANIFEST, LEF uses LLFF_MEDIA_MANIFEST
  const manifestFiles=_activeOrg==='lef'?(window.LLFF_MEDIA_MANIFEST||[]):(window.MEDIA_MANIFEST||[]);
  const[meta,setMeta]=useOrgState('media_meta',{});// {id: {tags:[], desc:'', title:''}}
  const[uploadedFiles,setUploadedFiles]=useOrgState('media_uploaded',[]);// drag&drop files stored as small dataURLs
  const[dragging,setDragging]=useState(false);const dragCounter=useRef(0);
  const[cat,setCat]=useState('all');
  const[search,setSearch]=useState('');
  const[detailIdx,setDetailIdx]=useState(-1);// index in filtered list
  const[editingMeta,setEditingMeta]=useState(false);
  const[tagInput,setTagInput]=useState('');
  const[titleInput,setTitleInput]=useState('');
  const[descInput,setDescInput]=useState('');
  const fileRef=useRef(null);

  const categories=[
    {id:'all',label:'Kaikki',icon:'\u2588'},
    {id:'valokuvat',label:'Valokuvat',icon:'\u25a3'},
    {id:'grafiikat',label:'Grafiikat',icon:'\u25c6'},
    {id:'logot',label:'Logot',icon:'\u25c7'},
    {id:'videot',label:'Videot',icon:'\u25b7'},
    {id:'uploaded',label:'Ladatut',icon:'\u2191'}
  ];

  const formatSize=(bytes)=>{
    if(!bytes)return'';
    if(bytes<1024)return bytes+' B';
    if(bytes<1024*1024)return(bytes/1024).toFixed(1)+' KB';
    return(bytes/(1024*1024)).toFixed(1)+' MB';
  };

  // Get metadata for a file (or generate defaults)
  const getMeta=(id)=>{
    if(meta[id])return meta[id];
    const file=manifestFiles.find(f=>f.id===id)||uploadedFiles.find(f=>f.id===id);
    if(!file)return{tags:[],desc:'',title:''};
    const aiTags=generateAIKeywords(file);
    return{tags:aiTags,desc:'',title:''};
  };

  const saveMeta=(id,newMeta)=>{setMeta(p=>({...p,[id]:newMeta}))};

  // Combine manifest + uploaded into unified list
  const allFiles=[
    ...manifestFiles.map(f=>({...f,source:'manifest'})),
    ...uploadedFiles.map(f=>({...f,source:'uploaded',folder:'uploaded'}))
  ];

  // Filter by category
  const catFiltered=cat==='all'?allFiles:allFiles.filter(f=>f.folder===cat);

  // Filter by search (matches filename, tags, title, desc)
  const filtered=search.trim()?catFiltered.filter(f=>{
    const q=search.toLowerCase();
    const m=getMeta(f.id);
    return f.name.toLowerCase().includes(q)
      ||(m.title||'').toLowerCase().includes(q)
      ||(m.desc||'').toLowerCase().includes(q)
      ||(m.tags||[]).some(t=>t.toLowerCase().includes(q));
  }):catFiltered;

  const totalSize=allFiles.reduce((s,f)=>s+(f.size||0),0);

  // Upload handler (creates thumbnail dataURL for display)
  const handleUpload=async(fileList)=>{
    const newFiles=[];
    for(const file of fileList){
      const ext=file.name.split('.').pop().toLowerCase();
      const isImg=['jpg','jpeg','png','gif','webp','svg'].includes(ext);
      const isVid=['mp4','webm','mov'].includes(ext);
      // Create small thumbnail
      let thumbUrl=null;
      if(isImg){
        thumbUrl=await new Promise(res=>{
          const reader=new FileReader();
          reader.onload=e=>{
            const img=new Image();img.onload=()=>{
              const canvas=document.createElement('canvas');
              const maxW=300;const scale=Math.min(maxW/img.width,1);
              canvas.width=img.width*scale;canvas.height=img.height*scale;
              const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);
              res(canvas.toDataURL('image/jpeg',0.7));
            };img.src=e.target.result;
          };reader.readAsDataURL(file);
        });
      }
      const entry={
        id:'uploaded_'+Date.now()+'_'+Math.random().toString(36).slice(2),
        name:file.name,size:file.size,type:isImg?'image':isVid?'video':'other',
        ext,thumb:thumbUrl,path:null,folder:'uploaded',
        added:new Date().toISOString().slice(0,10)
      };
      newFiles.push(entry);
      // Auto-generate AI tags
      const aiTags=generateAIKeywords(entry);
      saveMeta(entry.id,{tags:aiTags,desc:'',title:''});
    }
    setUploadedFiles(p=>[...newFiles,...p]);
    toast(newFiles.length+' tiedostoa lis√§tty','success');

  // Detail navigation
  const detail=detailIdx>=0&&detailIdx<filtered.length?filtered[detailIdx]:null;

  const goPrev=()=>{if(detailIdx>0)setDetailIdx(detailIdx-1)};
  const openDetail=(idx)=>{setDetailIdx(idx);setEditingMeta(false)};
  const closeDetail=()=>{setDetailIdx(-1);setEditingMeta(false)};

  // Start editing metadata
  const startEdit=()=>{
    if(!detail)return;
    const m=getMeta(detail.id);
    setTitleInput(m.title||'');setDescInput(m.desc||'');setTagInput('');
    setEditingMeta(true);
  };
  const saveEdit=()=>{
    if(!detail)return;
    const m=getMeta(detail.id);
    saveMeta(detail.id,{...m,title:titleInput,desc:descInput});

  const addTag=(tag)=>{
    if(!detail||!tag.trim())return;
    const m=getMeta(detail.id);
    if(!m.tags.includes(tag.trim())){
      saveMeta(detail.id,{...m,tags:[...m.tags,tag.trim()]});

    setTagInput('');
  };
  const removeTag=(tag)=>{

    saveMeta(detail.id,{...m,tags:m.tags.filter(t=>t!==tag)});
  };

  // Keyboard navigation in detail view
  useEffect(()=>{
    if(detailIdx<0)return;
    const handler=(e)=>{
      if(e.key==='ArrowRight'||e.key==='ArrowDown')goNext();
      else if(e.key==='ArrowLeft'||e.key==='ArrowUp')goPrev();
      else if(e.key==='Escape')closeDetail();

  // Touch swipe navigation for mobile

    const onStart=(e)=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY};
    const onEnd=(e)=>{
      const dx=e.changedTouches[0].clientX-startX;
      const dy=e.changedTouches[0].clientY-startY;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
        if(dx<0)goNext();else goPrev();
      }
    };
    document.addEventListener('touchstart',onStart,{passive:true});
    document.addEventListener('touchend',onEnd,{passive:true});
    return()=>{document.removeEventListener('touchstart',onStart);document.removeEventListener('touchend',onEnd)};
  },[detailIdx,filtered.length]);

  // Collect all unique tags for tag cloud
  const allTags=[...new Set(allFiles.flatMap(f=>(getMeta(f.id).tags||[])))].sort();

  // Delete uploaded file
  const deleteUploaded=(id)=>{
    setUploadedFiles(p=>p.filter(f=>f.id!==id));
    setMeta(p=>{const n={...p};delete n[id];return n});
    if(detail&&detail.id===id)closeDetail();
    toast('Tiedosto poistettu','success');
  };

  // Drag & drop handlers
  const onDragEnter=(e)=>{e.preventDefault();e.stopPropagation();dragCounter.current++;if(dragCounter.current===1)setDragging(true)};
  const onDragLeave=(e)=>{e.preventDefault();e.stopPropagation();dragCounter.current--;if(dragCounter.current===0)setDragging(false)};
  const onDragOver=(e)=>{e.preventDefault();e.stopPropagation()};
  const onDrop=(e)=>{e.preventDefault();e.stopPropagation();setDragging(false);dragCounter.current=0;
    if(e.dataTransfer.files&&e.dataTransfer.files.length>0){handleUpload(Array.from(e.dataTransfer.files));e.dataTransfer.clearData()}};

  return(<div className="page-enter" onDragEnter={onDragEnter} onDragLeave={onDragLeave} onDragOver={onDragOver} onDrop={onDrop}>
    {/* Drag overlay */}

        <h3 style={{fontSize:'1.2rem',fontWeight:800,color:'var(--t1)',marginBottom:'.5rem'}}>Pudota tiedostot t√§h√§n</h3>
        <p style={{fontSize:'.85rem',color:'var(--t2)',fontWeight:500}}>Kuvat, videot ja grafiikat</p>

                {filtered.map((f,i)=>{

                  return<div key={f.id} onClick={()=>openDetail(i)} style={{
                    width:36,height:36,borderRadius:4,overflow:'hidden',cursor:'pointer',flexShrink:0,
                    border:i===detailIdx?'2px solid var(--pri)':'2px solid transparent',opacity:i===detailIdx?1:.6
                  }}>{th?<img src={th} style={{width:'100%',height:'100%',objectFit:'cover'}} loading="lazy"/>
                    :<div style={{width:'100%',height:'100%',background:'var(--elev)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.5rem',color:'var(--t3)'}}>{f.ext}</div>}
                  </div>})}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>}
  </div>);}

      <div><label style={{fontSize:'.75rem',fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'.4rem'}}>Sisalto</label>
        <textarea className="input textarea" value={body} onChange={e=>setBody(e.target.value)} placeholder="Julkaisun teksti... Voit kopioida taman suoraan alustalle." style={{minHeight:150,lineHeight:1.7}}/></div>

        <div style={{display:'flex',flexWrap:'wrap',gap:'.4rem'}}>

      <span style={{fontSize:'.72rem',fontWeight:700,padding:'.3rem .7rem',borderRadius:9999,color:statusColor(detail.status),background:statusBg(detail.status)}}>{statusLabel(detail.status)}</span>

          <img src={detail.image} style={{width:'100%',display:'block'}} alt=""/></div>}

        <div style={{marginBottom:'1rem'}}>
          <label style={{fontSize:'.7rem',fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'.4rem'}}>Julkaisuteksti</label>
          <div style={{background:'var(--elev)',borderRadius:'var(--r)',padding:'1rem',fontSize:'.88rem',lineHeight:1.8,color:'var(--t1)',fontWeight:500,whiteSpace:'pre-wrap',border:'1px solid var(--border)',position:'relative'}}>
            {detail.body||<span style={{color:'var(--t3)',fontStyle:'italic'}}>Ei tekstia</span>}
            {detail.body&&<button className="btn btn-ghost btn-sm" style={{position:'absolute',top:'.5rem',right:'.5rem',fontSize:'.68rem'}}

        </div>

        {/* Status controls */}
        <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>

          {detail.status==='published'&&<button className="btn btn-secondary btn-sm" onClick={()=>updatePub(detail.id,{status:'ready'})}>Avaa uudelleen</button>}

      </div>
      <button className="btn btn-primary" onClick={()=>setMode('new')}>+ Uusi julkaisu</button>
    </div>

    {/* Filter tabs */}
    <div style={{display:'flex',gap:'.3rem',marginBottom:'1.25rem',flexWrap:'wrap'}}>
      {[{k:'all',l:'Kaikki',n:pubs.length},{k:'draft',l:'Luonnokset',n:pubs.filter(p=>p.status==='draft').length},{k:'ready',l:'Valmiit',n:pubs.filter(p=>p.status==='ready').length},{k:'published',l:'Julkaistut',n:pubs.filter(p=>p.status==='published').length}].map(f=>

    <div style={{display:'flex',flexDirection:'column',gap:'.6rem'}}>
      {filtered.map(pub=>{
        const readyCount=(pub.publishedChannels||[]).length;

            {/* Status dot */}
            <div style={{width:10,height:10,borderRadius:'50%',background:statusColor(pub.status),flexShrink:0}}/>

            {/* Content preview */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'baseline',gap:'.5rem',marginBottom:'.25rem'}}>
                <h4 style={{fontSize:'.92rem',fontWeight:700,letterSpacing:'-.01em'}}>{pub.title}</h4>
                <span style={{fontSize:'.68rem',fontWeight:600,padding:'.15rem .5rem',borderRadius:9999,color:statusColor(pub.status),background:statusBg(pub.status),flexShrink:0}}>{statusLabel(pub.status)}</span>
              </div>
              {pub.body&&<p style={{fontSize:'.78rem',color:'var(--t2)',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:500}}>{pub.body}</p>}
              <div style={{display:'flex',gap:'.5rem',alignItems:'center',marginTop:'.4rem',flexWrap:'wrap'}}>
                {pub.date&&<span style={{fontSize:'.7rem',color:'var(--t3)',fontWeight:600}}>{pub.date}</span>}
                {pub.channels.map(ch=>{
                  const pl=platformLinks[ch]||{color:'#8b95a8',ic:'--'};
                  const done=(pub.publishedChannels||[]).includes(ch);
                  return<span key={ch} style={{fontSize:'.6rem',fontWeight:800,padding:'.15rem .4rem',borderRadius:4,color:'#fff',background:done?'var(--green)':pl.color,opacity:done?1:.8}}>{pl.ic}</span>})}
              </div>
            </div>

            {/* Progress */}
            {totalCh>0&&<div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:'.75rem',fontWeight:700,color:readyCount===totalCh?'var(--green)':'var(--t2)'}}>{readyCount}/{totalCh}</div>
              <div style={{fontSize:'.62rem',color:'var(--t3)',fontWeight:500}}>julkaistu</div>
            </div>}

            <span style={{color:'var(--t3)',fontSize:'.9rem'}}>{'\u203a'}</span>
          </div>
        </div>})}
    </div>
  </div>);
}

      {tab==='overview'&&<div className="bcard"><div className="bcard-h"><h3>Tavoittavuus viikkotasolla</h3></div><div className="bcard-b">
        <div style={{display:'flex',alignItems:'flex-end',gap:'.75rem',height:160,padding:'1rem 0'}}>
          {weeks.map((w,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'.5rem'}}>
            <div style={{fontSize:'.7rem',fontWeight:600,color:'var(--t2)'}}>{mockData[i]}%</div>
            <div style={{width:'100%',background:'var(--bg)',borderRadius:4,overflow:'hidden',height:120}}>
              <div style={{height:mockData[i]+'%',background:`linear-gradient(180deg,${ch.color},${ch.color}88)`,borderRadius:4,marginTop:(100-mockData[i])+'%'}}/>
            </div>
            <div style={{fontSize:'.65rem',color:'var(--t3)'}}>{w}</div>
          </div>)}
        </div>
      </div></div>}

      {tab==='content'&&<div className="bcard"><div className="bcard-h"><h3>Viimeisimmat julkaisut</h3></div><div className="bcard-b">
        <div style={{textAlign:'center',padding:'3rem',color:'var(--t3)'}}>
          <p style={{fontSize:'.9rem',marginBottom:'1rem'}}>Meta Business Suite -yhteys ei ole viela aktiivinen.</p>
          <p style={{fontSize:'.8rem'}}>Kun yhteys on luotu, taalta nakyvat kaikki julkaisut ja niiden analytiikka.</p>
          {platformLinks[ch.id]&&<a href={platformLinks[ch.id]} target="_blank" rel="noopener" className="btn btn-primary" style={{marginTop:'1rem'}}>Hallitse sisaltoja {ch.name}-alustalla {'\u2197'}</a>}
        </div>
      </div></div>}

      {tab==='schedule'&&<div className="bcard"><div className="bcard-h"><h3>Ajastetut julkaisut</h3></div><div className="bcard-b">
        <div style={{textAlign:'center',padding:'3rem',color:'var(--t3)'}}>
          <p style={{fontSize:'.9rem',marginBottom:'1rem'}}>Julkaisujen ajastus tulee kayttoon Meta-yhteyden myota.</p>
          <p style={{fontSize:'.8rem'}}>Silla valiaikaa voit ajastaa julkaisuja suoraan alustoilla.</p>
          {platformLinks[ch.id]&&<a href={platformLinks[ch.id]} target="_blank" rel="noopener" className="btn btn-primary" style={{marginTop:'1rem'}}>Avaa {ch.name} {'\u2197'}</a>}
        </div>
      </div></div>}
    </div>);
  }

  return(<div className="page-enter" style={{maxWidth:920,margin:'0 auto'}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'1rem',marginBottom:'1.5rem'}}>
      <div className="bcard"><div className="bcard-b" style={{textAlign:'center',padding:'1.25rem'}}>
        <div style={{fontSize:'.7rem',color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.5rem'}}>Seuraajat yhteensa</div>
        <div style={{fontSize:'1.8rem',fontWeight:700,fontFamily:'var(--font-display)'}}>{totalFollowers.toLocaleString()}</div>
      </div></div>
      <div className="bcard"><div className="bcard-b" style={{textAlign:'center',padding:'1.25rem'}}>
        <div style={{fontSize:'.7rem',color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.5rem'}}>Kokonaistavoittavuus</div>
        <div style={{fontSize:'1.8rem',fontWeight:700,fontFamily:'var(--font-display)'}}>{(totalReach/1000).toFixed(1)}K</div>
      </div></div>
      <div className="bcard"><div className="bcard-b" style={{textAlign:'center',padding:'1.25rem'}}>
        <div style={{fontSize:'.7rem',color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.5rem'}}>Kanavat</div>
        <div style={{fontSize:'1.8rem',fontWeight:700,fontFamily:'var(--font-display)'}}>{channels.length}</div>
      </div></div>
    </div>

    <div className="bcard" style={{marginBottom:'1.5rem'}}>
      <div className="bcard-h" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3>Kanavat</h3>
        <span style={{fontSize:'.75rem',color:'var(--t3)',background:'rgba(245,197,66,.15)',padding:'.2rem .6rem',borderRadius:'var(--r)',color:'var(--yellow)'}}>Mockup ‚Äî Meta-yhteys tulossa</span>
      </div>
      <div className="bcard-b" style={{display:'flex',flexDirection:'column',gap:'.5rem'}}>
        {channels.map(ch=><div key={ch.id} onClick={()=>setSelected(ch.id)} style={{
          display:'flex',alignItems:'center',gap:'1rem',padding:'.85rem 1rem',
          background:'var(--elev)',border:'1px solid var(--border)',borderRadius:'var(--r)',
          cursor:'pointer',transition:'border-color .15s'
        }} onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-l)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
          <div style={{width:40,height:40,borderRadius:'var(--r)',background:ch.color,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:'1.1rem',fontWeight:700,flexShrink:0}}>{ch.name[0]}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:'.85rem',fontWeight:600}}>{ch.name}</div>
            <div style={{fontSize:'.72rem',color:'var(--t3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ch.handle}</div>
          </div>
          {ch.followers&&<div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontSize:'.85rem',fontWeight:700}}>{ch.followers.toLocaleString()}</div>
            <div style={{fontSize:'.65rem',color:'var(--green)',fontWeight:600}}>{ch.growth}</div>
          </div>}
          {ch.visitors&&!ch.followers&&<div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontSize:'.8rem',fontWeight:600}}>{ch.visitors}</div>
            <div style={{fontSize:'.65rem',color:'var(--t3)'}}>kavijaa</div>
          </div>}
          <div style={{textAlign:'right',flexShrink:0,minWidth:60}}>
            <div style={{fontSize:'.8rem',fontWeight:600}}>{ch.reach||ch.visitors}</div>
            <div style={{fontSize:'.65rem',color:'var(--t3)'}}>tavoittavuus</div>
          </div>
          <span style={{color:'var(--t3)',fontSize:'.9rem'}}>{'\u203a'}</span>
        </div>)}
      </div>
    </div>

    <div className="bcard">
      <div className="bcard-h"><h3>Pikayhteydet</h3></div>
      <div className="bcard-b" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'.75rem'}}>
        <a href="https://business.facebook.com/latest/home" target="_blank" rel="noopener" className="btn btn-ghost" style={{textAlign:'center',padding:'1rem',display:'flex',flexDirection:'column',gap:'.5rem',textDecoration:'none'}}>
          <span style={{fontSize:'1.2rem'}}>f</span>
          <span style={{fontSize:'.8rem'}}>Meta Business Suite</span>
        </a>
        <a href="https://www.linkedin.com/company/" target="_blank" rel="noopener" className="btn btn-ghost" style={{textAlign:'center',padding:'1rem',display:'flex',flexDirection:'column',gap:'.5rem',textDecoration:'none'}}>
          <span style={{fontSize:'1.2rem'}}>in</span>
          <span style={{fontSize:'.8rem'}}>LinkedIn</span>
        </a>
        <a href="https://www.tiktok.com/creator#/portal" target="_blank" rel="noopener" className="btn btn-ghost" style={{textAlign:'center',padding:'1rem',display:'flex',flexDirection:'column',gap:'.5rem',textDecoration:'none'}}>
          <span style={{fontSize:'1.2rem'}}>TT</span>
          <span style={{fontSize:'.8rem'}}>TikTok Creator</span>
        </a>
        <a href="https://studio.youtube.com/" target="_blank" rel="noopener" className="btn btn-ghost" style={{textAlign:'center',padding:'1rem',display:'flex',flexDirection:'column',gap:'.5rem',textDecoration:'none'}}>
          <span style={{fontSize:'1.2rem'}}>YT</span>
          <span style={{fontSize:'.8rem'}}>YouTube Studio</span>
        </a>
      </div>
    </div>
  </div>);
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê SETTINGS ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function Settings({toast,org,setOrg,resetAll,t,lang,setLang,activeOrg,fbStatus}){
  const[confirm,setConfirm]=useState(false);
  const[editName,setEN]=useState(org.name);const[editShort,setES]=useState(org.s);const[editSlogan,setESl]=useState(org.slogan);
  const saveBasic=()=>{setOrg(p=>({...p,name:editName,s:editShort,slogan:editSlogan}));toast(t('updated'),'success')};
  return(<div className="page-enter" style={{maxWidth:700}}>
    {/* Firebase Sync Status */}
    <div className="bcard" style={{borderColor:fbStatus==='synced'?'rgba(45,212,160,.3)':'rgba(245,180,52,.3)'}}><div className="bcard-h"><h3>Pilvisynkronointi</h3></div><div className="bcard-b">
      <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:fbStatus==='synced'?'var(--green-l)':'var(--yellow)'}}/>
        <span style={{fontSize:'.85rem',fontWeight:600,color:fbStatus==='synced'?'var(--green-l)':'var(--yellow)'}}>
          {fbStatus==='synced'?'Synkronoitu pilveen ‚Äî data tallentuu automaattisesti kaikille laitteille':'Yhdistetaan...'}
        </span>
      </div>
    </div></div>

    <div className="bcard"><div className="bcard-h"><h3>Organisaatio</h3></div><div className="bcard-b">
      <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
        {Object.values(ORG_REGISTRY).map(o=><button key={o.id} className={`btn ${activeOrg===o.id?'btn-primary':'btn-secondary'}`} onClick={()=>{if(activeOrg!==o.id)switchOrg(o.id)}}>{o.name}</button>)}
      </div>
      <p style={{color:'var(--t3)',fontSize:'.75rem',marginTop:'.5rem',fontWeight:500}}>Vaihda organisaatiota ‚Äî jokaisen data on erillinen.</p>
    </div></div>
    <div className="bcard"><div className="bcard-h"><h3>{t('language')}</h3></div><div className="bcard-b">
      <div style={{display:'flex',gap:'.5rem'}}>
        <button className={`btn ${lang==='fi'?'btn-primary':'btn-secondary'}`} onClick={()=>setLang('fi')}>Suomi</button>
        <button className={`btn ${lang==='en'?'btn-primary':'btn-secondary'}`} onClick={()=>setLang('en')}>English</button>
      </div>
    </div></div>
    <div className="bcard"><div className="bcard-h"><h3>{t('orgBasicInfo')}</h3></div><div className="bcard-b">
      <div className="field"><label>{t('obOrgName')}</label><input className="input" value={editName} onChange={e=>setEN(e.target.value)}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
        <div className="field"><label>{t('obShortName')}</label><input className="input" value={editShort} onChange={e=>setES(e.target.value)}/></div>
        <div className="field"><label>{t('obSlogan')}</label><input className="input" value={editSlogan} onChange={e=>setESl(e.target.value)}/></div>
      </div>
      <button className="btn btn-primary" onClick={saveBasic}>{t('save')}</button>
    </div></div>
    <div className="bcard" style={{borderColor:'rgba(239,107,107,.3)'}}><div className="bcard-h"><h3 style={{color:'var(--red)'}}>{t('dangerZone')}</h3></div><div className="bcard-b">
      <p style={{color:'var(--t2)',fontSize:'.88rem',marginBottom:'1rem',fontWeight:500}}>{t('resetWarning')}</p>
      {!confirm?<button className="btn" style={{background:'rgba(239,107,107,.12)',color:'var(--red)',border:'1px solid rgba(239,107,107,.3)'}} onClick={()=>setConfirm(true)}>{t('resetButton')}</button>
      :<div style={{display:'flex',gap:'.75rem',alignItems:'center'}}><span style={{fontSize:'.85rem',color:'var(--red)',fontWeight:600}}>{t('resetConfirm')}</span>
        <button className="btn" style={{background:'var(--red)',color:'#fff'}} onClick={resetAll}>{t('resetYes')}</button>
        <button className="btn btn-ghost" onClick={()=>setConfirm(false)}>{t('cancel')}</button></div>}
    </div></div>
  </div>);}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê APP ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function App(){const{toasts,add}=useToast();const[ob,setOB]=usePersistedState('onboarded',true);const[v,setV]=useState('home');
  const activeOrg=_activeOrg;
  const orgCtx=ORG_CONTEXTS[activeOrg]||AVL_CONTEXT;
  const orgDef=ORG_DEFAULTS[activeOrg]||ORG_DEFAULTS.avl;
  const[org,setOrg]=useOrgState('org',orgDef.org);
  const[prj,setPrj]=useOrgState('projects',[]);
  const[events,setEvents]=useOrgState('events',orgDef.events);
  const[chStats,setChStats]=useOrgState('channelStats',orgCtx.channelStats);
  const[pubs,setPubs]=useOrgState('publications',[]);
  const[lang,setLang]=usePersistedState('lang','fi');
  const t=mkT(lang);

  const resetAll=()=>{clearOrgData(activeOrg);setOB(false);setOrg(orgDef.org);setPrj([]);setPubs([]);setEvents(orgDef.events);setChStats(orgCtx.channelStats);setLang('fi');setV('home')};

  // Firebase sync status
  const[fbStatus,setFbStatus]=useState('connecting');
  useEffect(()=>{
    const check=()=>{setFbStatus(_fb.hydrated?'synced':'connecting')};
    const unsub=fbAuth.onAuthStateChanged(()=>{setTimeout(check,1000)});
    const interval=setInterval(check,2000);
    return()=>{unsub();clearInterval(interval)};
  },[]);

  const[chatOpen,setChatOpen]=useState(false);
  const[mobNav,setMobNav]=useState(false);
  useEffect(()=>{if(mobNav)document.body.classList.add('no-scroll');else document.body.classList.remove('no-scroll');return()=>document.body.classList.remove('no-scroll')},[mobNav]);
  const goTo=(page)=>{setV(page);setMobNav(false)};
  if(!ob)return<><Toasts t={toasts}/><Onboarding onDone={()=>setOB(true)} toast={add} setOrg={setOrg} t={t}/></>;
  const nav=[{id:'home',l:t('home'),ic:'\u25c9'},{id:'strategy',l:t('strategy'),ic:'\u25c8'},{id:'pipeline',l:t('projects'),ic:'\u2630',cnt:prj.length},{id:'publications',l:'Julkaisut',ic:'\u25b6',cnt:pubs.filter(p=>p.status==='ready').length},{id:'calendar',l:t('calendar'),ic:'\u25a6'},{id:'channels',l:'Kanavat',ic:'\u25c7'},{id:'media',l:'Mediapankki',ic:'\u25a3'}];
  const hdr={home:{t:t('home'),s:(org.s||org.name||'Hetki')},pipeline:{t:t('projects'),s:prj.length+' '+t('projects').toLowerCase()},publications:{t:'Julkaisut',s:pubs.length+' julkaisua'},calendar:{t:t('calendar'),s:events.length+' '+t('publications_plural')},strategy:{t:t('strategy'),s:org.slogan||t('strategy')},channels:{t:'Kanavat',s:'Somekanavien hallinta ja analytiikka'},media:{t:'Mediapankki',s:'Valokuvat, videot ja grafiikat'},settings:{t:t('settings'),s:t('manageOrg')}};
  const h=hdr[v]||hdr.home;
  const navContent=<>
    <div className="side-hd" style={{position:'relative'}}><div className="logo-text"><img src="media/brand/hetki-logo-white.png" alt="Hetki"/> Momentum</div></div>
    <div className="ws-box" onClick={()=>goTo('settings')}><div className="ws-name">{org.name||'Organisaatio'}</div><div className="ws-plan">Free Plan</div></div>
    <nav style={{flex:1,padding:'.5rem 0',overflowY:'auto'}}>
      <div className="nav-sec">{t('tools')}</div>
      {nav.map(n=><div key={n.id} className={`nav-i ${v===n.id?'act':''}`} onClick={()=>goTo(n.id)}><span className="nav-ic">{n.ic}</span><span>{n.l}</span>{n.badge&&<span className="badge badge-ai">AI</span>}{n.cnt>0&&<span className="badge badge-c">{n.cnt}</span>}</div>)}
      <div className="nav-sec">{t('system')}</div>
      <div className={`nav-i ${v==='settings'?'act':''}`} onClick={()=>goTo('settings')}><span className="nav-ic">{'\u2699'}</span><span>{t('settings')}</span></div>
    </nav>
    <div className="side-ft"><div className="color-band" style={{position:'absolute',top:0,left:0,right:0}}><span style={{background:'var(--hetki-blue)'}}/><span style={{background:'var(--hetki-green)'}}/><span style={{background:'var(--hetki-yellow)'}}/><span style={{background:'var(--hetki-pink)'}}/><span style={{background:'var(--hetki-black)'}}/></div><div className="ava">{'AB'}</div><div><div style={{fontSize:'.8rem',fontWeight:600}}>Anton Baer</div><div style={{fontSize:'.62rem',color:'var(--t3)',fontWeight:500}}>Viestint√§vastaava</div></div></div>
  </>;
  return(<div className="app"><Toasts t={toasts}/>
    {/* Desktop sidebar */}
    <aside className="side">{navContent}</aside>
    {/* Mobile drawer */}
    {mobNav&&<div className="mob-overlay" style={{display:'block'}} onClick={()=>setMobNav(false)}/>}
    <div className={`mob-drawer ${mobNav?'open':''}`}>
      <button className="mob-close" onClick={()=>setMobNav(false)}>{'\u2715'}</button>
      {navContent}
    </div>
    <main className="main">
      <header className="topbar">
        <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
          <button className="mob-toggle" onClick={()=>setMobNav(true)}>{'\u2630'}</button>
          <div><h1>{h.t}</h1><p>{h.s}</p></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'.4rem',fontSize:'.68rem',fontWeight:600,color:fbStatus==='synced'?'var(--green-l)':fbStatus==='connecting'?'var(--yellow)':'var(--t3)'}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:fbStatus==='synced'?'var(--green-l)':fbStatus==='connecting'?'var(--yellow)':'var(--t3)'}}/>
          {fbStatus==='synced'?'Synkronoitu':fbStatus==='connecting'?'Yhdistetaan...':'Offline'}
        </div>
      </header>
      <div className="page">
        {v==='home'&&<Home go={setV} toast={add} prj={prj} events={events} org={org} t={t} chStats={chStats} setChStats={setChStats} orgCtx={orgCtx}/>}
        {v==='pipeline'&&<Pipeline prj={prj} setPrj={setPrj} toast={add} t={t} org={org}/>}
        {v==='calendar'&&<Cal toast={add} events={events} setEvents={setEvents} org={org} t={t}/>}
        {v==='strategy'&&<Strat toast={add} org={org} setOrg={setOrg} t={t} chStats={chStats}/>}
        {v==='channels'&&<Channels toast={add} t={t} org={org} chStats={chStats} setChStats={setChStats}/>}
        {v==='media'&&<MediaBank toast={add} t={t}/>}
        {v==='publications'&&<Publications toast={add} t={t} org={org}/>}
        {v==='settings'&&<Settings toast={add} org={org} setOrg={setOrg} resetAll={resetAll} t={t} lang={lang} setLang={setLang} activeOrg={activeOrg} fbStatus={fbStatus}/>}
      </div>
    </main>
    {/* Global AI Chat */}
    {!chatOpen&&<button className="chat-fab" onClick={()=>setChatOpen(true)}>AI</button>}
    {chatOpen&&<><div className="chat-panel-ov" onClick={()=>setChatOpen(false)}/><div className="chat-panel"><Chat toast={add} org={org} t={t} chStats={chStats} orgCtx={orgCtx} events={events} prj={prj} onClose={()=>setChatOpen(false)}/></div></>}
  </div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
