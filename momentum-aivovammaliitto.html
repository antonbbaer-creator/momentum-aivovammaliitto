<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hetki — Momentum</title>
  <link rel="icon" type="image/png" href="media/brand/hetki-logo-black.png">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="media/manifest.js"></script>
  <script src="media/llff-manifest.js"></script>
  <style>
    /* ─── HETKI BRAND FONTS ─── */
    @font-face{font-family:'Pitch Sans';src:url('media/fonts/PitchSans-Regular.otf') format('opentype'),url('media/fonts/pitch-sans-regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
    @font-face{font-family:'Pitch Sans';src:url('media/fonts/PitchSans-Medium.otf') format('opentype'),url('media/fonts/pitch-sans-medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
    @font-face{font-family:'DM Sans';src:url('media/fonts/DMSans-Light.ttf') format('truetype');font-weight:300;font-style:normal;font-display:swap}
    @font-face{font-family:'DM Sans';src:url('media/fonts/DMSans-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}

    :root {
      /* Hetki Brand Colors — exact from Visual Identity palette */
      --pri:#056b9f;--pri-l:#3788b2;--pri-d:#044d73;
      --bg:#0a0c10;--card:#111318;--card2:#181b22;--elev:#1e222c;--border:#282d3a;--border-l:#343a4a;
      --t1:#f0f2f5;--t2:#949bac;--t3:#5a6278;
      --green:#185e5b;--green-l:#2a8a86;--yellow:#f1b434;--red:#ef6b6b;--pink:#e45c81;--orange:#f09a52;--cyan:#2a8a86;
      --r:6px;--rl:10px;--rxl:14px;
      --glass:rgba(10,12,16,.8);--glass-border:rgba(255,255,255,.05);
      --shadow:0 4px 24px rgba(0,0,0,.4);
      --font:'DM Sans',system-ui,sans-serif;
      --font-display:'Pitch Sans','DM Sans',monospace;
      --hetki-blue:#056b9f;--hetki-green:#185e5b;--hetki-pink:#e45c81;--hetki-yellow:#f1b434;--hetki-black:#303030;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);font-weight:300;background:var(--bg);color:var(--t1);line-height:1.55;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    body.no-scroll{overflow:hidden;position:fixed;width:100%;touch-action:none}
    ::selection{background:var(--hetki-blue);color:#fff}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--border-l)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    @keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* ─── TOAST ─── */
    .toast-wrap{position:fixed;top:1.5rem;right:1.5rem;z-index:1000;display:flex;flex-direction:column;gap:.5rem}
    .toast{padding:.875rem 1.25rem;border-radius:var(--rl);animation:fadeUp .3s;min-width:300px;font-size:.85rem;backdrop-filter:blur(16px);font-weight:500}
    .toast.success{background:rgba(24,94,91,.15);border:1px solid rgba(24,94,91,.4);color:var(--green-l)}
    .toast.info{background:rgba(5,107,159,.15);border:1px solid rgba(5,107,159,.4);color:var(--pri-l)}

    /* ─── FORMS ─── */
    .field{margin-bottom:1.25rem}
    .field label{display:block;font-size:.75rem;font-weight:600;color:var(--t3);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.04em}
    .input{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:var(--r);font-size:.9rem;background:var(--elev);color:var(--t1);font-family:var(--font);transition:all .2s}
    .input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(5,107,159,.15)}
    .input::placeholder{color:var(--t3)}
    .textarea{resize:vertical;min-height:120px;line-height:1.7}
    .textarea-lg{min-height:180px;font-size:1rem;padding:1.25rem}

    /* ─── BUTTONS ─── */
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.2rem;border-radius:var(--r);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:var(--font);letter-spacing:.01em;text-transform:none}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .btn-primary{background:var(--pri);color:#fff;box-shadow:none}
    .btn-primary:hover:not(:disabled){background:var(--pri-l);box-shadow:0 2px 12px rgba(5,107,159,.3)}
    .btn-secondary{background:var(--elev);color:var(--t1);border:1px solid var(--border)}
    .btn-secondary:hover:not(:disabled){border-color:var(--pri);background:rgba(26,143,196,.05)}
    .btn-ghost{background:transparent;color:var(--t2);padding:.4rem .6rem;font-weight:500}
    .btn-ghost:hover{color:var(--t1)}
    .btn-lg{padding:.875rem 2rem;font-size:.95rem;border-radius:var(--rl)}
    .btn-sm{padding:.4rem .8rem;font-size:.78rem}
    .btn-hetki{background:var(--hetki-black);color:#fff;font-weight:500;font-family:var(--font-display);letter-spacing:.06em;text-transform:uppercase;box-shadow:none}
    .btn-hetki:hover{background:#444;box-shadow:0 2px 12px rgba(0,0,0,.3)}

    /* ─── ONBOARDING ─── */
    .onb{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg) url('media/textures/texture-black.jpg') center/cover;position:relative}
    .onb::before{content:'';position:absolute;inset:0;background:rgba(10,12,16,.75)}
    .onb-wrap{width:100%;max-width:640px;animation:scaleIn .5s cubic-bezier(.16,1,.3,1);position:relative;z-index:1}
    .onb-logo{text-align:center;margin-bottom:2.5rem}
    .onb-logo h1{font-family:var(--font-display);font-size:2.4rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase;color:var(--t1)}
    .onb-logo img{height:48px;width:auto;margin-bottom:.5rem}
    .onb-logo p{color:var(--t2);font-size:.9rem;margin-top:.3rem;font-weight:500}
    .onb-card{background:var(--card);border:1px solid var(--glass-border);border-radius:var(--rxl);overflow:hidden;backdrop-filter:blur(20px);box-shadow:var(--shadow);position:relative}
    .onb-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;display:flex;z-index:1;background:linear-gradient(90deg,var(--hetki-blue) 0%,var(--hetki-blue) 20%,var(--hetki-green) 20%,var(--hetki-green) 40%,var(--hetki-yellow) 40%,var(--hetki-yellow) 60%,var(--hetki-pink) 60%,var(--hetki-pink) 80%,var(--hetki-black) 80%,var(--hetki-black) 100%)}
    .onb-head{padding:1.75rem 2rem;border-bottom:1px solid var(--border)}
    .onb-head h2{font-family:var(--font-display);font-size:1.05rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
    .onb-head p{color:var(--t2);font-size:.82rem;margin-top:.3rem}
    .onb-body{padding:2rem}
    .onb-foot{padding:1.25rem 2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .onb-dots{display:flex;gap:.5rem}
    .onb-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .4s}
    .onb-dot.active{background:var(--pri);width:28px;border-radius:5px}
    .onb-dot.done{background:var(--green)}

    .ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .ch-card{background:var(--elev);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;gap:.875rem}
    .ch-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
    .ch-card.on{border-color:var(--green);background:rgba(45,212,160,.04);box-shadow:0 0 0 1px rgba(45,212,160,.15)}
    .ch-icon{font-size:.75rem;font-weight:700;letter-spacing:.04em;flex-shrink:0;text-transform:uppercase;font-family:var(--font-display)}
    .ch-info h4{font-size:.85rem;font-weight:700}
    .ch-info p{font-size:.72rem;color:var(--t3);margin-top:.1rem}
    .ch-stat{margin-left:auto;text-align:right}
    .ch-stat .num{font-family:var(--font-display);font-size:1rem;font-weight:500;color:var(--t1);animation:countUp .4s cubic-bezier(.16,1,.3,1)}
    .ch-stat .lbl{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
    .ch-status{font-size:.65rem;padding:.25rem .55rem;border-radius:9999px;font-weight:600;margin-left:auto}

    .strat-opts{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.25rem}
    .strat-opt{background:var(--elev);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem 1.25rem;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1)}
    .strat-opt:hover{border-color:var(--pri)}
    .strat-opt.sel{border-color:var(--pri);background:rgba(26,143,196,.06);box-shadow:0 0 0 1px rgba(26,143,196,.15)}
    .strat-opt h4{font-size:.9rem;font-weight:700;margin-bottom:.2rem}
    .strat-opt p{font-size:.78rem;color:var(--t3)}
    .tip-box{background:rgba(5,107,159,.06);border:1px solid rgba(5,107,159,.15);border-radius:var(--r);padding:.875rem 1.1rem;font-size:.82rem;color:var(--pri-l);margin-top:1rem;line-height:1.6}
    .skip{color:var(--t3);font-size:.82rem;cursor:pointer;font-weight:500;transition:color .2s}
    .skip:hover{color:var(--t1)}

    /* AI Dialog */
    .ai-dialog{display:flex;flex-direction:column;gap:.75rem;max-height:380px;overflow-y:auto;padding-right:.25rem}
    .ai-bub{display:flex;gap:.6rem;animation:fadeUp .5s cubic-bezier(.16,1,.3,1)}
    .ai-bub.user{flex-direction:row-reverse}
    .ai-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:500;flex-shrink:0;font-family:var(--font-display)}
    .ai-bub.assistant .ai-av{background:var(--pri);color:#fff}
    .ai-bub.user .ai-av{background:var(--elev);color:var(--t2)}
    .ai-bub-c{padding:.8rem 1rem;border-radius:var(--rl);max-width:85%;font-size:.85rem;line-height:1.65}
    .ai-bub.assistant .ai-bub-c{background:var(--elev);border:1px solid var(--border)}
    .ai-bub.user .ai-bub-c{background:var(--pri);color:#fff}
    .ai-bub-c p{margin-bottom:.4rem}.ai-bub-c p:last-child{margin-bottom:0}
    .ai-opts{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
    .ai-opt-btn{background:var(--card);border:1px solid var(--border);padding:.45rem .8rem;border-radius:9999px;font-size:.75rem;cursor:pointer;color:var(--t2);font-family:var(--font);font-weight:500;transition:all .2s}
    .ai-opt-btn:hover{border-color:var(--pri);color:var(--pri-l);background:rgba(26,143,196,.05)}
    .typing{display:flex;gap:.25rem;padding:.3rem}
    .typing span{width:6px;height:6px;background:var(--t3);border-radius:50%;animation:bounce 1.4s infinite}
    .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}

    /* ─── APP SHELL ─── */
    .app{display:flex;min-height:100vh}
    .side{width:264px;background:var(--pri-d) url('media/textures/texture-blue.jpg') center/cover;background-blend-mode:overlay;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:50}
    .side-hd{padding:1.5rem 1.5rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.12)}
    .logo-text{font-family:var(--font-display);font-weight:500;font-size:1.1rem;letter-spacing:.05em;text-transform:uppercase;color:var(--t1);display:flex;align-items:center;gap:.6rem}
    .logo-text img{height:20px;width:auto}
    .ws-box{margin:.875rem 1.25rem;padding:.8rem 1rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);cursor:pointer;transition:all .2s}
    .ws-box:hover{border-color:rgba(255,255,255,.3)}
    .ws-name{font-weight:700;font-size:.82rem;letter-spacing:-.01em}
    .ws-plan{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:.2rem;font-weight:600}
    .nav-sec{padding:1.5rem 1.5rem .5rem;font-family:var(--font-display);font-size:.6rem;text-transform:uppercase;color:rgba(255,255,255,.4);letter-spacing:.1em;font-weight:500}
    .nav-i{display:flex;align-items:center;padding:.65rem 1.5rem;color:rgba(255,255,255,.65);cursor:pointer;font-size:.84rem;position:relative;transition:all .15s;gap:.65rem;font-weight:400;letter-spacing:.01em}
    .nav-i:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-i.act{color:#fff;background:rgba(255,255,255,.12)}
    .nav-i.act::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#fff}
    .nav-ic{width:20px;text-align:center;font-size:.85rem;opacity:.5}
    .nav-i.act .nav-ic{opacity:1}
    .badge{margin-left:auto;font-size:.6rem;padding:.2rem .55rem;border-radius:9999px;font-weight:700}
    .badge-ai{background:rgba(255,255,255,.2);color:#fff}
    .badge-n{background:rgba(45,212,160,.12);color:var(--green);border:1px solid rgba(45,212,160,.2)}
    .badge-c{background:var(--elev);color:var(--t3);border:1px solid var(--border)}
    .side-ft{padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:.75rem;position:relative}
    .side-ft::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;display:flex}
    .color-band{display:flex;height:3px;width:100%}
    .color-band span{flex:1}
    .ava{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:.75rem;font-weight:500;color:#fff}

    .main{flex:1;margin-left:264px;display:flex;flex-direction:column}
    .topbar{background:rgba(10,12,16,.9);backdrop-filter:blur(16px);padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
    .topbar h1{font-family:var(--font-display);font-size:1.15rem;font-weight:500;letter-spacing:.03em;text-transform:uppercase}
    .topbar p{font-size:.75rem;color:var(--t3);font-weight:400;letter-spacing:.02em}
    .page{flex:1;padding:2rem;overflow-y:auto}
    .page-enter{animation:fadeUp .8s cubic-bezier(.16,1,.3,1)}

    /* ─── DASHBOARD ─── */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.75rem}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem 1.4rem;animation:fadeUp .8s cubic-bezier(.16,1,.3,1) backwards;position:relative;overflow:hidden}
    .stat::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .stat:nth-child(1)::after{background:var(--hetki-blue)}.stat:nth-child(1){animation-delay:0s}
    .stat:nth-child(2)::after{background:var(--hetki-green)}.stat:nth-child(2){animation-delay:.05s}
    .stat:nth-child(3)::after{background:var(--hetki-yellow)}.stat:nth-child(3){animation-delay:.1s}
    .stat:nth-child(4)::after{background:var(--hetki-pink)}.stat:nth-child(4){animation-delay:.15s}
    .stat-num{font-family:var(--font-display);font-size:2rem;font-weight:500;letter-spacing:-.01em}
    .stat-lbl{font-size:.72rem;color:var(--t2);font-weight:400;margin-top:.15rem;letter-spacing:.02em}
    .dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem}
    .dash-w{grid-column:span 2}
    .dc{background:var(--card);border:1px solid var(--border);border-radius:var(--rxl);overflow:hidden;animation:fadeUp .8s cubic-bezier(.16,1,.3,1) backwards}
    .dc:nth-child(2){animation-delay:.05s}.dc:nth-child(3){animation-delay:.1s}.dc:nth-child(4){animation-delay:.15s}
    .dc-h{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .dc-h h3{font-family:var(--font-display);font-size:.88rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
    .dc-b{padding:1.5rem}

    /* AI Recommend card */
    .ai-rec{background:rgba(5,107,159,.06) url('media/textures/texture-blue.jpg') center/cover;background-blend-mode:soft-light;border:1px solid rgba(5,107,159,.15);border-radius:var(--rxl);padding:1.5rem;margin-bottom:1.75rem;display:flex;gap:1.25rem;align-items:flex-start;animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .1s backwards}
    .ai-rec-av{width:44px;height:44px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:.85rem;color:#fff;flex-shrink:0;font-family:var(--font-display)}
    .ai-rec-body{flex:1}
    .ai-rec-body h3{font-family:var(--font-display);font-size:.9rem;font-weight:500;margin-bottom:.35rem;display:flex;align-items:center;gap:.5rem;letter-spacing:.02em}
    .ai-rec-body h3 .ai-badge{font-size:.55rem;padding:.2rem .5rem;border-radius:9999px;background:var(--pri);color:#fff;font-weight:500;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-display)}
    .ai-rec-body p{font-size:.85rem;color:var(--t2);line-height:1.6}
    .ai-rec-actions{display:flex;gap:.5rem;margin-top:.75rem}

    /* Pulse */
    .pulse-wrap{display:flex;align-items:center;gap:2rem}
    .pulse-ring{position:relative;width:120px;height:120px;flex-shrink:0}
    .pulse-ring svg{transform:rotate(-90deg)}
    .pulse-sc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .pulse-sc .n{font-family:var(--font-display);font-size:2rem;font-weight:500;letter-spacing:-.01em}
    .pulse-sc .l{font-size:.6rem;color:var(--t3);font-weight:600}
    .pulse-items{flex:1;display:flex;flex-direction:column;gap:.35rem}
    .pulse-it{display:flex;justify-content:space-between;padding:.35rem 0;font-size:.78rem;font-weight:500}

    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
    .qcard{background:var(--elev);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);display:flex;align-items:flex-start;gap:.8rem}
    .qcard:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 16px rgba(26,143,196,.08)}
    .qi{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .qt h4{font-size:.82rem;font-weight:700;margin-bottom:.15rem;letter-spacing:-.01em}
    .qt p{font-size:.7rem;color:var(--t3);font-weight:500}

    .act-it{display:flex;gap:.75rem;padding:.55rem 0;border-bottom:1px solid var(--border)}
    .act-it:last-child{border:none}
    .act-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}

    /* ─── BRIEF ─── */
    .brief-wrap{max-width:920px;margin:0 auto}
    .bcard{background:var(--card);border:1px solid var(--border);border-radius:var(--rxl);overflow:hidden;margin-bottom:1.5rem}
    .bcard-h{padding:1.4rem 1.75rem;border-bottom:1px solid var(--border)}
    .bcard-h h3{font-family:var(--font-display);font-size:.95rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
    .bcard-h p{font-size:.82rem;color:var(--t2);margin-top:.2rem;font-weight:500}
    .bcard-b{padding:1.75rem}
    .res-sec{margin-top:1.75rem;padding-top:1.5rem;border-top:1px solid var(--border)}
    .res-sec h4{font-family:var(--font-display);font-size:.88rem;font-weight:500;margin-bottom:.25rem;letter-spacing:.02em;text-transform:uppercase}
    .res-sec>p{font-size:.8rem;color:var(--t2);margin-bottom:1rem;font-weight:500}
    .res-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
    .res-tab{padding:.5rem 1rem;border-radius:9999px;font-size:.8rem;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);font-family:var(--font);font-weight:600;transition:all .2s}
    .res-tab.act{background:var(--pri);border-color:transparent;color:#fff}
    .res-per{background:var(--elev);border:1px solid var(--border);border-radius:var(--r);padding:.875rem;margin-bottom:.55rem;display:flex;gap:.75rem;align-items:center;transition:all .2s}
    .res-per:hover{border-color:var(--border-l)}
    .res-per .nm{font-size:.85rem;font-weight:600}.res-per .sk{font-size:.72rem;color:var(--t3);font-weight:500}
    .res-rm{background:none;border:none;color:var(--t3);cursor:pointer;font-size:1.1rem;transition:color .15s;margin-left:auto}
    .res-rm:hover{color:var(--red)}
    .add-row{display:flex;gap:.5rem;margin-top:.75rem}

    /* AI Response */
    .ai-resp{background:var(--card);border:1px solid rgba(5,107,159,.25);border-radius:var(--rxl);overflow:hidden;margin-bottom:1.5rem;animation:scaleIn .5s cubic-bezier(.16,1,.3,1);box-shadow:none}
    .ai-resp-h{padding:1.1rem 1.5rem;background:rgba(5,107,159,.08) url('media/textures/texture-blue.jpg') center/cover;background-blend-mode:soft-light;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
    .ai-resp-h h4{font-family:var(--font-display);font-size:.85rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase}.ai-resp-h p{font-size:.7rem;color:var(--t2);font-weight:400}
    .ai-resp-b{padding:1.75rem}
    .ai-resp-b h4{font-family:var(--font-display);font-size:.9rem;font-weight:500;margin-bottom:.75rem;letter-spacing:.02em;text-transform:uppercase}
    .ai-resp-b>p{color:var(--t2);line-height:1.7;margin-bottom:1rem;font-size:.9rem;font-weight:500}
    .prelim{background:rgba(241,180,52,.06);border:1px solid rgba(241,180,52,.15);border-radius:var(--r);padding:1rem 1.15rem;margin-bottom:1.25rem;display:flex;gap:.75rem;align-items:flex-start}
    .prelim .ic{font-size:1.1rem;flex-shrink:0}.prelim .tx{font-size:.85rem;color:var(--yellow);line-height:1.55;font-weight:500}
    .proposal{background:var(--elev);border-radius:var(--rl);padding:1.25rem;margin-bottom:.75rem;border-left:3px solid var(--pri);transition:all .2s;position:relative}
    .proposal:hover{border-left-color:var(--pri-l);background:rgba(22,27,39,.9)}
    .proposal h5{font-size:.85rem;font-weight:700;margin-bottom:.35rem;color:var(--pri-l);display:flex;justify-content:space-between;letter-spacing:-.01em}
    .proposal>p{font-size:.85rem;color:var(--t2);margin:0;font-weight:500}
    .res-tag{display:inline-flex;align-items:center;gap:.25rem;font-size:.65rem;padding:.2rem .5rem;border-radius:5px;margin-top:.5rem;margin-right:.3rem;font-weight:600}
    .strat-tag{display:inline-flex;align-items:center;gap:.25rem;font-size:.65rem;padding:.2rem .55rem;border-radius:9999px;background:rgba(7,118,171,.12);color:var(--pri-l);font-weight:600;border:1px solid rgba(7,118,171,.15)}
    .alloc{margin:1.25rem 0}
    .alloc-lbl{font-size:.72rem;color:var(--t3);margin-bottom:.35rem;display:flex;justify-content:space-between;font-weight:600}
    .alloc-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;display:flex}
    .alloc-seg{height:100%;transition:width .8s ease}
    .alloc-leg{display:flex;gap:1rem;margin-top:.5rem}
    .alloc-leg-it{display:flex;align-items:center;gap:.3rem;font-size:.7rem;color:var(--t2);font-weight:500}
    .alloc-leg-dot{width:8px;height:8px;border-radius:2px}
    .ai-acts{display:flex;gap:.75rem;padding:1.25rem 1.5rem;border-top:1px solid var(--border);background:var(--card2);flex-wrap:wrap}

    .budget-warn{background:rgba(239,107,107,.06);border:1px solid rgba(239,107,107,.15);border-radius:var(--r);padding:1rem;margin-bottom:1rem;font-size:.85rem;color:var(--red);line-height:1.55;font-weight:500}

    /* ─── PIPELINE ─── */
    .pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;min-height:400px}
    .pipe-col{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);display:flex;flex-direction:column}
    .pipe-col-h{padding:1rem 1.1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .pipe-col-h h3{font-family:var(--font-display);font-size:.8rem;font-weight:500;display:flex;align-items:center;gap:.5rem;letter-spacing:.02em;text-transform:uppercase}
    .pipe-cnt{font-size:.65rem;background:var(--elev);padding:.2rem .5rem;border-radius:9999px;color:var(--t3);font-weight:600}
    .pipe-body{padding:.7rem;flex:1;display:flex;flex-direction:column;gap:.55rem}
    .pipe-c{background:var(--elev);border:1px solid var(--border);border-radius:var(--r);padding:.95rem;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1)}
    .pipe-c:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
    .pipe-c h4{font-size:.8rem;font-weight:700;margin-bottom:.25rem;letter-spacing:-.01em}
    .pipe-c>p{font-size:.7rem;color:var(--t3);margin-bottom:.4rem;font-weight:500}
    .pipe-tags{display:flex;gap:.35rem;flex-wrap:wrap}
    .pipe-tag{font-size:.6rem;padding:.18rem .45rem;border-radius:5px;font-weight:600}
    .pipe-align{display:flex;align-items:center;gap:.35rem;margin-top:.5rem;font-size:.65rem;color:var(--t3);font-weight:600}
    .pipe-align-bar{flex:1;height:3px;background:var(--bg);border-radius:2px;overflow:hidden;max-width:60px}
    .pipe-align-fill{height:100%;border-radius:2px}

    /* ─── CALENDAR ─── */
    .cal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .cal-h h2{font-family:var(--font-display);font-size:1.2rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
    .cal-dh{background:var(--card);padding:.75rem;text-align:center;font-family:var(--font-display);font-size:.65rem;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
    .cal-d{background:var(--card);min-height:105px;padding:.55rem;position:relative;transition:background .15s}
    .cal-d:hover{background:var(--card2)}
    .cal-d.oth{opacity:.25}
    .cal-d.tod{background:rgba(26,143,196,.04)}
    .cal-d.tod::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pri)}
    .cal-dn{font-size:.72rem;font-weight:600;margin-bottom:.3rem}
    .cal-ev{font-size:.57rem;padding:.15rem .3rem;border-radius:3px;margin-bottom:.15rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;transition:opacity .15s}
    .cal-ev:hover{opacity:.75}

    /* ─── CONTENT BANK ─── */
    .cb-f-wrap{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .cb-f{padding:.45rem .95rem;border-radius:9999px;font-size:.8rem;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);font-family:var(--font);font-weight:600;transition:all .2s}
    .cb-f.act{background:var(--pri);border-color:transparent;color:#fff}
    .cb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
    .cb-it{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:all .4s cubic-bezier(.16,1,.3,1);cursor:pointer;animation:fadeUp .8s cubic-bezier(.16,1,.3,1) backwards}
    .cb-it:hover{border-color:var(--pri);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.35)}
    .cb-prev{height:130px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative}
    .cb-ch{position:absolute;top:.5rem;right:.5rem;font-size:.6rem;padding:.2rem .55rem;border-radius:5px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);font-weight:600}
    .cb-inf{padding:1rem 1.1rem}
    .cb-inf h4{font-size:.82rem;font-weight:700;margin-bottom:.2rem;letter-spacing:-.01em}
    .cb-inf p{font-size:.7rem;color:var(--t3);font-weight:500}
    .cb-st{font-size:.62rem;padding:.2rem .5rem;border-radius:5px;font-weight:600;margin-top:.4rem;display:inline-block}

    /* ─── STRATEGY ─── */
    .strat-lay{display:grid;grid-template-columns:1fr 360px;gap:2rem}
    .strat-hero{background:var(--hetki-black) url('media/textures/texture-black.jpg') center/cover;border-radius:var(--rxl);padding:2.5rem;position:relative;overflow:hidden}
    .strat-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--hetki-blue) 20%,var(--hetki-green) 20% 40%,var(--hetki-yellow) 40% 60%,var(--hetki-pink) 60% 80%,var(--hetki-black) 80%)}
    .strat-hero::after{content:'';position:absolute;inset:0;background:rgba(48,48,48,.6)}
    .strat-hero>*{position:relative;z-index:1}
    .strat-hero .ob{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.12);padding:.4rem .95rem;border-radius:9999px;font-size:.72rem;margin-bottom:1.1rem;font-weight:500;backdrop-filter:blur(4px);font-family:var(--font-display);letter-spacing:.04em;text-transform:uppercase}
    .strat-hero h2{font-family:var(--font-display);font-size:1.6rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase;margin-bottom:.3rem;position:relative}
    .strat-sec{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:1rem}
    .strat-sec-h{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
    .strat-sec-h:hover{background:rgba(255,255,255,.015)}
    .strat-sec-h h3{font-family:var(--font-display);font-size:.88rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
    .strat-sec-b{padding:1.25rem}
    .goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .goal{background:var(--elev);border-radius:var(--r);padding:1.15rem;border-left:3px solid var(--pri);transition:all .2s}
    .goal:hover{border-left-color:var(--pri-l)}
    .goal .met{font-family:var(--font-display);font-size:1.5rem;font-weight:500;color:var(--pri-l);letter-spacing:-.01em}
    .goal h4{font-size:.82rem;font-weight:600;margin-top:.15rem;margin-bottom:.25rem}
    .goal p{font-size:.72rem;color:var(--t2);margin:0;font-weight:500}
    .goal-bar{margin-top:.6rem;background:var(--bg);border-radius:3px;height:4px;overflow:hidden}
    .goal-fill{height:100%;background:var(--pri);border-radius:3px;transition:width 1s cubic-bezier(.16,1,.3,1)}
    .brand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
    .brand{background:var(--elev);border-radius:var(--r);padding:1.15rem;text-align:center;border:1px solid transparent;transition:all .2s}
    .brand:hover{border-color:var(--pri)}
    .brand .bic{width:40px;height:40px;background:var(--hetki-black);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-weight:500;font-size:.8rem;color:#fff;font-family:var(--font-display)}
    .brand h4{font-size:.82rem;font-weight:700;margin-bottom:.25rem}
    .brand p{font-size:.7rem;color:var(--t2);font-weight:500}
    .tone-list{display:flex;flex-wrap:wrap;gap:.4rem}
    .tone{background:var(--pri);padding:.35rem .8rem;border-radius:9999px;font-size:.72rem;font-weight:500;font-family:var(--font-display);letter-spacing:.02em}

    /* AI Chat — Global floating panel */
    @keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
    @keyframes slideOutRight{from{transform:translateX(0)}to{transform:translateX(100%)}}
    .chat-fab{position:fixed;bottom:1.5rem;right:1.5rem;width:52px;height:52px;border-radius:50%;background:var(--pri);color:#fff;border:none;cursor:pointer;z-index:150;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:.85rem;font-weight:500;letter-spacing:.03em;box-shadow:0 4px 20px rgba(5,107,159,.4);transition:all .2s}
    .chat-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(5,107,159,.5)}
    .chat-panel-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:180;animation:fadeIn .2s}
    .chat-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;z-index:190;animation:slideInRight .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;background:var(--card);border-left:1px solid var(--border);box-shadow:-8px 0 40px rgba(0,0,0,.4)}
    .chat-panel .ai-chat{height:100%;border:none;border-radius:0;position:static}
    .ai-chat{background:var(--card);border:1px solid var(--border);border-radius:var(--rxl);flex:1;display:flex;flex-direction:column;overflow:hidden;height:100%}
    .ai-chat-h{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
    .ai-chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
    .ai-chat-sugs{padding:.5rem .75rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:.35rem}
    .chat-sug{background:var(--elev);border:1px solid var(--border);padding:.35rem .65rem;border-radius:9999px;font-size:.65rem;cursor:pointer;font-family:var(--font);color:var(--t2);font-weight:600;transition:all .15s}
    .chat-sug:hover{border-color:var(--pri);color:var(--pri-l)}
    .ai-chat-in-area{padding:.75rem;border-top:1px solid var(--border);display:flex;gap:.5rem}
    .chat-in{flex:1;background:var(--elev);border:1px solid var(--border);border-radius:var(--r);padding:.6rem .875rem;font-size:.8rem;color:var(--t1);font-family:var(--font)}
    .chat-in:focus{outline:none;border-color:var(--pri)}
    .chat-send{background:var(--pri);border:none;border-radius:var(--r);width:36px;height:36px;cursor:pointer;color:#fff;font-weight:500;font-size:.9rem;transition:all .2s}
    .chat-send:disabled{opacity:.3}
    .chat-send:hover:not(:disabled){transform:scale(1.05)}

    /* Modal */
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:var(--rxl);width:100%;max-width:520px;animation:scaleIn .3s;box-shadow:0 24px 64px rgba(0,0,0,.5)}
    .modal-h{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .modal-h h3{font-family:var(--font-display);font-size:.95rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
    .modal-x{background:none;border:none;color:var(--t3);font-size:1.2rem;cursor:pointer;transition:color .15s}
    .modal-x:hover{color:var(--t1)}
    .modal-b{padding:1.5rem}.modal-f{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.75rem}

    .ok-card{background:var(--card);border:1px solid var(--green);border-radius:var(--rxl);padding:2.5rem;text-align:center;animation:scaleIn .4s;box-shadow:0 0 40px rgba(45,212,160,.08)}
    .ok-card .chk{width:60px;height:60px;background:rgba(45,212,160,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.5rem;color:var(--green);border:2px solid rgba(45,212,160,.2)}

    /* ─── CALENDAR VIEWS ─── */
    .cal-views{display:flex;gap:.35rem;background:var(--elev);border-radius:var(--r);padding:3px}
    .cal-view-btn{padding:.4rem .9rem;border-radius:8px;font-size:.78rem;cursor:pointer;border:none;background:transparent;color:var(--t3);font-family:var(--font);font-weight:600;transition:all .2s}
    .cal-view-btn.act{background:var(--card);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .cal-filters{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .cal-ch-btn{padding:.35rem .7rem;border-radius:9999px;font-size:.72rem;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);font-family:var(--font);font-weight:600;transition:all .2s}
    .cal-ch-btn.act{color:#fff}
    .yr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
    .yr-cell{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);min-height:100px}
    .yr-cell:hover{border-color:var(--pri);transform:translateY(-2px)}
    .yr-cell.tod{border-color:var(--pri);background:rgba(26,143,196,.04)}
    .yr-cell h4{font-size:.78rem;font-weight:700;margin-bottom:.5rem}
    .yr-cell-dots{display:flex;flex-wrap:wrap;gap:3px}
    .yr-dot{width:8px;height:8px;border-radius:2px}
    .yr-cell-count{font-size:.62rem;color:var(--t3);margin-top:.4rem;font-weight:600}
    .clock-wrap{display:flex;gap:2rem;margin-bottom:2rem;align-items:flex-start;flex-wrap:wrap}
    .clock-legend{display:flex;flex-direction:column;gap:.35rem;padding-top:1rem}
    .clock-leg-item{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--t2);font-weight:500}
    .clock-leg-dot{width:10px;height:10px;border-radius:2px}
    .clock-hover{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.5rem .75rem;font-size:.72rem;pointer-events:none;box-shadow:var(--shadow);white-space:nowrap;z-index:10}
    /* ─── CHANNEL MGMT ─── */
    .ch-mgmt-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;background:var(--elev);border-radius:var(--r);margin-bottom:.4rem;border:1px solid var(--border)}
    .ch-color-dot{width:16px;height:16px;border-radius:4px;cursor:pointer;flex-shrink:0;border:2px solid rgba(255,255,255,.1)}
    .ch-color-picker{display:flex;gap:4px;flex-wrap:wrap;margin-top:.35rem}
    .ch-color-opt{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .15s}
    .ch-color-opt:hover,.ch-color-opt.sel{border-color:#fff;transform:scale(1.15)}

    /* ─── MEDIA BANK ─── */
    .mb-cats{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .mb-cat{padding:.55rem 1.1rem;border-radius:9999px;font-size:.82rem;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);font-family:var(--font);font-weight:600;transition:all .2s;display:flex;align-items:center;gap:.4rem}
    .mb-cat:hover{border-color:var(--pri)}
    .mb-cat.act{background:var(--pri);border-color:transparent;color:#fff}
    .mb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
    .mb-item{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);animation:fadeUp .8s cubic-bezier(.16,1,.3,1) backwards}
    .mb-item:hover{border-color:var(--pri);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.35)}
    .mb-thumb{height:160px;display:flex;align-items:center;justify-content:center;background:var(--elev);position:relative;overflow:hidden}
    .mb-thumb img{width:100%;height:100%;object-fit:cover}
    .mb-thumb video{width:100%;height:100%;object-fit:cover}
    .mb-thumb-icon{font-size:2.5rem;opacity:.4}
    .mb-meta{padding:.875rem 1rem}
    .mb-meta h4{font-size:.8rem;font-weight:700;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mb-meta p{font-size:.68rem;color:var(--t3);font-weight:500}
    .mb-badge{position:absolute;top:.5rem;right:.5rem;font-size:.6rem;padding:.2rem .5rem;border-radius:5px;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);color:#fff;font-weight:600;text-transform:uppercase}
    .mb-upload{background:var(--card);border:2px dashed var(--border);border-radius:var(--rl);padding:2.5rem;text-align:center;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem}
    .mb-upload:hover{border-color:var(--pri);background:rgba(26,143,196,.03)}
    .mb-detail{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
    .mb-detail-inner{max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:1rem}
    .mb-detail-inner img,.mb-detail-inner video{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:var(--r)}
    .mb-detail-info{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.5rem;display:flex;align-items:center;gap:1.5rem;min-width:400px}
    .mb-empty{text-align:center;padding:3rem;color:var(--t3)}

  const[state,setState]=useState(()=>{try{const s=localStorage.getItem('momentum_'+key);return s?JSON.parse(s):defaultValue}catch{return defaultValue}});
  useEffect(()=>{try{localStorage.setItem('momentum_'+key,JSON.stringify(state))}catch{}},[key,state]);
  return[state,setState];
};

  if(localStorage.getItem('momentum_migrated_v1'))return;

  legacyKeys.forEach(k=>{const old=localStorage.getItem('momentum_'+k);if(old&&!localStorage.getItem('momentum_avl_'+k)){localStorage.setItem('momentum_avl_'+k,old)}});
  if(!localStorage.getItem('momentum_activeOrg'))localStorage.setItem('momentum_activeOrg','"avl"');
  localStorage.setItem('momentum_migrated_v1','1');
})();

// Migration v2: replace emoji channel icons with text abbreviations

})();

  strategyText:`Viestintäsuunnitelma 2026 - Aivovammaliitto
Päivitetty 3.3.2026
Työryhmä: Anton Baer, Paivi Hakkarainen, Pia Kilpelainen, Jani Saarinen

Viestintä = kaksisuuntaista merkityksien rakentamista \u2013 lähettäjä ja vastaanottaja ovat vuorovaikutuksessa, suora palautteen antaminen on mahdollista.
Tiedotus = yksisuuntaista ajankohtaisen tiedon valittamista \u2013 lähettäjä kertoo jotakin vastaanottajalle.

1. ULKOINEN VIESTINTÄ: Aivoitus, Facebook, Instagram, Tiktok, Youtube, Linkedin, messut ja tapahtumat/webinaarit

AIVOITUS-LEHTI (4x vuodessa)
Tavoite: Aivovauriotietouden levittäminen, vertaisuuden ja voimaantumisen kokemukset, tutkimustieto, tapahtumista ilmoittaminen.
Kohderyhmä: Vammautuneet, sairastuneet ja omaiset, ammattilaiset, suuri yleisö (esim. ilmoittajat).
Vastuuhenkilö: Päätoimittaja. Tekijat: päätoimittaja, toiminnanjohtaja, puheenjohtaja, yhdistyspalsta: järjestösihteeri, osoiterekisteri: järjestösihteeri, tapahtumakalenterit: kukin työntekijä omalta osaltaan.

FACEBOOK (vähintään 3 kertaa viikossa) \u2013 Facebook.com/Aivovammaliitto
Loma-ajoille ajastetaan ns. neutraalia materiaalia, joka ei herata liikaa keskustelua.

Kohderyhmä: Aivovaurion kokeneet ja laheiset, ammattilaiset, aivoterveydesta kiinnostuneet.
Vastuuhenkilö: Viestintävastaava. Tekijat: sisällöntuottaja, viestinnän suunnittelija.
Mittarit: Sivujen tykkääjämäärä, tavoitetut, sitoutetut (= kommentoijat, julkaisuista tykkajat, jaettujen uutisten jakajat omissa kanavissaan).

INSTAGRAM @aivovammaliitto (vähintään 3 kertaa viikossa)
Tiedoksi, ei kuulu viestintään: @aivovammanuoret
Tavoite: Jakaa aivovauriotietoutta, kertoa Aivovammaliiton tapahtumista etukäteen, aikana ja jälkikäteen, jakaa linkkeja esim. lehtiartikkeleihin ja muihin omiin sivustoihin (linkit stooreihin), huom. hashtagit päivitykseen sopivat.

Vastuuhenkilö: Viestintävastaava. Tekijat: sisällöntuottaja, viestinnän suunnittelija, järjestösuunnittelija (nuoret).
Mittarit: Seuraajat, tykkäysmäärät/tavoitetut, postausten lukumäärä, muu analytiikka.

TIKTOK \u2013 Tehdään silloin kun aikaa on.
Tavoite: Jakaa aivovauriotietoutta tunteella, hyödynnetään kokemustoimijoita jne., jakaa aivoterveysvinkkeja.
Kohderyhmä: Aivovaurion kokeneet ja laheiset, ammattilaiset, aivoterveydesta kiinnostuneet.
Vastuuhenkilö: Viestintävastaava. Tekijat: sisällöntuottaja.
Mittarit: Seuraajat, tykkäysmäärät/tavoitetut, postausten lukumäärä, muu analytiikka.

YOUTUBE \u2013 Tehdään silloin kun materiaalia tulee.
Tavoite: Webinaarit tekstitettyinä, kampanjat (maksettu mainonta mahdollista).
Kohderyhmä: Aivovaurion kokeneet ja laheiset, ammattilaiset, aivoterveydesta kiinnostuneet.
Vastuuhenkilö: Viestintävastaava. Tekijat: viestintävastaava, viestinnän suunnittelija, sisällöntuottaja.
Mittarit: Julkaistujen videoiden määrä, katsojamäärät, seuraajat.

LINKEDIN
Tavoite: Ajankohtaisia asioita ja tutkimuksia ammattilaiskärjellä.
Kohderyhmä: Ammattilaiset.
Vastuuhenkilö: Viestintävastaava. Tekijat: viestintävastaava, toiminnanjohtaja.
Mittarit: Julkaisujen määrä, julkaisuihin liittyva analytiikka, seuraajien määrä.

MESSUT, TAPAHTUMAT JA WEBINAARIT
Tavoite: Suuri yleisö: tietoutta aivovaurioista ja niiden ennaltaehkäisystä. Aivovaurion kokeneet ja laheiset: tietoutta aivojen vaurioista sekä jälkitilan oireiden kanssa selviamisesta. Ensitietopaivat: tietoutta liitosta.
Kohderyhmä: Suuri yleisö (Kippista kohtuudella, kouluvierailut jne.), ammattilaiset (webinaarit, Sairaanhoitajapaivat jne.), aivovaurion kokeneet ihmiset ja laheiset (esim. webinaarit, Ensitietopaivat).
Vastuuhenkilö: Viestintävastaava. Tekijat: viestintävastaava, toiminnanjohtaja, järjestöasiantuntija, koko henkilöstö, tapahtumien ja webinaarien käytännön järjestelyt: järjestösihteeri.
Mittarit: Messuille/tapahtumiin osallistuneiden määrä, kojulla kayneiden määrä, jaettujen lehtien ja esitteiden määrä, annettu palaute ja/tai havainnointi.

2. ULKOINEN TIEDOTUS: nettisivut, lehdistötiedotteet, esitteet, uutiskirje, jäsenkirje

NETTISIVUT aivovammaliitto.fi \u2013 Selkeytetaan kokonaisuutta nettisivu-uudistuksen yhteydessä. Aivovamma- ja aivoverenkiertohäiriöoyhdistysten sivut olemassa myös.
Tavoite: Jakaa yleista tietoa aivovaurioista, vertaistuesta, tutkimuksista, ajankohtaisia uutisia, netti-Aivoitusjuttuja, tapahtumatietoa. Ajankohtaisen ja luotettavan tiedon lähde.
Kohderyhmä: Vastavammautuneet ja -sairastuneet ja erityisesti heidan läheisensä, nykyiset ja potentiaaliset jäsenet, suuri yleisö, ammattilaiset.
Vastuuhenkilö: Viestintävastaava. Tekijat: viestintävastaava (uutiset, artikkelit), järjestösihteeri (rutiinipäivitykset, tekninen tyo), viestinnän suunnittelija (visuaalinen ilme ja uudistus).
Mittarit: Julkaistujen uutisten määrä, julkaistujen ajankohtaisen uutisten määrä, kävijämäärät, erilliset kavijat, vierailujen määrät.

LEHDISTOTIEDOTTEET, KANNANOTOT JA LAUSUNNOT
Tavoite: Lehdistotiedotteita medioille ajankohtaisista aiheista, kannanottoja kansanedustajille ajankohtaisista aiheista, lausuntoja lakivalmisteluista.
Kohderyhmä: Medioiden lukijat/katsojat, kansanedustajat ja muut päättäjät.
Vastuuhenkilö: Lehdistötiedotteissa: viestintävastaava. Kannanotoissa ja lausunnoissa: hallitus/liittokokous ja toiminnanjohtaja. Tekijat: viestintävastaava, toiminnanjohtaja ja järjestöasiantuntija.
Mittarit: Lähetettyjen tiedotteiden määrä, tiedotteiden avausprosentti, pyydetyt artikkelit ja haastateltavat.

ESITTEET
Tavoite: Jakaa aivovauriotietoutta etenkin vastavammautuneille ja -sairastuneille ja läheisille, jakaa tietoa ammattilaisille.
Kohderyhmä: Vammautuneet ja sairastuneet ihmiset ja laheiset, alan ammattilaiset.
Vastuuhenkilö: Viestintävastaava. Tekijat: toimitustyo: viestintävastaava, taitto: viestinnän suunnittelija, sisältö: asiantuntijat, esitteiden varastointi ja lähetys: järjestösihteeri.
Mittarit: Painosmäärät, jaettujen määrä, kysely ammattilaisille esitteiden hyödystä (viestintävastaava laatii kyselyn, järjestösihteeri lähettää sen) 2x vuodessa, jäsenkysely.

UUTISKIRJE (4\u20136/vuosi)
Tavoite: Jakaa tietoutta Aivovammaliiton asioista ja muista aivovammoihin, aivoverenkiertohäiriöihin ja muihin aivojen vaurioihin liittyvistä ajankohtaisista asioista tiiviisti. Jakaa verkkosivujen sisältöä, ohjaa linkeillä verkkosivuille.
Kohderyhmä: Sosiaali- ja terveysalan ammattilaiset, muut kiinnostuneet.
Vastuuhenkilö: Viestintävastaava. Tekijat: viestintävastaava, jokainen toimittaa viestintävastaavalle omia ajankohtaisia asioitaan jaettavaksi.
Mittarit: Avattujen uutiskirjeiden määrä, tilaajamäärä, vuoden viimeiseen kysely.

JÄSENKIRJE (n. 10 krt/vuosi)
Tavoite: Jakaa tietoa Aivovammaliiton ajankohtaisista asioista.
Kohderyhmä: Jäsenet, joiden sähköposti on tiedossamme.
Vastuuhenkilö: Järjestösihteeri. Tekijat: järjestösihteeri, kaikki toimihenkilöt toimittavat omia aiheitaan järjestösihteerille.
Mittarit: Lähetettyjen kirjeiden määrä, avausprosentti, hyöty kysytaan jäsenkyselyssa.

3. SISÄINEN VIESTINTÄ: keskustelut, sähköpostiviestit, Whatsapp-viestit, puhelut

Tavoite: Turvata sisäinen tiedonkulku toimihenkilöiden välillä.
- Sähköposti = ensisijainen tärkeille asioille, jotka eivät vaadi välitöntä reagointia. Lähetä viesti vain niille, joita asia koskee.
- Puhelu = kiireelliset asiat, jotka vaativat reagointia heti.
- WhatsApp = epäviralliseen keskusteluun.
Kohderyhmä: Henkilökunta. Vastuuhenkilö: Jokainen toimihenkilö.
Mittarit: Toimihenkilöiden subjektiivinen kokemus sisäisen viestinnän onnistumisesta.

4. KRIISIVIESTINTÄSUUNNITELMA (erillinen asiakirja)
Kanava/kanavat valitaan tarpeen mukaan.
Tavoite: Mahdollisuus reagoida nopeasti ennalta suunnitellulla tavalla yllättäviin ja hankaliin tilanteisiin.
Kohderyhmä: Valitaan tarpeen mukaan. Vastuuhenkilö: Toiminnanjohtaja.
Mittarit: Kriisiviestinnän onnistuminen.`,

// ══════ FILE READING ══════
const readFileAsText=async(file)=>{
  if(file.name.endsWith('.txt')||file.name.endsWith('.md')){
    return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file)})
  }
  if(file.name.endsWith('.pdf')&&window.pdfjsLib){
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const data=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(new Uint8Array(e.target.result));r.onerror=rej;r.readAsArrayBuffer(file)});
    const pdf=await window.pdfjsLib.getDocument({data}).promise;
    let text='';for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const content=await page.getTextContent();text+=content.items.map(x=>x.str).join(' ')+'\n'}
    return text
  }
  return null
};

// ══════ SMART STRATEGY PARSER ══════
const parseStrategyText=(text)=>{
  // Split into paragraphs (not just lines) for better context
  const paras=text.split(/\n{2,}|\r\n{2,}/).map(p=>p.replace(/\s+/g,' ').trim()).filter(p=>p.length>10);
  // Also collect individual sentences
  const sentences=text.split(/[.!?]\s+/).map(s=>s.trim()).filter(s=>s.length>8&&s.length<200);
  const goals=[];const auds=[];const vals=[];const tones=[];const excerpts={goals:[],auds:[],vals:[],tone:[]};

  // Goal patterns — look for numbers + context
  const numPat=/(\d[\d\s,.]*)\s*(prosentti|%|€|euroa|kpl|hlö|henki|kavij|kerta|vuosi|kk|kuukau|visitor|euro|increase|target|user|member|subscriber|follower)/gi;
  const goalContext=/tavoite|paämäärä|kasv|saavut|mittari|KPI|tavoittee|pyri|goal|target|objective|increase|achieve|metric|reach|grow/i;
  // Audience patterns
  const audContext=/kohde|kohderyhmä|yleisö|asiakas|segmentt|ikäryhmä|ikäluok|perhe|nuor|aikuis|ammattilai|kuluttaj|audience|target.?group|customer|segment|demographic|persona|user.?group/i;
  // Value patterns
  const valContext=/arvo|brändi|brand|periaate|lupauk|ydin|arvomme|brändiarvo|missi|visi|value|principle|mission|vision|purpose|commitment|pillar/i;
  // Tone patterns
  const toneContext=/sävy|tyyli|ääni|viestinnän|tone|voice|style|manner|communication.?style/i;
  const toneAdj=/innostav|asiallinen|läpinäkyvä|iloinen|lämmin|rohkea|ammattimai|leikkis|rauhallinen|virallinen|helposti|rento|inspiring|professional|friendly|warm|bold|playful|calm|formal|approachable|casual|energetic|trustworthy|authentic/gi;

  // Process paragraphs for context-aware extraction
  paras.forEach(p=>{const lo=p.toLowerCase();
    // Goals: paragraphs with numbers and goal-related words
    if(goalContext.test(lo)){
      const nums=[...p.matchAll(numPat)];
      if(nums.length){nums.forEach(nm=>{
        // Get the sentence containing this number
        const idx=p.indexOf(nm[0]);const start=Math.max(0,p.lastIndexOf('.',idx-1)+1);const end=Math.min(p.length,p.indexOf('.',idx+1));
        const sent=p.slice(start,end>start?end:undefined).trim();
        if(sent.length>5)goals.push({m:nm[1].trim()+' '+nm[2],t:sent.slice(0,60).replace(/[.:;,]+$/,''),d:'',p:0,excerpt:p.slice(0,120)})
      })} else {
        // Goal paragraph without numbers
        const sents=p.split(/[.!?]+/).filter(s=>goalContext.test(s.toLowerCase())&&s.trim().length>10);
        sents.slice(0,2).forEach(s=>goals.push({m:'\u2014',t:s.trim().slice(0,60).replace(/[.:;,]+$/,''),d:'',p:0,excerpt:p.slice(0,120)}))
      }
      excerpts.goals.push(p.slice(0,150));
    }
    // Audiences
    if(audContext.test(lo)){
      const sents=p.split(/[.!?]+/).filter(s=>s.trim().length>10);
      sents.forEach(s=>{const st=s.trim();if(audContext.test(st.toLowerCase())&&st.length>10){
        auds.push({n:st.slice(0,40).replace(/[.:;,]+$/,''),d:st.slice(0,80),c:['Some'],excerpt:p.slice(0,120)})
      }});excerpts.auds.push(p.slice(0,150));
    }
    // Values
    if(valContext.test(lo)){
      const sents=p.split(/[.!?:•\-–]+/).filter(s=>s.trim().length>3&&s.trim().length<80);
      sents.forEach(s=>{const st=s.trim();if(st.length>3&&valContext.test(lo)){
        vals.push({i:st[0]?.toUpperCase()||'*',t:st.slice(0,35).replace(/[.:;,]+$/,''),d:st.slice(0,60),excerpt:p.slice(0,120)})
      }});excerpts.vals.push(p.slice(0,150));
    }
    // Tones
    if(toneContext.test(lo)||toneAdj.test(lo)){
      const matches=[...p.matchAll(toneAdj)];
      matches.forEach(m=>{const w=m[0];if(w.length>3)tones.push(w.charAt(0).toUpperCase()+w.slice(1))});
      if(matches.length)excerpts.tone.push(p.slice(0,150));
    }
  });

  // Deduplicate
  const uniqGoals=goals.filter((g,i,a)=>a.findIndex(x=>x.t===g.t)===i).slice(0,6);
  const uniqAuds=auds.filter((a,i,arr)=>arr.findIndex(x=>x.n===a.n)===i).slice(0,6);
  const uniqVals=vals.filter((v,i,a)=>a.findIndex(x=>x.t===v.t)===i).slice(0,5);
  const uniqTones=[...new Set(tones)].slice(0,8);

  return{goals:uniqGoals,auds:uniqAuds,vals:uniqVals,tone:uniqTones,excerpts,rawLength:text.length,paraCount:paras.length}
};

const genBrief=(text,budget,res,org)=>{const l=text.toLowerCase(),b=parseInt(budget)||0,ppl=res.filter(r=>r.ty==='person'),low=b>0&&b<500;
  const gNames=org.goals.map(g=>g.t);const g1=gNames[0]||'Päätavoite';const g2=gNames[1]||'Tavoittavuus';
  let r={sum:'',props:[],time:'',goals:[],warn:''};
  if(low)r.warn=`Budjettinne (${b}\u20ac) on rajallinen. Suosittelen keskittymista yhteen kanavaan tehokkaasti.`;
  if(l.includes('kampanja')||l.includes('markkinoi')||l.includes('tapahtum')||l.includes('some')){
    r.sum=`Analysoin tarpeenne ${org.s||org.name}:n strategian pohjalta.${org.auds.length?' Kohderyhmienne tavoittamiseksi painotan visuaalista sisältöä.':''}`;r.goals=[g1,g2];
    const chs=org.channels.length?org.channels.map(c=>c.name):['Instagram'];
    r.props=low?[
      {t:`${chs[0]}-fokuskampanja (3 vko)`,d:'4-6 julkaisua + 5 storya. Yksi kanava, maksimivaikuttavuus.',b:Math.round(b*.6)+'\u20ac',g:g1,pp:ppl.map(p=>p.n),mo:Math.round(b*.6)},
      {t:'Orgaaninen sisältö',d:'2-3 julkaisua omilla resursseilla.',b:'0\u20ac (oma tyo)',g:g2,pp:ppl[0]?[ppl[0].n]:[],mo:0}
    ]:[
      {t:`${chs[0]}-kampanja (4 vko)`,d:`${b>1500?'8-12':'4-6'} julkaisua + storyja.`,b:Math.round(b*.4)+'\u20ac',g:g1,pp:ppl.map(p=>p.n),mo:Math.round(b*.4)},
      {t:`${chs[1]||'Video'}-sisällöt`,d:`${b>1500?'4-6':'2-3'} sisältöä.`,b:Math.round(b*.35)+'\u20ac',g:g2,pp:ppl[0]?[ppl[0].n]:[],mo:Math.round(b*.35)},
      {t:'Kohdennettu somemarkkinointi',d:'Maksettu mainonta valituissa kanavissa.',b:Math.round(b*.25)+'\u20ac',g:g1,pp:[],mo:Math.round(b*.25)}
    ];r.time=low?'3 viikkoa':'4-6 viikkoa';
  } else {
    r.sum=`${org.vals.length?'Brändiarvojenne tulee nakya toteutuksessa.':'Analysoin tarpeenne.'}${ppl.length?' Tiimillanne on osaamista joka kannattaa hyödyntää.':''}`;r.goals=[g2];
    r.props=[{t:'Viestintäsuunnitelma',d:'Räätälöity tavoitteiden pohjalta.',b:Math.round(b*.3)+'\u20ac',g:g2,pp:ppl[0]?[ppl[0].n]:[],mo:Math.round(b*.3)},{t:'Sisältötuotanto',d:'Graafinen suunnittelu, tekstit.',b:Math.round(b*.5)+'\u20ac',g:g1,pp:ppl.map(p=>p.n),mo:Math.round(b*.5)},{t:'Kampanjan hallinta',d:'Ajastus ja raportointi.',b:Math.round(b*.2)+'\u20ac',g:g2,pp:[],mo:Math.round(b*.2)}];
    r.time='Sovitaan yhdessa';}return r;};

const genChat=(q,org,chStats,orgCtx,events,prj)=>{const l=q.toLowerCase();const nm=org.s||org.name||'Organisaatio';const ctx=orgCtx||ORG_CONTEXTS[_activeOrg]||AVL_CONTEXT;const stats=chStats||ctx.channelStats;const evts=events||[];const projects=prj||[];
  // Channel stats / followers
  if(l.includes('seuraaj')||l.includes('follower')||l.includes('tykkaa')||(l.includes('kanav')&&(l.includes('tilast')||l.includes('luku')||l.includes('monta')))){
    const withNums=stats.filter(s=>s.followers);const noNums=stats.filter(s=>!s.followers);
    return`${nm}:n kanavien seuraajat:\n\n${withNums.map(s=>'\u2022 '+s.name+': '+s.followers.toLocaleString()+' '+s.metric+(s.handle?' ('+s.handle+')':'')).join('\n')}${noNums.length?'\n\nEi vielä seurantadataa:\n'+noNums.map(s=>'\u2022 '+s.name+': '+s.note.slice(0,60)).join('\n'):''}\n\nVoit päivittää lukuja Etusivun Tilannekuva-osiosta.`}
  // Campaigns
  if(l.includes('kampanja')||l.includes('campaign')||l.includes('aivoviikko')||l.includes('kippista')||l.includes('selvana')){
    const ms=['tammi','helmi','maalis','huhti','touko','kesa','heina','elo','syys','loka','marras','joulu'];
    return`${nm}:n kampanjat ja viestinnälliset hetket:\n\n${ctx.campaigns.map(c=>'\u2022 '+c.name+(c.month!==null?' ('+ms[c.month]+')':' (jatkuva)')+':\n  '+c.desc.slice(0,100)+'\n  Kanavat: '+c.channels.join(', ')).join('\n\n')}`}
  // Statistics / facts
  if(l.includes('tilasto')||l.includes('luku')||l.includes('fakta')||l.includes('stats')||l.includes('montako')||l.includes('kuinka mon')){
    if(ctx.stats.tbiAnnual)return`Aivovaurioiden avainluvut Suomessa:\n\n\u2022 ${ctx.stats.tbiAnnual.toLocaleString()} aivovammaa vuosittain (>90% lievia)\n\u2022 ${ctx.stats.avhAnnual.toLocaleString()} aivoverenkiertohäiriötapausta vuosittain\n\u2022 ${ctx.stats.combinedLiving.toLocaleString()} ihmista elää seurausten kanssa\n\u2022 Laheisten kanssa ${ctx.stats.withFamilies.toLocaleString()} koskettaa\n\u2022 ${ctx.stats.dailyNew}\n\u2022 ${ctx.stats.alcoholRelated}\n\u2022 ${ctx.stats.childrenSevere}\n\u2022 Aivovammoista ${ctx.stats.malePercent}% miehille, ${ctx.stats.youngAge}\n\u2022 AVH-hoitokustannukset: ${ctx.stats.avhCostPerPatient.toLocaleString()}\u20ac/potilas, ${ctx.stats.avhTotalCost}`;
    const s=ctx.stats;let r=`${nm}:n avainluvut:\n`;if(s.visitorTarget)r+=`\n\u2022 Kävijätavoite 2026: ${s.visitorTarget.toLocaleString()}`;if(s.visitorTarget2025)r+=`\n\u2022 Kävijätavoite 2025: ${s.visitorTarget2025.toLocaleString()}`;if(s.visitorTarget2027)r+=`\n\u2022 Kävijätavoite 2027: ${s.visitorTarget2027.toLocaleString()}`;if(s.model)r+=`\n\u2022 Malli: ${s.model}`;if(s.location)r+=`\n\u2022 Sijainti: ${s.location}`;if(s.budgetNote)r+=`\n\n${s.budgetNote}`;return r.trim()}
  // Key messages
  if(l.includes('ydinviesti')||l.includes('viesti')&&l.includes('teema')||l.includes('avainviesti')){
    return`${nm}:n ydinviestit:\n\n${ctx.keyMessages.map(m=>'\u2022 '+m.title+' ['+m.theme+']:\n  '+m.desc).join('\n\n')}`}
  // Member survey
  if(l.includes('jäsenkysely')||l.includes('kysely')||l.includes('survey')||l.includes('jäsen')&&l.includes('tulos')){
    if(!ctx.memberSurvey)return`${nm}:lla ei ole jäsenkyselydataa saatavilla.`;
    const s=ctx.memberSurvey;
    return`Jäsenkyselyn tulokset (${s.respondents} vastaajaa, ikäryhmästä ${s.ageGroup}):\n\n\u2022 ${s.notFollowSome}% EI seuraa mitaan AVL:n somea\n\u2022 ${s.followFacebook}% seuraa Facebookia\n\u2022 ${s.followWebsite}% seuraa nettisivuja\n\u2022 ${s.readAivoitus}% lukee Aivoitus-lehtea\n\u2022 ${s.preferPrint}% haluaa painetun lehden\n\u2022 ${s.receiveMemberLetter}% saa jäsenkirjeen\n\u2022 ${s.brainInjurySurvivors}% vastaajista itse aivovaurion kokeneita\n\u2022 ${s.preferFaceToFace}% haluaa kasvokkain vertaistukea`}
  // Team
  if(l.includes('tiimi')||l.includes('team')||l.includes('vastuuhenkil')||l.includes('kuka vastaa')||l.includes('kuka tekee')){
    return`${nm}:n viestintätiimi:\n\n${(org.team||[]).map(m=>'\u2022 '+m.name+' ('+m.role+'):\n  '+m.desc).join('\n\n')}`}
  // Aivoitus-lehti
  if(l.includes('aivoitus')||l.includes('lehti')&&!l.includes('lehdisto')){
    const ai=ctx.channelStats.find(c=>c.name==='Aivoitus-lehti');
    return`Aivoitus-lehti:\n\n${ai?.note||''}\n\n2026 numerot ja teemat:\n${ctx.campaigns.filter(c=>c.name.includes('Aivoitus')).map(c=>'\u2022 '+c.name+' (vko '+c.week+'): '+c.desc).join('\n')}${ctx.memberSurvey?'\n\nJäsenkysely: '+ctx.memberSurvey.readAivoitus+'% jäsenistä lukee, '+ctx.memberSurvey.preferPrint+'% haluaa painetun version.':''}`}
  // Organization info
  if(l.includes('organisaatio')||l.includes('avl')&&l.includes('tiet')||l.includes('perustiet')||l.includes('liitto')||l.includes('llff')&&l.includes('tiet')){
    const o=ctx.org;let r=`${o.fullName}\n\nPerustettu: ${o.founded}\nKotipaikka: ${o.hq}`;
    if(o.association)r+=`\nTaustaorganisaatio: ${o.association}`;
    if(o.chair)r+=`\nPuheenjohtaja: ${o.chair}`;if(o.execDirector)r+=`\nToiminnanjohtaja: ${o.execDirector}`;
    if(o.localAssociations)r+=`\nPaikallisyhdistykset: ${o.localAssociations}`;if(o.funder)r+=`\nRahoittaja: ${o.funder}`;
    if(o.volunteers)r+=`\nVapaaehtoisverkosto: ~${o.volunteers} henkilöä`;
    if(o.subtitle)r+=`\n\n${o.subtitle}`;if(o.model)r+=`\nMalli: ${o.model}`;
    if(o.bilingual)r+=`\nViestintä: kaksikielinen (suomi + englanti)`;
    if(o.freeEthos)r+=`\n\n${o.freeEthos}`;
    if(o.expansion2026)r+=`\n\n${o.expansion2026}`;if(o.themeNote)r+=`\n${o.themeNote}`;
    if(o.toivoApp)r+=`\n\n${o.toivoApp}`;
    return r}
  // Goals
  if(l.includes('tavoite')||l.includes('goal')){if(!org.goals.length)return`Strategiassanne ei ole vielä tavoitteita. Lisää ne Strategia-sivulta!`;return`${nm}:n viestintätavoitteet:\n\n${org.goals.map(g=>'\u2022 '+g.t+' ('+g.m+'):\n  '+g.d).join('\n\n')}`}
  // Audiences
  if(l.includes('kohde')||l.includes('yleisö')){if(!org.auds.length)return`Kohderyhmiä ei ole vielä määritelty.`;return`Kohderyhmät:\n\n${org.auds.map(a=>'\u2022 '+a.n+':\n  '+a.d+'\n  Kanavat: '+(a.c||[]).join(', ')).join('\n\n')}`}
  // Ideas
  if(l.includes('ehdot')||l.includes('idea')||l.includes('sisalt')){
    if(ctx.program){return`${nm}:n kontekstin ja strategian pohjalta ehdotan:\n\n\u2022 Instagram Reels: Behind-the-scenes -sarja festivaalin valmistelusta — autenttinen, lämmin\n\u2022 Instagram/TikTok: Kuraattorien esittelyt (Siiri, Hanna, Anna) — persoonallinen ote\n\u2022 Facebook: Countdown-julkaisut festivaaliin — ohjelmiston paljastukset vaiheittain\n\u2022 LinkedIn: Nordic Frames -tekijävieraiden esittely — ammattimainen kärki\n\u2022 Verkkosivut: Elokuvien taustoitusartikkelit — teemaa syventävät\n\nPeriaatteet: orgaaninen sisältö ensin, laatu > volyymi, suomi + englanti.\nIlmaisuus on tärkein erottautumistekijä — korosta sitä.\n\nHaluatko tarkentaa jotain?`}
    const chs=org.channels.length?org.channels.map(c=>c.name):['some'];
    return`Strategianne ja kontekstin pohjalta ehdotan:\n\n\u2022 ${chs[0]||'Facebook'}: Aivoterveysvinkkisarja (#aivoterveysvinkit) — viikoittainen\n\u2022 ${chs[1]||'Instagram'}: Kokemustarina-sarja (#elamajatkuu) — 2x/kk\n\u2022 Kampanjayhteistyo: Kippista kohtuudella -materiaali\n\u2022 Webinaarisarja ammattilaisille (LinkedIn + YouTube)\n\nNama tukevat ydinviestejanne: näkymätön vamma, ennaltaehkäisy, vertaistuki.\n\nHaluatko tarkentaa jotain?`}
  // Values
  if(l.includes('arvo')||l.includes('brand')){if(!org.vals.length)return`Brändiarvoja ei ole vielä määritelty.`;return`Brändiarvot:\n\n${org.vals.map(v=>'\u2022 '+v.t+': '+v.d).join('\n')}`}
  // Tones
  if(l.includes('sävy')||l.includes('tone')){if(!org.tone.length)return`Viestinnän sävyjä ei ole vielä määritelty.`;let toneNote=ctx.aiGuidelines?ctx.aiGuidelines.toneGuide:'Nämä sävyt ohjaavat kaikkea viestintää.';if(ctx.stats.tbiAnnual)toneNote='Erityisesti tärkeä aivovammaviestinnässä, jossa empaattisuus ja luotettavuus ovat avainasemassa.';return`Viestinnän sävyt: ${org.tone.join(', ')}\n\n${toneNote}`}
  // Calendar / publications
  const msNames=['tammikuu','helmikuu','maaliskuu','huhtikuu','toukokuu','kesäkuu','heinäkuu','elokuu','syyskuu','lokakuu','marraskuu','joulukuu'];
  if(l.includes('julkais')||l.includes('kalenteri')||l.includes('ensi kuu')||l.includes('tässä kuu')||l.includes('mitä tulee')||l.includes('aikataulu')){
    const now=new Date();const cm=now.getMonth();const cy=now.getFullYear();
    let targetMonth=cm;let targetYear=cy;
    if(l.includes('ensi kuu')){targetMonth=cm+1;if(targetMonth>11){targetMonth=0;targetYear++}}
    msNames.forEach((mn,i)=>{if(l.includes(mn.slice(0,5)))targetMonth=i});
    const monthEvts=evts.filter(e=>e.month===targetMonth&&e.year===targetYear);
    if(monthEvts.length===0)return`${msNames[targetMonth]} ${targetYear}: ei suunniteltuja julkaisuja.`;
    const byChannel={};monthEvts.forEach(e=>{if(!byChannel[e.ch])byChannel[e.ch]=[];byChannel[e.ch].push(e)});
    return`${nm} — ${msNames[targetMonth]} ${targetYear} (${monthEvts.length} julkaisua):\n\n${Object.entries(byChannel).map(([ch,es])=>ch+':\n'+es.map(e=>'  \u2022 '+e.day+'.'+( targetMonth+1)+'. '+e.t).join('\n')).join('\n\n')}`}
  // Projects / pipeline
  if(l.includes('projekti')||l.includes('pipeline')||l.includes('aktiivi')&&l.includes('projekti')||l.includes('kampanja')&&l.includes('käynnissä')){
    const active=projects.filter(p=>!p.archived);if(!active.length)return`${nm}:lla ei ole vielä projekteja. Luo uusi projekti Projektit-sivulta!`;
    const byStatus={idea:[],active:[],done:[]};active.forEach(p=>byStatus[p.st]?.push(p));
    let r=`${nm}:n projektit (${active.length}):\n`;
    if(byStatus.active.length)r+=`\nTyöstössä (${byStatus.active.length}):\n${byStatus.active.map(p=>'\u2022 '+p.t+(p.deadline?' — DL: '+p.deadline:'')).join('\n')}`;
    if(byStatus.idea.length)r+=`\n\nIdeat (${byStatus.idea.length}):\n${byStatus.idea.map(p=>'\u2022 '+p.t).join('\n')}`;
    if(byStatus.done.length)r+=`\n\nValmiit (${byStatus.done.length}):\n${byStatus.done.map(p=>'\u2022 '+p.t).join('\n')}`;
    const archived=projects.filter(p=>p.archived);if(archived.length)r+=`\n\nArkistoidut: ${archived.length}`;
    return r}
  // Program (LEF-specific)
  if(l.includes('ohjelm')||l.includes('program')||l.includes('elokuv')&&(l.includes('mitä')||l.includes('rakenne'))||l.includes('nordic frames')||l.includes('nøw')||l.includes('kuraatt')){
    if(!ctx.program)return`${nm}:lla ei ole ohjelmistodataa saatavilla.`;
    const p=ctx.program;return`${nm}:n ohjelmiston rakenne 2026:\n\n\u2022 ${p.themed.name}: ${p.themed.desc}\n  Kuraattori: ${p.themed.curator}\n\n\u2022 ${p.nordicFrames.name}: ${p.nordicFrames.desc}\n  Kuraattori: ${p.nordicFrames.curator}\n\n\u2022 ${p.guestProgram.name}: ${p.guestProgram.desc}\n\n\u2022 ${p.now.name}: ${p.now.desc}\n  Vetäjä: ${p.now.leader}\n\n\u2022 ${p.sideProgram.name}: ${p.sideProgram.desc}`}
  // Partnerships
  if(l.includes('kumppan')||l.includes('partner')||l.includes('yhteistyö')||l.includes('rahoitt')||l.includes('sponsor')){
    if(!ctx.partnerships)return`${nm}:lla ei ole kumppanidataa saatavilla.`;
    const p=ctx.partnerships;return`${nm}:n kumppaniverkosto:\n\nRahoitus ja näkyvyys:\n${p.funding.map(f=>'\u2022 '+f).join('\n')}\n\nJärjestökumppanit:\n${p.organizations.map(o=>'\u2022 '+o).join('\n')}\n\nFestivaalikumppanit:\n${p.festivals.map(f=>'\u2022 '+f).join('\n')}\n\nPaikkakumppani: ${p.venue}\nLevityskumppani: ${p.distribution}\n\nPotentiaaliset mediat:\n${p.potentialMedia.map(m=>'\u2022 '+m).join('\n')}`}
  // Meta ads / paid marketing
  if(l.includes('meta')&&l.includes('ad')||l.includes('maksettu')&&l.includes('markkinoin')||l.includes('mainon')||l.includes('boost')||l.includes('budjetti')&&(l.includes('mainon')||l.includes('some'))){
    if(!ctx.metaAds)return`${nm}:lla ei ole Meta-mainonnan dataa saatavilla.`;
    const m=ctx.metaAds;return`${nm} — Meta-mainonta (Instagram & Facebook):\n\n${m.note}\n\nHintatasot Suomessa:\n\u2022 CPM: ${m.cpm}\n\u2022 CPC: ${m.cpc}\n\u2022 Uusi seuraaja: ${m.costPerFollower}\n\nBudjettitasot:\n${m.budgetLevels.map(b=>'\u2022 '+b.name+' ('+b.range+'): '+b.reach+'\n  '+b.desc).join('\n\n')}\n\nVinkit:\n${m.tips.map(t=>'\u2022 '+t).join('\n')}`}
  // Brand (LEF-specific brand object, or general brand values)
  if(l.includes('brändi')||l.includes('mielikuv')||l.includes('brand')&&!l.includes('arvo')){
    if(ctx.brand){const b=ctx.brand;let r=`${nm}:n brändi:\n\nMielikuvat: ${b.values.join(', ')}\nSävyt: ${b.tones.join(', ')}\nFontti: ${b.font}\n\nVärit:\n${Object.entries(b.colors).map(([k,v])=>'\u2022 '+k+': '+v).join('\n')}`;if(b.principles)r+=`\n\nViestinnän periaatteet:\n${b.principles.map(p=>'\u2022 '+p).join('\n')}`;return r}
    if(org.vals.length)return`${nm}:n brändiarvot:\n\n${org.vals.map(v=>'\u2022 '+v.t+': '+v.d).join('\n')}`;
    return`Bränditietoja ei ole vielä määritelty.`}

  // Default: rich overview
  let overview=`${nm} \u2014 viestinnän tilannekuva:\n\n`;
  if(ctx.stats.dailyNew)overview+=`\u2022 ${ctx.stats.dailyNew}\n`;
  if(ctx.stats.combinedLiving)overview+=`\u2022 ${ctx.stats.combinedLiving.toLocaleString()} ihmistä elää aivovaurion kanssa\n`;
  if(ctx.stats.visitorTarget)overview+=`\u2022 Kävijätavoite 2026: ${ctx.stats.visitorTarget.toLocaleString()}\n`;
  if(ctx.org.subtitle)overview+=`\u2022 ${ctx.org.subtitle}\n`;
  if(ctx.org.expansion2026)overview+=`\u2022 2026: viikon mittainen festivaali\n`;
  if(ctx.program)overview+=`\u2022 ${Object.keys(ctx.program).length} ohjelmistolohkoa\n`;
  if(org.goals.length)overview+=`\u2022 ${org.goals.length} viestintätavoitetta\n`;
  if(org.channels.length)overview+=`\u2022 ${org.channels.length} viestintäkanavaa\n`;
  if((org.team||[]).length)overview+=`\u2022 ${org.team.length} tiimijäsentä\n`;
  if(ctx.campaigns.length)overview+=`\u2022 ${ctx.campaigns.length} kampanjaa/viestinnällistä hetkeä\n`;
  if(ctx.partnerships)overview+=`\u2022 ${ctx.partnerships.funding.length+ctx.partnerships.organizations.length+ctx.partnerships.festivals.length} kumppania\n`;
  let topics='seuraajat, kampanjat, tilastot, ydinviestit, tiimi, tavoitteet, kohderyhmät, arvot, sävyt, organisaatio';
  if(ctx.program)topics+=', ohjelmisto';if(ctx.partnerships)topics+=', kumppanit';if(ctx.metaAds)topics+=', Meta-mainonta';
  overview+=`\nKysy tarkemmin:\n${topics}`;
  return overview};

const useToast=()=>{const[t,sT]=useState([]);return{toasts:t,add:(m,ty='info')=>{const id=Date.now();sT(p=>[...p,{id,message:m,type:ty}]);setTimeout(()=>sT(p=>p.filter(x=>x.id!==id)),3500)}}};

function Toasts({t}){return<div className="toast-wrap">{t.map(x=><div key={x.id} className={`toast ${x.type}`}>{x.message}</div>)}</div>}

// ══════ ONBOARDING ══════
function Onboarding({onDone,toast,setOrg,t}){
  const[step,setStep]=useState(0);
  const[name,setName]=useState('');const[shortName,setShort]=useState('');const[slogan,setSlogan]=useState('');
  const[selChs,setSelChs]=useState([]); // array of {name,color,ic}
  const[sMode,setSMode]=useState(null);const[sText,setSText]=useState('');
  // Step 2 manual fields
  const[goals,setGoals]=useState([]);const[gm,setGm]=useState('');const[gt,setGt]=useState('');const[gd,setGd]=useState('');
  const[auds,setAuds]=useState([]);const[an,setAn]=useState('');const[ad,setAd]=useState('');
  const[vals,setVals]=useState([]);const[vi,setVi]=useState('');const[vt,setVt]=useState('');const[vd,setVd]=useState('');
  const[toneInput,setToneInput]=useState('');const[tones,setTones]=useState([]);
  const[msgs,setMsgs]=useState([]);const[typing,setTyping]=useState(false);const[done,setDone]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:'smooth'})},[msgs]);
  const toggleCh=(ch)=>setSelChs(p=>p.find(c=>c.name===ch.name)?p.filter(c=>c.name!==ch.name):[...p,ch]);
  const isChSel=(name)=>selChs.some(c=>c.name===name);
  const[showExtra,setShowExtra]=useState(false);
  const[customName,setCustomName]=useState('');const[customColor,setCustomColor]=useState('#9b7cf6');
  const addCustomCh=()=>{if(customName.trim()&&!isChSel(customName)){setSelChs(p=>[...p,{name:customName,color:customColor,ic:'+'}]);setCustomName('')}};
  const selChannels=selChs.map(c=>c.name);

  const addGoal=()=>{if(gt.trim()){setGoals(p=>[...p,{m:gm||'—',t:gt,d:gd,p:0}]);setGm('');setGt('');setGd('')}};
  const addAud=()=>{if(an.trim()){setAuds(p=>[...p,{n:an,d:ad,c:selChannels.length?selChannels:['Some']}]);setAn('');setAd('')}};
  const addVal=()=>{if(vt.trim()){setVals(p=>[...p,{i:vi||vt[0]?.toUpperCase()||'*',t:vt,d:vd}]);setVi('');setVt('');setVd('')}};
  const addTone=()=>{if(toneInput.trim()&&!tones.includes(toneInput.trim())){setTones(p=>[...p,toneInput.trim()]);setToneInput('')}};

  const parseStrategy=(text)=>{
    // Simulated AI parsing of free-form strategy text
    const lines=text.split(/[\n.!]+/).map(l=>l.trim()).filter(Boolean);
    const pg=[];const pa=[];const pv=[];const pt=[];
    lines.forEach(l=>{const lo=l.toLowerCase();
      if(lo.match(/tavoite|goal|kavij|kasv|myyn|lisä/)){pg.push({m:'—',t:l.slice(0,40),d:'',p:0})}
      else if(lo.match(/kohde|yleisö|asiak|segmen|nuor|perh/)){pa.push({n:l.slice(0,30),d:l.slice(0,60),c:selChannels.length?selChannels:['Some']})}
      else if(lo.match(/arvo|brand|laatu|luotet|yhteis|avoin/)){pv.push({i:l[0]?.toUpperCase()||'*',t:l.slice(0,25),d:l.slice(0,50)})}
      else if(lo.match(/sävy|tyyli|tone|innos|asial|lapin|iloi/)){pt.push(l.slice(0,20))}
    });
    return{goals:pg.slice(0,4),auds:pa.slice(0,4),vals:pv.slice(0,3),tone:pt.slice(0,5)};
  };

  const startAI=async()=>{
    setStep(3);
    const hasSt=(sMode==='text'&&sText.trim())||(sMode==='manual'&&(goals.length||auds.length));
    let finalGoals=goals,finalAuds=auds,finalVals=vals,finalTones=tones;
    if(sMode==='text'&&sText.trim()){const parsed=parseStrategy(sText);finalGoals=parsed.goals;finalAuds=parsed.auds;finalVals=parsed.vals;finalTones=parsed.tone}

    await wait(600);setMsgs([{r:'assistant',c:`Hienoa! Analysoin nyt ${name||'organisaationne'} tietoja${hasSt?' ja strategiaa':''}.`}]);
    setTyping(true);await wait(1800);setTyping(false);

    let summary=`Tassa on yhteenvetoni:\n\n`;
    summary+=`Organisaatio: ${name||'(ei nimetty)'}${slogan?' — "'+slogan+'"':''}\n`;
    summary+=`Kanavat: ${selChannels.length?selChannels.join(', '):'ei valittu'}\n`;
    if(finalGoals.length)summary+=`\nTavoitteet (${finalGoals.length}):\n${finalGoals.map(g=>'\u2022 '+g.t+(g.m&&g.m!=='—'?' ('+g.m+')':'')).join('\n')}`;
    if(finalAuds.length)summary+=`\n\nKohderyhmät (${finalAuds.length}):\n${finalAuds.map(a=>'\u2022 '+a.n+(a.d?': '+a.d:'')).join('\n')}`;
    if(finalVals.length)summary+=`\n\nArvot: ${finalVals.map(v=>v.t).join(', ')}`;
    if(finalTones.length)summary+=`\nSävyt: ${finalTones.join(', ')}`;
    if(!hasSt)summary+=`\n\nStrategiaa ei vielä syotetty. Voit lisata sen myöhemmin Strategia-sivulta.`;
    summary+=`\n\nOnko tämä oikein?`;

    setMsgs(p=>[...p,{r:'assistant',c:summary,opts:['Kyllä, oikein!','Haluan tarkentaa myöhemmin']}]);

    // Save org data — channels as objects with name+color
    setOrg({name:name||'',s:shortName||'',slogan:slogan||'',goals:finalGoals,vals:finalVals,auds:finalAuds,tone:finalTones,channels:selChs});
  };

  const clickOpt=async o=>{setMsgs(p=>[...p,{r:'user',c:o}]);setTyping(true);await wait(1000);setTyping(false);
    if(!done){setMsgs(p=>[...p,{r:'assistant',c:'Loistavaa! Voit aina tarkentaa näitä Strategia-sivulta.\n\nTervetuloa Momentumiin!',opts:['Aloitetaan \u2192']}]);setDone(true)}
    else onDone()};

  if(step===0)return(
    <div className="onb"><div className="onb-wrap"><div className="onb-logo"><img src="media/brand/hetki-logo-white.png" alt="Hetki" style={{height:48,width:'auto'}}/><h1>Momentum</h1><p>{t('obWelcome')}</p></div>
    <div className="onb-card"><div className="onb-head"><h2>{t('obLogin')}</h2><p>{t('obStart')}</p></div>
    <div className="onb-body">
      <div className="field"><label>{t('obEmail')}</label><input className="input" placeholder="nimi@yritys.fi"/></div>

        <div className={`strat-opt ${sMode==='upload'?'sel':''}`} onClick={()=>setSMode('upload')}><h4>{t('obUpload')}</h4><p>{t('obUploadSub')}</p></div>
      </div>

      {sMode==='text'&&<div>
        <textarea className="input textarea textarea-lg" placeholder="Kerro organisaatiosi viestintästrategiasta vapaasti. Esim:\n\nTavoitteenamme on kasvattaa kävijämääraa 4500:een. Kohderyhmämme ovat nuoret aikuiset ja perheet. Brändiarvomme ovat ammattimaisuus ja yhteisollisyys. Viestinnän sävy on innoittava ja asiallinen." value={sText} onChange={e=>setSText(e.target.value)}/>
        <div className="tip-box">AI jäsentää tekstistäsi tavoitteet, kohderyhmät, arvot ja sävyt automaattisesti. Voit tarkentaa myöhemmin.</div>
      </div>}

      {sMode==='manual'&&<div>

          <div className="add-row"><input className="input" placeholder="Nimi *" value={an} onChange={e=>setAn(e.target.value)} style={{flex:1}}/><input className="input" placeholder="Kuvaus" value={ad} onChange={e=>setAd(e.target.value)} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addAud} disabled={!an.trim()}>+</button></div>
        </div>

          <div className="add-row"><input className="input" placeholder="Kirjain" value={vi} onChange={e=>setVi(e.target.value)} style={{flex:.3}}/><input className="input" placeholder="Arvo *" value={vt} onChange={e=>setVt(e.target.value)} style={{flex:1}}/><input className="input" placeholder="Kuvaus" value={vd} onChange={e=>setVd(e.target.value)} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addVal} disabled={!vt.trim()}>+</button></div>
        </div>

          <div className="tone-list" style={{marginBottom:'.5rem'}}>{tones.map((t,i)=><span key={i} className="tone" style={{cursor:'pointer'}} onClick={()=>setTones(p=>p.filter((_,j)=>j!==i))}>{t} \u00d7</span>)}</div>
          <div className="add-row"><input className="input" placeholder="esim. Innoittava" value={toneInput} onChange={e=>setToneInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&addTone()} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addTone} disabled={!toneInput.trim()}>+</button></div>

      {sMode==='upload'&&<div style={{background:'var(--elev)',border:'2px dashed var(--border)',borderRadius:'var(--rl)',padding:'2rem',textAlign:'center',cursor:'pointer'}} onClick={()=>{setSMode('text');toast('Demossa: kayta tekstikenttaa tai täytä kentat','info')}}><p style={{color:'var(--t3)',fontSize:'.82rem',fontWeight:500}}>Raahaa tiedosto tähän tai klikkaa</p></div>}

  return(
    <div className="onb"><div className="onb-wrap" style={{maxWidth:700}}><div className="onb-logo"><img src="media/brand/hetki-logo-white.png" alt="Hetki" style={{height:48,width:'auto'}}/><h1>Momentum</h1><p>{t('obAITitle')}</p></div>
