// ══════ DASHBOARD ══════
function Home({go,toast,prj,events,org,t,chStats,setChStats,orgCtx}){
  const hasStrat=org.goals.length>0||org.auds.length>0||org.vals.length>0;
  const hasPrj=prj.length>0;const hasEv=events.length>0;
  const[editingStats,setEditingStats]=useState(false);
  const[editStats,setEditStats]=useState([]);
  const[tkSection,setTkSection]=useState(['channels','stats','campaigns','messages']);
  const togTk=s=>setTkSection(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  const stratParts=[];
  if(org.goals.length)stratParts.push(org.goals.length+' '+t('foundGoals'));
  if(org.auds.length)stratParts.push(org.auds.length+' '+t('foundAuds'));
  if(org.vals.length)stratParts.push(org.vals.length+' '+t('foundVals'));
  if(org.tone.length)stratParts.push(org.tone.length+' '+t('foundTones'));
  if(org.channels.length)stratParts.push(org.channels.length+' '+t('channels').toLowerCase());
  const missingParts=[];
  if(!org.goals.length)missingParts.push(t('goals').toLowerCase());
  if(!org.auds.length)missingParts.push(t('audiences').toLowerCase());
  if(!org.channels.length)missingParts.push(t('channels').toLowerCase());

  // Upcoming events (next 14 days)
  const now=new Date();const upcoming=events.filter(e=>{if(e.month===undefined)return false;const d=new Date(e.year,e.month,e.day);return d>=now&&d<=new Date(now.getTime()+14*86400000)}).slice(0,5);

  const steps=[
    {key:'strat',title:t('step1Title'),desc:t('step1Desc'),icon:'\u25c8',done:hasStrat,action:()=>go('strategy'),color:'var(--hetki-pink)'},
    {key:'prj',title:t('step2Title'),desc:t('step2Desc'),icon:'+',done:hasPrj,action:()=>go('pipeline'),color:'var(--pri-l)'},
    {key:'cal',title:t('step3Title'),desc:t('step3Desc'),icon:'\u25a6',done:hasEv,action:()=>go('calendar'),color:'var(--yellow)'}];

  const ctx=orgCtx||ORG_CONTEXTS[_activeOrg]||AVL_CONTEXT;
  const ms=t('months');const msShort=t('monthsShort');

  // Channel icon lookup
  const chIcon=(name)=>{const ch=org.channels.find(c=>c.name===name);return ch?ch.ic:'--'};
  const chColor=(name)=>{const ch=org.channels.find(c=>c.name===name);return ch?ch.color:'#8b95a8'};

  // Start editing follower counts
  const startEditStats=()=>{setEditStats(chStats.map(s=>({...s})));setEditingStats(true)};
  const saveEditStats=()=>{setChStats(editStats.map(s=>({...s,lastUpdated:new Date().toISOString().slice(0,7)})));setEditingStats(false);toast(t('updated'),'success')};
  const updateEditStat=(idx,val)=>{setEditStats(p=>p.map((s,i)=>i===idx?{...s,followers:val===''?null:parseInt(val)||0}:s))};

  // Current/upcoming campaigns
  const currentMonth=now.getMonth();
  const sortedCampaigns=[...ctx.campaigns].sort((a,b)=>{
    if(a.month===null&&b.month===null)return 0;if(a.month===null)return 1;if(b.month===null)return -1;
    const da=(a.month-currentMonth+12)%12;const db=(b.month-currentMonth+12)%12;return da-db});

  return(<div className="page-enter" style={{maxWidth:900,margin:'0 auto'}}>
    {/* Hero */}
    <div style={{marginBottom:'2rem',animation:'fadeUp .5s ease'}}>
      <h1 style={{fontSize:'1.8rem',fontWeight:800,letterSpacing:'-.03em',marginBottom:'.4rem'}}>{t('welcomeTo')}{org.name?', '+org.name:''}</h1>
      <p style={{color:'var(--t2)',fontSize:'.92rem',lineHeight:1.7,maxWidth:600,fontWeight:500}}>{t('welcomeDesc')}</p>
    </div>

    {/* Get Started steps */}
    <div style={{marginBottom:'1.75rem'}}>
      <h3 style={{fontSize:'.8rem',fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.75rem'}}>{t('getStarted')}</h3>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.75rem'}}>
        {steps.map((s,i)=>{const status=s.done?t('stepDone'):i===0||(i>0&&steps[i-1].done)?t('stepNext'):t('stepTodo');
          const isNext=!s.done&&(i===0||(i>0&&steps[i-1].done));
          return<div key={s.key} className="dc" style={{cursor:'pointer',border:isNext?'1px solid var(--pri)':'1px solid var(--border)',animation:`fadeUp .4s ease ${i*.08}s backwards`}} onClick={s.action}>
            <div style={{padding:'1.25rem'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'.75rem'}}>
                <div style={{width:40,height:40,borderRadius:'var(--r)',background:s.done?'rgba(45,212,160,.1)':'rgba(26,143,196,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem',color:s.done?'var(--green)':s.color,fontWeight:800}}>{s.done?'\u2713':s.icon}</div>
                <span style={{fontSize:'.6rem',padding:'.2rem .5rem',borderRadius:9999,fontWeight:700,background:s.done?'rgba(45,212,160,.12)':isNext?'rgba(26,143,196,.12)':'var(--elev)',color:s.done?'var(--green)':isNext?'var(--pri-l)':'var(--t3)'}}>{status}</span>
              </div>
              <h4 style={{fontSize:'.88rem',fontWeight:700,marginBottom:'.25rem',letterSpacing:'-.01em'}}>{s.title}</h4>
              <p style={{fontSize:'.75rem',color:'var(--t2)',fontWeight:500,lineHeight:1.5}}>{s.desc}</p>
            </div>
          </div>})}
      </div>
    </div>

    {/* ══════ TILANNEKUVA ══════ */}
    <div style={{marginBottom:'1.75rem'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
        <h3 style={{fontSize:'.8rem',fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.06em'}}>{t('tilannekuva')}</h3>
        {ctx.org.expansion2026&&<span style={{fontSize:'.65rem',color:'var(--t3)',fontWeight:500}}>{ctx.org.expansion2026.slice(0,60)}...</span>}
      </div>

      {/* ── Channel Stats ── */}
      <div className="dc" style={{marginBottom:'.75rem',animation:'fadeUp .4s ease .12s backwards'}}>
        <div className="dc-h" style={{cursor:'pointer'}} onClick={()=>togTk('channels')}>
          <h3 style={{display:'flex',alignItems:'center',gap:'.5rem'}}>{t('channelStatsTitle')}{chStats.filter(s=>s.followers).length>0&&<span style={{fontSize:'.6rem',padding:'.15rem .45rem',borderRadius:9999,background:'rgba(45,212,160,.1)',color:'var(--green)',fontWeight:700}}>{chStats.filter(s=>s.followers).length} aktiivista</span>}</h3>
          <div style={{display:'flex',gap:'.4rem',alignItems:'center'}}>
            {!editingStats&&<button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();startEditStats()}} style={{fontSize:'.7rem'}}>{t('editCounts')}</button>}
            <span style={{color:'var(--t3)',fontSize:'.75rem'}}>{tkSection.includes('channels')?'\u2212':'+'}</span>
          </div>
        </div>
        {tkSection.includes('channels')&&<div className="dc-b">
          {editingStats?<div>
            <div className="tk-grid">{editStats.map((s,i)=>{const co=chColor(s.name);return<div key={i} className="tk-card" style={{borderColor:co+'30'}}>
              <h4 style={{color:co}}>{chIcon(s.name)} {s.name}</h4>
              <input className="tk-edit-num" value={s.followers===null?'':s.followers} onChange={e=>updateEditStat(i,e.target.value)} placeholder="\u2014" type="number"/>
              <div className="tk-label">{s.metric}</div>
            </div>})}</div>
            <div style={{marginTop:'.75rem',display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>setEditingStats(false)}>{t('cancel')}</button>
              <button className="btn btn-primary btn-sm" onClick={saveEditStats}>{t('saveCounts')}</button>
            </div>
          </div>
          :<div className="tk-grid">{chStats.map((s,i)=>{const co=chColor(s.name);const hasNum=s.followers!==null&&s.followers!==undefined;
            return<div key={i} className="tk-card" style={{borderColor:co+'20'}}>
              <h4>{chIcon(s.name)} {s.name}</h4>

// ══════ DEADLINE HELPERS ══════
const deadlineColor=(dl)=>{if(!dl)return null;const now=new Date();const d=new Date(dl);const diff=d-now;const day=86400000;
  if(diff<0)return{color:'var(--red,#ef4444)',bg:'rgba(239,68,68,.1)',label:'Myöhässä'};
  if(diff<7*day)return{color:'var(--red,#ef4444)',bg:'rgba(239,68,68,.1)',label:Math.ceil(diff/day)+' pv jäljellä'};
  if(diff<30*day)return{color:'var(--yellow)',bg:'rgba(245,197,66,.1)',label:Math.ceil(diff/day)+' pv jäljellä'};
  return{color:'var(--green)',bg:'rgba(45,212,160,.1)',label:Math.ceil(diff/day)+' pv jäljellä'}};
const taskProgress=(tasks)=>{if(!tasks||!tasks.length)return 0;return Math.round(tasks.filter(t=>t.done).length/tasks.length*100)};

// ══════ NEW PROJECT (simple, no AI) ══════
function NewProject({toast,prj,setPrj,onDone,t}){
  const[title,setTitle]=useState('');const[desc,setDesc]=useState('');const[deadline,setDL]=useState('');
  const[nn,setNN]=useState('');const[nr,setNR]=useState('');
  const[team,setTeam]=useState([]);

  const addMember=()=>{if(!nn.trim())return;setTeam(p=>[...p,{name:nn,role:nr||'Tiimijäsen',avatar:nn[0].toUpperCase()}]);setNN('');setNR('')};
  const save=()=>{if(!title.trim())return;
    setPrj(p=>[...p,{id:Date.now(),t:title,d:desc,st:'idea',team,comments:[],deadline:deadline||'',tasks:[],archived:false,createdAt:Date.now()}]);
    toast('Projekti luotu','success');onDone()};

  return(<div className="page-enter" style={{maxWidth:640,margin:'0 auto'}}>
    <button className="btn btn-ghost" onClick={onDone} style={{marginBottom:'1rem'}}>{'\u2190'} Takaisin</button>
    <div className="bcard"><div className="bcard-h"><h3>Uusi projekti</h3><p>Luo uusi projekti ja aloita seuranta.</p></div>
    <div className="bcard-b">
      <div className="field"><label>Projektin nimi *</label><input className="input" placeholder="Esim. Kesäkampanja 2026" value={title} onChange={e=>setTitle(e.target.value)}/></div>
      <div className="field"><label>Kuvaus</label><textarea className="input textarea" placeholder="Mitä projektissa tehdään?" value={desc} onChange={e=>setDesc(e.target.value)} style={{minHeight:80}}/></div>
      <div className="field"><label>Deadline</label><input className="input" type="date" value={deadline} onChange={e=>setDL(e.target.value)}/></div>

      {/* Tiimi */}
      <div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid var(--border)'}}>
        <label style={{display:'block',fontSize:'.75rem',fontWeight:600,color:'var(--t3)',marginBottom:'.5rem',textTransform:'uppercase',letterSpacing:'.04em'}}>Tiimi</label>
        {team.map((m,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.35rem'}}>
          <div className="ava" style={{width:26,height:26,fontSize:'.6rem'}}>{m.avatar}</div>
          <span style={{fontSize:'.82rem',fontWeight:500}}>{m.name}</span>
          <span style={{fontSize:'.7rem',color:'var(--t3)'}}>{m.role}</span>
          <button className="res-rm" style={{marginLeft:'auto'}} onClick={()=>setTeam(p=>p.filter((_,j)=>j!==i))}>{'\u00d7'}</button>
        </div>)}
        <div style={{display:'flex',gap:'.5rem',marginTop:'.5rem'}}>
          <input className="input" placeholder="Nimi" value={nn} onChange={e=>setNN(e.target.value)} style={{flex:1}}/>
          <input className="input" placeholder="Rooli" value={nr} onChange={e=>setNR(e.target.value)} style={{flex:1}}/>
          <button className="btn btn-secondary btn-sm" onClick={addMember} disabled={!nn.trim()}>+</button>
        </div>
      </div>

      <div style={{display:'flex',justifyContent:'flex-end',gap:'.5rem',marginTop:'1.5rem'}}>
        <button className="btn btn-ghost" onClick={onDone}>Peruuta</button>
        <button className="btn btn-primary" onClick={save} disabled={!title.trim()}>Luo projekti</button>
      </div>
    </div></div>
  </div>);}

// ══════ PIPELINE ══════
function Pipeline({prj,setPrj,toast,t,org}){
  const[mode,setMode]=useState('kanban');
  const[selId,setSelId]=useState(null);
  const[showArchive,setShowArchive]=useState(false);
  const[dragId,setDragId]=useState(null);

  const cols=[{k:'idea',t:'Ideat',c:'var(--pri-l)'},{k:'active',t:'Työstössä',c:'var(--green)'},{k:'done',t:'Valmiit',c:'var(--purple)'}];
  const mv=(id,s,e)=>{if(e)e.stopPropagation();setPrj(p=>p.map(x=>x.id===id?{...x,st:s}:x));toast('Tila päivitetty','success')};
  const archive=(id,e)=>{if(e)e.stopPropagation();setPrj(p=>p.map(x=>x.id===id?{...x,archived:true}:x));toast('Arkistoitu','info')};
  const unarchive=(id)=>{setPrj(p=>p.map(x=>x.id===id?{...x,archived:false}:x));toast('Palautettu','success')};
  const del=(id)=>{setPrj(p=>p.filter(x=>x.id!==id));toast('Poistettu','info')};

  // Drag handlers
  const onDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed='move'};
  const onDragOver=(e)=>{e.preventDefault();e.dataTransfer.dropEffect='move'};
  const onDrop=(e,targetSt)=>{e.preventDefault();if(dragId){setPrj(p=>p.map(x=>x.id===dragId?{...x,st:targetSt}:x));setDragId(null);toast('Tila päivitetty','success')}};

  // Detail view
  if(mode==='detail'&&selId){const proj=prj.find(p=>p.id===selId);if(proj)return<ProjectDetail project={proj} prj={prj} setPrj={setPrj} toast={toast} t={t} onBack={()=>{setMode('kanban');setSelId(null)}}/>}
  // New project
  if(mode==='new')return<NewProject toast={toast} prj={prj} setPrj={setPrj} onDone={()=>setMode('kanban')} t={t}/>;

  const activePrj=prj.filter(p=>!p.archived);
  const archivedPrj=prj.filter(p=>p.archived);
  const openDetail=(id)=>{setSelId(id);setMode('detail')};

  return(<div className="page-enter">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem',flexWrap:'wrap',gap:'.5rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
        <div style={{fontSize:'.85rem',color:'var(--t2)',fontWeight:500}}>{activePrj.length} projektia</div>
        {archivedPrj.length>0&&<button className="btn btn-ghost btn-sm" onClick={()=>setShowArchive(!showArchive)} style={{fontSize:'.75rem'}}>
          {showArchive?'Piilota arkisto':'Arkisto ('+archivedPrj.length+')'}
        </button>}
      </div>
      <button className="btn btn-primary btn-sm" onClick={()=>setMode('new')}>+ Uusi projekti</button>
    </div>

    {/* Archive section */}
    {showArchive&&archivedPrj.length>0&&<div className="bcard" style={{marginBottom:'1.25rem'}}><div className="bcard-h"><h3>Arkistoidut projektit</h3></div><div className="bcard-b">
      {archivedPrj.map(p=><div key={p.id} style={{display:'flex',alignItems:'center',gap:'.75rem',padding:'.6rem .75rem',background:'var(--elev)',border:'1px solid var(--border)',borderRadius:'var(--r)',marginBottom:'.4rem'}}>
        <div style={{flex:1}}><div style={{fontSize:'.85rem',fontWeight:600}}>{p.t}</div><div style={{fontSize:'.7rem',color:'var(--t3)'}}>{p.d?.slice(0,50)}</div></div>
        <button className="btn btn-secondary btn-sm" onClick={()=>unarchive(p.id)}>Palauta</button>
        <button className="btn btn-ghost btn-sm" style={{color:'var(--red,#ef4444)'}} onClick={()=>del(p.id)}>Poista</button>
      </div>)}
    </div></div>}

    {/* Kanban */}
    <div className="pipe">{cols.map(c=>{const its=activePrj.filter(p=>p.st===c.k);return<div key={c.k} className="pipe-col" onDragOver={onDragOver} onDrop={e=>onDrop(e,c.k)}>
      <div className="pipe-col-h"><h3><span style={{width:8,height:8,borderRadius:'50%',background:c.c,display:'inline-block'}}/>{c.t}</h3><span className="pipe-cnt">{its.length}</span></div>
      <div className="pipe-body">{its.map(p=>{
        const dl=deadlineColor(p.deadline);const prog=taskProgress(p.tasks);
        return<div key={p.id} className="pipe-c" draggable onDragStart={e=>onDragStart(e,p.id)} onClick={()=>openDetail(p.id)} style={{cursor:'pointer'}}>
          <h4>{p.t}</h4>
          <p style={{fontSize:'.78rem',color:'var(--t2)',marginBottom:'.4rem'}}>{p.d?.slice(0,60)}</p>

          {/* Deadline badge */}
          {dl&&<div style={{display:'inline-flex',alignItems:'center',gap:'.3rem',fontSize:'.68rem',fontWeight:600,padding:'.15rem .5rem',borderRadius:4,background:dl.bg,color:dl.color,marginBottom:'.4rem'}}>
            {''} {p.deadline} {'\u00b7'} {dl.label}
          </div>}

          {/* Task progress */}
          {p.tasks?.length>0&&<div style={{marginBottom:'.4rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'.65rem',color:'var(--t3)',marginBottom:'.2rem'}}><span>{p.tasks.filter(x=>x.done).length}/{p.tasks.length} tehtävää</span><span>{prog}%</span></div>
            <div style={{height:4,background:'var(--bg)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:prog+'%',background:prog===100?'var(--green)':'var(--pri-l)',borderRadius:2,transition:'width .3s'}}/></div>
          </div>}

          {/* Team avatars */}
          {p.team?.length>0&&<div style={{display:'flex',marginTop:'.3rem'}}>{p.team.slice(0,3).map((m,i)=><div key={i} className="ava" style={{width:22,height:22,fontSize:'.55rem',marginLeft:i>0?'-4px':0,border:'2px solid var(--elev)'}}>{m.avatar}</div>)}{p.team.length>3&&<span style={{fontSize:'.6rem',color:'var(--t3)',marginLeft:'.25rem',alignSelf:'center'}}>+{p.team.length-3}</span>}</div>}

          {/* Status move buttons */}
          <div style={{marginTop:'.5rem',display:'flex',gap:'.3rem',flexWrap:'wrap'}}>
            {c.k==='idea'&&<button className="btn btn-sm btn-secondary" onClick={e=>mv(p.id,'active',e)}>{'\u2192'} Työstöön</button>}
            {c.k==='active'&&<><button className="btn btn-sm btn-ghost" onClick={e=>mv(p.id,'idea',e)}>{'\u2190'} Idea</button><button className="btn btn-sm btn-secondary" onClick={e=>mv(p.id,'done',e)}>{'\u2713'} Valmis</button></>}
            {c.k==='done'&&<><button className="btn btn-sm btn-ghost" onClick={e=>mv(p.id,'active',e)}>{'\u2190'} Takaisin</button><button className="btn btn-sm btn-ghost" style={{color:'var(--t3)'}} onClick={e=>archive(p.id,e)}>Arkistoi</button></>}
          </div>
        </div>})}{its.length===0&&<div style={{textAlign:'center',padding:'2rem',color:'var(--t3)',fontSize:'.8rem',fontWeight:500}}>
          {c.k==='idea'?'Lisää ensimmäinen idea!':c.k==='active'?'Vedä idea tänne aloittaaksesi.':'Ei vielä valmiita projekteja.'}
        </div>}</div>
    </div>})}</div>
  </div>);}

// ══════ PROJECT DETAIL ══════
function ProjectDetail({project,prj,setPrj,toast,t,onBack}){
  const[tab,setTab]=useState('overview');
  const[commentText,setCT]=useState('');
  const[newName,setNName]=useState('');
  const[newRole,setNRole]=useState('');
  const[newTask,setNewTask]=useState('');
  const[editingDesc,setEditingDesc]=useState(false);
  const[descDraft,setDescDraft]=useState(project.d||'');

  const update=(u)=>setPrj(ps=>ps.map(p=>p.id===project.id?{...p,...u}:p));

  // Tasks
  const addTask=()=>{if(!newTask.trim())return;
    update({tasks:[...(project.tasks||[]),{id:Date.now(),text:newTask,done:false}]});
    setNewTask('');toast('Tehtävä lisätty','success')};
  const toggleTask=(id)=>update({tasks:(project.tasks||[]).map(t=>t.id===id?{...t,done:!t.done}:t)});
  const removeTask=(id)=>update({tasks:(project.tasks||[]).filter(t=>t.id!==id)});

  // Comments
  const addComment=()=>{if(!commentText.trim())return;
    update({comments:[...(project.comments||[]),{id:Date.now(),author:'Anton Baer',text:commentText,timestamp:new Date().toISOString()}]});
    setCT('');toast('Kommentti lisätty','success')};

  // Team
  const addMember=()=>{if(!newName.trim())return;
    update({team:[...(project.team||[]),{name:newName,role:newRole||'Tiimijäsen',avatar:newName[0].toUpperCase()}]});
    setNName('');setNRole('');toast('Tiimijäsen lisätty','success')};
  const removeMember=(i)=>update({team:(project.team||[]).filter((_,j)=>j!==i)});

  const dl=deadlineColor(project.deadline);
  const prog=taskProgress(project.tasks);
  const tasks=project.tasks||[];
  const tabs=[{id:'overview',label:'Yleiskatsaus',icon:'\u25c9'},{id:'tasks',label:'Tehtävät',icon:'\u2611',count:tasks.length},{id:'team',label:'Tiimi',icon:'\u25c8',count:(project.team||[]).length},{id:'comments',label:'Keskustelu',icon:'\u25a7',count:(project.comments||[]).length}];

  return(<div className="page-enter" style={{maxWidth:920,margin:'0 auto'}}>
    <button className="btn btn-ghost" onClick={onBack} style={{marginBottom:'1rem'}}>{'\u2190'} Takaisin projekteihin</button>

    {/* Header */}
    <div className="bcard" style={{marginBottom:'1.5rem'}}><div className="bcard-h" style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'.75rem'}}>
      <div style={{flex:1}}>
        <h3>{project.t}</h3>
        <div style={{display:'flex',gap:'.75rem',marginTop:'.5rem',flexWrap:'wrap',alignItems:'center'}}>
          {/* Deadline with color */}
          {project.deadline?<div style={{display:'inline-flex',alignItems:'center',gap:'.3rem',fontSize:'.75rem',fontWeight:600,padding:'.2rem .6rem',borderRadius:6,background:dl?.bg||'var(--elev)',color:dl?.color||'var(--t2)'}}>
            {''} {project.deadline} {dl&&<span style={{fontSize:'.65rem'}}>{'\u00b7'} {dl.label}</span>}
          </div>:<span style={{fontSize:'.75rem',color:'var(--t3)'}}>Ei deadlinea</span>}
          {/* Edit deadline */}
          <input type="date" className="input" value={project.deadline||''} onChange={e=>update({deadline:e.target.value})} style={{width:'auto',fontSize:'.75rem',padding:'.2rem .5rem'}}/>
        </div>
        {/* Progress bar */}
        {tasks.length>0&&<div style={{marginTop:'.75rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',color:'var(--t3)',marginBottom:'.3rem'}}><span>Edistyminen</span><span>{tasks.filter(x=>x.done).length}/{tasks.length} tehtävää ({prog}%)</span></div>
          <div style={{height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:prog+'%',background:prog===100?'var(--green)':'var(--pri-l)',borderRadius:3,transition:'width .3s'}}/></div>
        </div>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'.4rem',alignItems:'flex-end'}}>
        <select className="input" style={{width:'auto',fontSize:'.8rem'}} value={project.st} onChange={e=>update({st:e.target.value})}>
          <option value="idea">Idea</option><option value="active">Työstössä</option><option value="done">Valmis</option>
        </select>
        {project.st==='done'&&<button className="btn btn-ghost btn-sm" style={{fontSize:'.72rem'}} onClick={()=>{update({archived:true});onBack()}}>Arkistoi</button>}
      </div>
    </div></div>

    {/* Tabs */}
    <div style={{display:'flex',gap:'.35rem',marginBottom:'1.5rem',background:'var(--elev)',borderRadius:'var(--r)',padding:'3px',flexWrap:'wrap'}}>
      {tabs.map(tb=><button key={tb.id} className={`cal-view-btn ${tab===tb.id?'act':''}`} onClick={()=>setTab(tb.id)}>
        {tb.icon} {tb.label}{tb.count>0&&<span className="badge badge-n" style={{marginLeft:'.4rem'}}>{tb.count}</span>}
      </button>)}
    </div>

    {/* ═══ OVERVIEW ═══ */}
    {tab==='overview'&&<div className="bcard"><div className="bcard-b">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.75rem'}}>
        <h4 style={{fontFamily:'var(--font-display)',fontSize:'.88rem',textTransform:'uppercase',letterSpacing:'.02em'}}>Kuvaus</h4>
        <button className="btn btn-ghost btn-sm" onClick={()=>{if(editingDesc){update({d:descDraft});toast('Tallennettu','success')}else{setDescDraft(project.d||'')}setEditingDesc(!editingDesc)}}>
          {editingDesc?'Tallenna':'Muokkaa'}
        </button>
      </div>
      {editingDesc?<textarea className="input textarea" value={descDraft} onChange={e=>setDescDraft(e.target.value)} style={{minHeight:120}}/>
      :<p style={{color:'var(--t2)',lineHeight:1.7,fontSize:'.9rem',whiteSpace:'pre-wrap'}}>{project.d||'Ei kuvausta.'}</p>}
    </div></div>}

    {/* ═══ TASKS ═══ */}
    {tab==='tasks'&&<div className="bcard"><div className="bcard-h"><h3>Tehtävät</h3><span style={{fontSize:'.75rem',color:'var(--t3)'}}>{tasks.filter(x=>x.done).length}/{tasks.length} valmiina</span></div>
    <div className="bcard-b">
      {/* Task list */}
      {tasks.map(tk=><div key={tk.id} style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.6rem .75rem',background:tk.done?'rgba(45,212,160,.05)':'var(--elev)',border:'1px solid '+(tk.done?'rgba(45,212,160,.2)':'var(--border)'),borderRadius:'var(--r)',marginBottom:'.4rem',cursor:'pointer'}} onClick={()=>toggleTask(tk.id)}>
        <div style={{width:20,height:20,borderRadius:4,border:'2px solid '+(tk.done?'var(--green)':'var(--border)'),background:tk.done?'var(--green)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s'}}>
          {tk.done&&<span style={{color:'#fff',fontSize:'.7rem',fontWeight:700}}>{'\u2713'}</span>}
        </div>
        <span style={{flex:1,fontSize:'.85rem',fontWeight:500,textDecoration:tk.done?'line-through':'none',color:tk.done?'var(--t3)':'var(--t1)',transition:'all .2s'}}>{tk.text}</span>
        <button className="res-rm" onClick={e=>{e.stopPropagation();removeTask(tk.id)}}>{'\u00d7'}</button>
      </div>)}
      {tasks.length===0&&<div style={{textAlign:'center',padding:'2rem',color:'var(--t3)',fontSize:'.85rem'}}>Ei vielä tehtäviä. Lisää ensimmäinen alta.</div>}
      {/* Add task */}
      <div style={{display:'flex',gap:'.5rem',marginTop:'.75rem',paddingTop:'.75rem',borderTop:'1px solid var(--border)'}}>
        <input className="input" placeholder="Uusi tehtävä..." value={newTask} onChange={e=>setNewTask(e.target.value)} style={{flex:1}}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addTask()}}}/>
        <button className="btn btn-primary btn-sm" onClick={addTask} disabled={!newTask.trim()}>+ Lisää</button>
      </div>
    </div></div>}

    {/* ═══ TEAM ═══ */}
    {tab==='team'&&<div className="bcard"><div className="bcard-h"><h3>Projektitiimi</h3><span style={{fontSize:'.75rem',color:'var(--t3)'}}>{(project.team||[]).length} jäsentä</span></div>
    <div className="bcard-b">
      {(project.team||[]).map((m,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:'.75rem',padding:'.75rem',background:'var(--elev)',border:'1px solid var(--border)',borderRadius:'var(--r)',marginBottom:'.5rem'}}>
        <div className="ava" style={{width:38,height:38,fontSize:'.8rem',background:'var(--pri)',flexShrink:0}}>{m.avatar}</div>
        <div style={{flex:1}}><div style={{fontSize:'.85rem',fontWeight:600}}>{m.name}</div><div style={{fontSize:'.72rem',color:'var(--t3)'}}>{m.role}</div></div>
        <button className="res-rm" onClick={()=>removeMember(i)}>{'\u00d7'}</button>
      </div>)}
      {(project.team||[]).length===0&&<div style={{textAlign:'center',padding:'2rem',color:'var(--t3)',fontSize:'.85rem'}}>Ei vielä tiimijäseniä. Lisää ensimmäinen alta.</div>}
      <div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid var(--border)',display:'flex',gap:'.5rem'}}>
        <input className="input" placeholder="Nimi" value={newName} onChange={e=>setNName(e.target.value)} style={{flex:1}}/>
        <input className="input" placeholder="Rooli" value={newRole} onChange={e=>setNRole(e.target.value)} style={{flex:1}}/>
        <button className="btn btn-primary btn-sm" onClick={addMember} disabled={!newName.trim()}>+ Lisää</button>
      </div>
    </div></div>}

    {/* ═══ COMMENTS ═══ */}
    {tab==='comments'&&<div className="bcard"><div className="bcard-h"><h3>Keskustelu</h3><span style={{fontSize:'.75rem',color:'var(--t3)'}}>{(project.comments||[]).length} kommenttia</span></div>
    <div className="bcard-b">
      <div style={{maxHeight:400,overflowY:'auto',marginBottom:'1rem',display:'flex',flexDirection:'column',gap:'.75rem'}}>
        {(project.comments||[]).map(c=><div key={c.id} style={{display:'flex',gap:'.6rem'}}>
          <div className="ava" style={{width:32,height:32,fontSize:'.7rem',background:'var(--pri)',flexShrink:0}}>{c.author?.[0]||'A'}</div>
          <div style={{flex:1,background:'var(--elev)',border:'1px solid var(--border)',borderRadius:'var(--rl)',padding:'.75rem 1rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.35rem'}}>
              <span style={{fontSize:'.8rem',fontWeight:600}}>{c.author}</span>
              <span style={{fontSize:'.65rem',color:'var(--t3)'}}>{new Date(c.timestamp).toLocaleDateString('fi-FI')} {new Date(c.timestamp).toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            <p style={{fontSize:'.85rem',color:'var(--t2)',lineHeight:1.6,margin:0}}>{c.text}</p>
          </div>
        </div>)}
        {(project.comments||[]).length===0&&<div style={{textAlign:'center',padding:'2rem',color:'var(--t3)',fontSize:'.85rem'}}>Ei vielä kommentteja. Aloita keskustelu alta.</div>}
      </div>
      <div style={{display:'flex',gap:'.5rem',borderTop:'1px solid var(--border)',paddingTop:'1rem'}}>
        <textarea className="input textarea" placeholder="Kirjoita kommentti..." value={commentText} onChange={e=>setCT(e.target.value)} style={{flex:1,minHeight:60}}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addComment()}}}/>
        <button className="btn btn-primary" onClick={addComment} disabled={!commentText.trim()} style={{alignSelf:'flex-end'}}>Lähetä</button>
      </div>
    </div></div>}
  </div>);
}

// ══════ CALENDAR ══════
function Cal({toast,events,setEvents,org,t}){
  const[year,setYear]=useState(new Date().getFullYear());const[month,setMonth]=useState(new Date().getMonth());
  const[view,setView]=useState('month');
  const[filter,setFilter]=useState('all');const[modal,setModal]=useState(null);const[hover,setHover]=useState(null);
  const months=t('months');const monthsShort=t('monthsShort');const ds=t('days');
  const today=new Date();
  const chList=org.channels.length?org.channels:[{name:'Muu',color:'#8b95a8',ic:'--'}];
  const getColor=(chName)=>{const ch=chList.find(c=>c.name===chName);return ch?ch.color:'#8b95a8'};
  const defaultCh=chList[0]?.name||'Muu';

  // Events for a given month/year, optionally filtered
  const getMonthEvents=(m,y)=>{let evs=events.filter(e=>(e.month===undefined&&m===3&&y===2025)||(e.month===m&&e.year===y));if(filter!=='all')evs=evs.filter(e=>e.ch===filter);return evs};
  const getYearEvents=(y)=>events.filter(e=>(e.year===y)||(e.month===undefined&&y===2025));
  const monthEvents=getMonthEvents(month,year);

  // Month grid
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const prevDays=new Date(year,month,0).getDate();
  const cs=[];
  for(let i=firstDay-1;i>=0;i--)cs.push({n:prevDays-i,o:true});
  for(let d=1;d<=daysInMonth;d++)cs.push({n:d,o:false,tod:today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d});
  const rm=7-cs.length%7;if(rm<7)for(let i=1;i<=rm;i++)cs.push({n:i,o:true});

  const prev=()=>{if(view==='year')setYear(y=>y-1);else if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)};
  const next=()=>{if(view==='year')setYear(y=>y+1);else if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)};
  const goMonth=(m)=>{setMonth(m);setView('month')};

  const openNew=(day)=>setModal({t:'',ch:defaultCh,day,month,year});
  const saveEv=()=>{if(!modal.t.trim())return;setEvents(p=>[...p,{day:modal.day,month:modal.month,year:modal.year,t:modal.t,co:getColor(modal.ch),ch:modal.ch}]);toast('Julkaisu lisätty!','success');setModal(null)};
  const delEv=(idx)=>{setEvents(p=>p.filter((_,i)=>i!==idx));toast('Poistettu','info')};

  // ── YEAR CLOCK (SVG) ──
  const YearClock=()=>{
    const cx=140,cy=140,outerR=130,innerR=50;const yearEvs=getYearEvents(year);
    const chNames=[...new Set(yearEvs.map(e=>e.ch))];if(!chNames.length&&!chList.length)return null;
    const usedChs=chList.filter(c=>chNames.includes(c.name));if(!usedChs.length&&chNames.length)usedChs.push({name:chNames[0],color:'#8b95a8'});
    const bandW=usedChs.length?(outerR-innerR)/Math.max(usedChs.length,1):outerR-innerR;
    const sectorAngle=Math.PI*2/12;

    const polarToCart=(cx,cy,r,angle)=>({x:cx+r*Math.cos(angle-Math.PI/2),y:cy+r*Math.sin(angle-Math.PI/2)});
    const arcPath=(cx,cy,r1,r2,a1,a2)=>{const s1=polarToCart(cx,cy,r1,a1),e1=polarToCart(cx,cy,r1,a2),s2=polarToCart(cx,cy,r2,a2),e2=polarToCart(cx,cy,r2,a1);const large=a2-a1>Math.PI?1:0;return`M${s1.x},${s1.y} A${r1},${r1} 0 ${large} 1 ${e1.x},${e1.y} L${s2.x},${s2.y} A${r2},${r2} 0 ${large} 0 ${e2.x},${e2.y} Z`};

    return(<div className="clock-wrap"><div style={{position:'relative'}}>
      <svg width={cx*2} height={cy*2} viewBox={`0 0 ${cx*2} ${cy*2}`}>
        {/* Grid lines */}
        {Array.from({length:12}).map((_,mi)=>{const a=mi*sectorAngle;const p1=polarToCart(cx,cy,innerR-2,a);const p2=polarToCart(cx,cy,outerR+2,a);
          return<line key={mi} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="var(--border)" strokeWidth="0.5"/>})}
        {/* Sectors per channel */}
        {Array.from({length:12}).map((_,mi)=>{const a1=mi*sectorAngle+0.02;const a2=(mi+1)*sectorAngle-0.02;
          const mEvs=yearEvs.filter(e=>(e.month===mi)||(e.month===undefined&&mi===3));
          return usedChs.map((ch,ci)=>{const count=mEvs.filter(e=>e.ch===ch.name).length;if(!count)return null;
            const r1=innerR+ci*bandW;const r2=Math.min(r1+bandW*Math.min(count,5)/5,outerR);
            return<path key={`${mi}-${ci}`} d={arcPath(cx,cy,r1+1,r2,a1,a2)} fill={ch.color} opacity={0.7}
              style={{cursor:'pointer',transition:'opacity .15s'}}
              onMouseEnter={()=>setHover({m:mi,ch:ch.name,count})} onMouseLeave={()=>setHover(null)}
              onClick={()=>goMonth(mi)}/>})
        })}
        {/* Month labels */}
        {Array.from({length:12}).map((_,mi)=>{const a=mi*sectorAngle+sectorAngle/2;const p=polarToCart(cx,cy,outerR+14,a);
          return<text key={mi} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
            style={{fontSize:'.55rem',fill:'var(--t3)',fontWeight:600,fontFamily:'var(--font)',cursor:'pointer'}} onClick={()=>goMonth(mi)}>{monthsShort[mi]}</text>})}
        {/* Center */}
        <circle cx={cx} cy={cy} r={innerR-2} fill="var(--card)"/>
        <text x={cx} y={cy-8} textAnchor="middle" style={{fontSize:'1.4rem',fill:'var(--t1)',fontWeight:800,fontFamily:'var(--font)'}}>{year}</text>
        <text x={cx} y={cy+12} textAnchor="middle" style={{fontSize:'.6rem',fill:'var(--t3)',fontWeight:600,fontFamily:'var(--font)'}}>{yearEvs.length} julkaisua</text>
      </svg>
      {hover&&<div className="clock-hover" style={{top:60,left:cx+30}}><strong>{monthsShort[hover.m]}</strong>: {hover.count} {hover.ch}</div>}
    </div>
    <div className="clock-legend">{chList.map((c,i)=><div key={i} className="clock-leg-item"><div className="clock-leg-dot" style={{background:c.color}}/>{c.name}</div>)}
      <div style={{marginTop:'.75rem',fontSize:'.68rem',color:'var(--t3)',fontWeight:500}}>{t('clickMonthToOpen')}</div>
    </div></div>)};

  // ── CHANNEL FILTERS ──
  const FilterBar=()=><div className="cal-filters">
    <button className={`cal-ch-btn ${filter==='all'?'act':''}`} style={filter==='all'?{background:'var(--pri)',borderColor:'var(--pri)',color:'#fff'}:{}} onClick={()=>setFilter('all')}>{t('all')}</button>
    {chList.map(c=><button key={c.name} className={`cal-ch-btn ${filter===c.name?'act':''}`}
      style={filter===c.name?{background:c.color,borderColor:c.color,color:'#fff'}:{borderColor:c.color+'40',color:c.color}} onClick={()=>setFilter(filter===c.name?'all':c.name)}>{c.name}</button>)}
  </div>;

  return(<div className="page-enter">
    <div className="cal-h"><h2>{view==='month'?months[month]+' '+year:year}</h2>
      <div style={{display:'flex',gap:'.75rem',alignItems:'center'}}>
        <div className="cal-views"><button className={`cal-view-btn ${view==='month'?'act':''}`} onClick={()=>setView('month')}>{t('month')}</button><button className={`cal-view-btn ${view==='year'?'act':''}`} onClick={()=>setView('year')}>{t('year')}</button></div>
        <div style={{display:'flex',gap:'.35rem'}}><button className="btn btn-secondary btn-sm" onClick={prev}>{'\u2190'}</button><button className="btn btn-secondary btn-sm" onClick={()=>{setMonth(today.getMonth());setYear(today.getFullYear())}}>{t('today')}</button><button className="btn btn-secondary btn-sm" onClick={next}>{'\u2192'}</button></div>
      </div></div>

    <FilterBar/>

    {view==='month'&&<>
      <div className="cal-grid">{ds.map(d=><div key={d} className="cal-dh">{d}</div>)}{cs.map((c,i)=>{const evs=c.o?[]:monthEvents.filter(e=>e.day===c.n);return<div key={i} className={`cal-d ${c.o?'oth':''} ${c.tod?'tod':''}`} onClick={()=>!c.o&&openNew(c.n)} style={{cursor:c.o?'default':'pointer'}}><div className="cal-dn">{c.n}</div>{evs.map((e,j)=>{const co=getColor(e.ch);return<div key={j} className="cal-ev" style={{background:co+'28',color:co,borderLeft:`2px solid ${co}`}} onClick={ev=>{ev.stopPropagation();toast(e.t+' ('+e.ch+')','info')}}>{e.t}</div>})}</div>})}</div>
    </>}

    {view==='year'&&<>
      <YearClock/>
      <div className="yr-grid">{Array.from({length:12}).map((_,mi)=>{const mEvs=getMonthEvents(mi,year);const isTod=today.getFullYear()===year&&today.getMonth()===mi;
        return<div key={mi} className={`yr-cell ${isTod?'tod':''}`} onClick={()=>goMonth(mi)}>
          <h4>{monthsShort[mi]}</h4>
          {mEvs.length>0?<><div className="yr-cell-dots">{mEvs.slice(0,20).map((e,j)=><div key={j} className="yr-dot" style={{background:getColor(e.ch)}}/>)}</div>
            <div className="yr-cell-count">{mEvs.length} {mEvs.length===1?t('publication'):t('publications_plural')}</div></>
          :<div className="yr-cell-count">{t('noPublications')}</div>}
        </div>})}</div>
    </>}

    {modal&&<div className="modal-ov" onClick={()=>setModal(null)}><div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h"><h3>{t('addPublication')} — {modal.day}.{modal.month+1}.{modal.year}</h3><button className="modal-x" onClick={()=>setModal(null)}>{'\u2715'}</button></div>
      <div className="modal-b">
        <div className="field"><label>{t('publicationName')}</label><input className="input" value={modal.t} onChange={e=>setModal(p=>({...p,t:e.target.value}))} placeholder={t('publicationNamePh')}/></div>
        <div className="field"><label>{t('channel')}</label><select className="input" value={modal.ch} onChange={e=>setModal(p=>({...p,ch:e.target.value}))}>
          {chList.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}</select></div>
      </div>
      <div className="modal-f"><button className="btn btn-secondary" onClick={()=>setModal(null)}>{t('cancel')}</button><button className="btn btn-primary" onClick={saveEv} disabled={!modal.t.trim()}>{t('add')}</button></div>
    </div></div>}
  </div>);}


// ══════ STRATEGY ══════
function Strat({toast,org,setOrg,t,chStats}){
  const[exp,sE]=useState(['goals','brand','aud','tone','channels','upload','team']);
  const fileRef=useRef(null);const[uploading,setUploading]=useState(false);
  const[parseResults,setParseResults]=useState(null);const[selParsed,setSelParsed]=useState({});

  const handleFile=async(file)=>{setUploading(true);try{
    const text=await readFileAsText(file);
    if(!text){toast('Tiedostotyyppia ei tueta','info');setUploading(false);return}
    setOrg(p=>({...p,strategyText:text,strategyFileName:file.name}));
    await wait(1500);// simulate analysis
    const parsed=parseStrategyText(text);
    if(parsed.goals.length||parsed.auds.length||parsed.vals.length||parsed.tone.length){
      setParseResults(parsed);
      // pre-select all
      const sel={};parsed.goals.forEach((_,i)=>sel['goals'+i]=true);parsed.auds.forEach((_,i)=>sel['auds'+i]=true);
      parsed.vals.forEach((_,i)=>sel['vals'+i]=true);parsed.tone.forEach((_,i)=>sel['tone'+i]=true);
      setSelParsed(sel);toast(t('documentLoaded'),'success')
    } else {setOrg(p=>({...p,strategyText:text,strategyFileName:file.name}));toast(t('documentLoaded'),'success')}
  }catch(e){toast('Virhe: '+e.message,'info')}setUploading(false)};

  const applyParsed=()=>{if(!parseResults)return;
    const newGoals=parseResults.goals.filter((_,i)=>selParsed['goals'+i]);
    const newAuds=parseResults.auds.filter((_,i)=>selParsed['auds'+i]);
    const newVals=parseResults.vals.filter((_,i)=>selParsed['vals'+i]);
    const newTones=parseResults.tone.filter((_,i)=>selParsed['tone'+i]);
    setOrg(p=>({...p,goals:[...p.goals,...newGoals],auds:[...p.auds,...newAuds],vals:[...p.vals,...newVals],tone:[...new Set([...p.tone,...newTones])]}));
    setParseResults(null);setSelParsed({});toast(t('added'),'success')};
  const[modal,setM]=useState(null); // null | 'goal' | 'aud' | 'val' | 'tone'
  const[editIdx,setEditIdx]=useState(-1); // -1 = new
  // edit fields
  const[fm,setFm]=useState('');const[ft,setFt]=useState('');const[fd,setFd]=useState('');const[fi,setFi]=useState('');const[fc,setFc]=useState([]);
  const[toneInput,setTI]=useState('');
  const tog=s=>sE(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  const openAdd=(type)=>{setM(type);setEditIdx(-1);setFm('');setFt('');setFd('');setFi('');setFc([])};
  const openEdit=(type,idx)=>{setM(type);setEditIdx(idx);
    if(type==='goal'){const g=org.goals[idx];setFm(g.m);setFt(g.t);setFd(g.d||'')}
    else if(type==='aud'){const a=org.auds[idx];setFt(a.n);setFd(a.d||'');setFc(a.c||[])}
    else if(type==='val'){const v=org.vals[idx];setFi(v.i);setFt(v.t);setFd(v.d||'')}};

  const saveItem=()=>{if(!ft.trim())return;
    if(modal==='goal'){const item={m:fm||'\u2014',t:ft,d:fd,p:0};
      setOrg(p=>({...p,goals:editIdx===-1?[...p.goals,item]:p.goals.map((g,i)=>i===editIdx?item:g)}))}
    else if(modal==='aud'){const item={n:ft,d:fd,c:fc.length?fc:['Some']};
      setOrg(p=>({...p,auds:editIdx===-1?[...p.auds,item]:p.auds.map((a,i)=>i===editIdx?item:a)}))}
    else if(modal==='val'){const item={i:fi||ft[0]?.toUpperCase()||'*',t:ft,d:fd};
      setOrg(p=>({...p,vals:editIdx===-1?[...p.vals,item]:p.vals.map((v,i)=>i===editIdx?item:v)}))}
    setM(null);toast(editIdx===-1?'Lisätty!':'Päivitetty!','success')};

  const delItem=(type,idx)=>{
    if(type==='goal')setOrg(p=>({...p,goals:p.goals.filter((_,i)=>i!==idx)}));
    else if(type==='aud')setOrg(p=>({...p,auds:p.auds.filter((_,i)=>i!==idx)}));
    else if(type==='val')setOrg(p=>({...p,vals:p.vals.filter((_,i)=>i!==idx)}));
    toast('Poistettu','info')};

  const addTone=()=>{if(toneInput.trim()&&!org.tone.includes(toneInput.trim())){setOrg(p=>({...p,tone:[...p.tone,toneInput.trim()]}));setTI('')}};
  const rmTone=(idx)=>setOrg(p=>({...p,tone:p.tone.filter((_,i)=>i!==idx)}));
  const chOpts=org.channels.length?org.channels.map(c=>c.name):['Instagram','Facebook','TikTok','LinkedIn'];
  // Channel management
  const[newChName,setNewChName]=useState('');const[newChColor,setNewChColor]=useState('#9b7cf6');const[showChColors,setShowChColors]=useState(null);
  const addCh=()=>{if(newChName.trim()&&!org.channels.find(c=>c.name===newChName)){setOrg(p=>({...p,channels:[...p.channels,{name:newChName,color:newChColor,ic:'+'}]}));setNewChName('');toast('Kanava lisätty!','success')}};
  const rmCh=(name)=>setOrg(p=>({...p,channels:p.channels.filter(c=>c.name!==name)}));
  const setChColor=(name,color)=>setOrg(p=>({...p,channels:p.channels.map(c=>c.name===name?{...c,color}:c)}));

  const modalTitle={goal:editIdx===-1?t('addGoal'):t('editGoal'),aud:editIdx===-1?t('addAudience'):t('editAudience'),val:editIdx===-1?t('addValue'):t('editValue')};

  // Strategy completeness
  const stratItems=[
    {k:'goals',l:t('goals'),n:org.goals.length,c:'var(--green)',sec:'goals'},
    {k:'auds',l:t('audiences'),n:org.auds.length,c:'var(--pri-l)',sec:'aud'},
    {k:'vals',l:t('brandValues'),n:org.vals.length,c:'var(--purple)',sec:'brand'},
    {k:'tone',l:t('tones'),n:org.tone.length,c:'var(--yellow)',sec:'tone'},
    {k:'chs',l:t('channels'),n:org.channels.length,c:'var(--cyan)',sec:'channels'},
    {k:'team',l:t('teamMembers'),n:(org.team||[]).length,c:'var(--pink)',sec:'team'}];
  const filled=stratItems.filter(s=>s.n>0).length;const total=stratItems.length;

  return(<div className="page-enter"><div className="strat-lay"><div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
    <div className="strat-hero"><div className="ob"><span>{org.s||org.name}</span><span style={{opacity:.7}}>{t('strategy')}</span></div><h2>{org.name||t('organization')}</h2>{org.slogan&&<div style={{fontSize:'1rem',opacity:.9,marginBottom:'.75rem',fontWeight:500}}>"{org.slogan}"</div>}<p style={{fontSize:'.9rem',opacity:.8,lineHeight:1.7,fontWeight:500}}>{t('strategyGuides')}</p>
      {/* Inline completeness */}
      <div style={{marginTop:'1rem',display:'flex',gap:'.5rem',flexWrap:'wrap'}}>{stratItems.map(s=><span key={s.k} onClick={()=>{if(!exp.includes(s.sec))sE(p=>[...p,s.sec])}} style={{padding:'.3rem .7rem',borderRadius:9999,fontSize:'.68rem',fontWeight:700,cursor:'pointer',background:s.n>0?s.c+'18':'rgba(255,255,255,.08)',color:s.n>0?s.c:'rgba(255,255,255,.4)',border:`1px solid ${s.n>0?s.c+'30':'rgba(255,255,255,.08)'}`}}>{s.n>0?'\u2713':'\u25cb'} {s.l} {s.n>0?`(${s.n})`:''}</span>)}</div>
    </div>

    {/* PDF Upload */}
    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('upload')}><h3>{t('uploadStrategy')}</h3><span style={{color:'var(--t3)'}}>{exp.includes('upload')?'\u2212':'+'}</span></div>{exp.includes('upload')&&<div className="strat-sec-b">
      <p style={{fontSize:'.82rem',color:'var(--t2)',marginBottom:'.75rem',fontWeight:500}}>{t('uploadStrategyDesc')}</p>
      {org.strategyText?<div style={{background:'rgba(45,212,160,.06)',border:'1px solid rgba(45,212,160,.2)',borderRadius:'var(--r)',padding:'.875rem',marginBottom:'.75rem',display:'flex',alignItems:'center',gap:'.75rem'}}>
        <span style={{color:'var(--green)',fontSize:'1.1rem'}}>{'\u2713'}</span>
        <div style={{flex:1}}><div style={{fontSize:'.82rem',fontWeight:600,color:'var(--green)'}}>{t('documentLoaded')}{org.strategyFileName?' — '+org.strategyFileName:''}</div><div style={{fontSize:'.7rem',color:'var(--t3)',fontWeight:500}}>{org.strategyText.length} chars</div></div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOrg(p=>({...p,strategyText:'',strategyFileName:''}))}>{'\u00d7'}</button>
      </div>:null}
      <div style={{background:'var(--elev)',border:'2px dashed var(--border)',borderRadius:'var(--rl)',padding:'2rem',textAlign:'center',cursor:'pointer',transition:'all .2s',position:'relative'}} onClick={()=>fileRef.current?.click()}
        onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--pri)'}} onDragLeave={e=>{e.currentTarget.style.borderColor='var(--border)'}}
        onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--border)';const f=e.dataTransfer.files[0];if(f)handleFile(f)}}>
        {uploading?<div className="typing"><span/><span/><span/></div>
        :<><p style={{color:'var(--t2)',fontSize:'.85rem',fontWeight:500,marginBottom:'.25rem'}}>{t('dragOrClick')}</p><p style={{color:'var(--t3)',fontSize:'.7rem',fontWeight:500}}>{t('supportedFormats')}</p></>}
        <input ref={fileRef} type="file" accept=".pdf,.txt,.md" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f)handleFile(f);e.target.value=''}}/>
      </div>
      {/* Guided strategy review after upload */}
      {parseResults&&<div style={{marginTop:'1rem',animation:'scaleIn .3s ease'}}>
        <div style={{background:'rgba(5,107,159,.06)',border:'1px solid rgba(5,107,159,.2)',borderRadius:'var(--rl)',overflow:'hidden'}}>
          <div style={{padding:'1rem 1.25rem',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'.75rem'}}>
            <div className="ava" style={{width:32,height:32,fontSize:'.7rem'}}>AI</div>
            <div><h4 style={{fontSize:'.88rem',fontWeight:700}}>{t('aiFound')}</h4>
              <p style={{fontSize:'.7rem',color:'var(--t2)',fontWeight:500}}>{parseResults.paraCount} kappaletta luettu \u2022 {parseResults.rawLength} merkkiä</p></div>
          </div>
          <div style={{padding:'1.25rem'}}>

            {/* Each category: show what was found + excerpts + add button */}
            {[
              {key:'goals',items:parseResults.goals,label:t('goals'),color:'var(--green)',icon:'\u25ce',
                render:g=><span>{g.m!=='\u2014'&&<strong>{g.m}</strong>}{g.m!=='\u2014'?' \u2014 ':''}{g.t}</span>},
              {key:'auds',items:parseResults.auds,label:t('audiences'),color:'var(--pri-l)',icon:'\u2261',
                render:a=><span><strong>{a.n}</strong>{a.d?' \u2014 '+a.d.slice(0,50):''}</span>},
              {key:'vals',items:parseResults.vals,label:t('brandValues'),color:'var(--hetki-pink)',icon:'\u25c7',
                render:v=><span><strong>{v.t}</strong>{v.d?' \u2014 '+v.d.slice(0,40):''}</span>},
              {key:'tone',items:parseResults.tone,label:t('tones'),color:'var(--yellow)',icon:'\u25c6',
                render:tn=><span>{tn}</span>}
            ].map(cat=><div key={cat.key} style={{marginBottom:'1.25rem',background:'var(--card)',borderRadius:'var(--r)',border:'1px solid var(--border)',overflow:'hidden'}}>
              <div style={{padding:'.75rem 1rem',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'.5rem'}}>
                <span>{cat.icon}</span>
                <h4 style={{fontSize:'.82rem',fontWeight:700,flex:1}}>{cat.label}</h4>
                {cat.items.length>0?<span style={{fontSize:'.65rem',padding:'.15rem .45rem',borderRadius:9999,background:cat.color+'18',color:cat.color,fontWeight:700}}>{cat.items.length} löydetty</span>
                  :<span style={{fontSize:'.65rem',padding:'.15rem .45rem',borderRadius:9999,background:'rgba(239,107,107,.1)',color:'var(--red)',fontWeight:700}}>Ei löydetty \u2014 lisää itse</span>}
              </div>
              <div style={{padding:'.75rem 1rem'}}>
                {cat.items.length>0?<div>
                  {cat.key!=='tone'?cat.items.map((item,i)=><label key={i} style={{display:'flex',alignItems:'flex-start',gap:'.5rem',padding:'.4rem 0',borderBottom:i<cat.items.length-1?'1px solid var(--border)':'none',fontSize:'.82rem',cursor:'pointer',fontWeight:500,color:selParsed[cat.key+i]?'var(--t1)':'var(--t3)'}}>
                    <input type="checkbox" checked={!!selParsed[cat.key+i]} onChange={()=>setSelParsed(p=>({...p,[cat.key+i]:!p[cat.key+i]}))} style={{marginTop:3}}/>
                    <div>{cat.render(item)}{item.excerpt&&<div style={{fontSize:'.68rem',color:'var(--t3)',marginTop:'.2rem',fontStyle:'italic'}}>"{item.excerpt.slice(0,100)}..."</div>}</div>
                  </label>)
                  :<div style={{display:'flex',flexWrap:'wrap',gap:'.3rem'}}>{cat.items.map((tn,i)=><span key={i} onClick={()=>setSelParsed(p=>({...p,[cat.key+i]:!p[cat.key+i]}))} style={{padding:'.3rem .65rem',borderRadius:9999,fontSize:'.72rem',fontWeight:600,cursor:'pointer',background:selParsed[cat.key+i]?cat.color+'18':'var(--elev)',color:selParsed[cat.key+i]?cat.color:'var(--t3)',border:selParsed[cat.key+i]?`1px solid ${cat.color}40`:'1px solid var(--border)'}}>{tn}</span>)}</div>}
                </div>
                :<p style={{fontSize:'.78rem',color:'var(--t3)',fontWeight:500}}>Dokumentista ei löydetty automaattisesti. Lisää {cat.label.toLowerCase()} manuaalisesti alla olevasta osiosta.</p>}
              </div>
            </div>)}

            {/* Document preview */}
            {org.strategyText&&<details style={{marginTop:'.5rem'}}>
              <summary style={{fontSize:'.75rem',color:'var(--t3)',cursor:'pointer',fontWeight:600}}>Näytä dokumentin teksti</summary>
              <div style={{maxHeight:200,overflowY:'auto',background:'var(--elev)',borderRadius:'var(--r)',padding:'.75rem',marginTop:'.5rem',fontSize:'.72rem',color:'var(--t2)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'monospace'}}>{org.strategyText.slice(0,3000)}{org.strategyText.length>3000&&'...'}</div>
            </details>}
          </div>
          <div style={{padding:'.75rem 1.25rem',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.72rem',color:'var(--t2)',fontWeight:500}}>Valitse mitka lisataan strategiaan. Voit täydentäa manuaalisesti myöhemmin.</span>
            <div style={{display:'flex',gap:'.5rem'}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>setParseResults(null)}>{t('cancel')}</button>
              <button className="btn btn-primary btn-sm" onClick={applyParsed}>{t('addSelected')}</button>
            </div>
          </div>
        </div>
      </div>}
    </div>}</div>

    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('goals')}><h3>{t('goals')} ({org.goals.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('goals')?'\u2212':'+'}</span></div>{exp.includes('goals')&&<div className="strat-sec-b">
      {org.goals.length>0?<div className="goal-grid">{org.goals.map((g,i)=><div key={i} className="goal" style={{cursor:'pointer',position:'relative'}} onClick={()=>openEdit('goal',i)}><div className="met">{g.m}</div><h4>{g.t}</h4><p>{g.d}</p><button className="res-rm" style={{position:'absolute',top:8,right:8}} onClick={e=>{e.stopPropagation();delItem('goal',i)}}>{'\u00d7'}</button></div>)}</div>
      :<p style={{color:'var(--t3)',fontSize:'.85rem',fontWeight:500}}>{t('noGoals')}</p>}
      <button className="btn btn-secondary btn-sm" style={{marginTop:'.75rem'}} onClick={()=>openAdd('goal')}>+ {t('addGoal')}</button>
    </div>}</div>

    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('brand')}><h3>{t('brandValues')} ({org.vals.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('brand')?'\u2212':'+'}</span></div>{exp.includes('brand')&&<div className="strat-sec-b">
      {org.vals.length>0?<div className="brand-grid">{org.vals.map((v,i)=><div key={i} className="brand" style={{cursor:'pointer',position:'relative'}} onClick={()=>openEdit('val',i)}><div className="bic">{v.i}</div><h4>{v.t}</h4><p>{v.d}</p><button className="res-rm" style={{position:'absolute',top:8,right:8}} onClick={e=>{e.stopPropagation();delItem('val',i)}}>{'\u00d7'}</button></div>)}</div>
      :<p style={{color:'var(--t3)',fontSize:'.85rem',fontWeight:500}}>{t('noValues')}</p>}
      <button className="btn btn-secondary btn-sm" style={{marginTop:'.75rem'}} onClick={()=>openAdd('val')}>+ {t('addValue')}</button>
    </div>}</div>

    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('aud')}><h3>{t('audiences')} ({org.auds.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('aud')?'\u2212':'+'}</span></div>{exp.includes('aud')&&<div className="strat-sec-b">
      {org.auds.map((a,i)=><div key={i} style={{background:'var(--elev)',borderRadius:'var(--r)',padding:'1rem',marginBottom:'.55rem',display:'flex',gap:'1rem',alignItems:'center',cursor:'pointer',position:'relative'}} onClick={()=>openEdit('aud',i)}><div className="ava" style={{width:36,height:36,fontSize:'.7rem'}}>{a.n[0]}</div><div><div style={{fontWeight:700,fontSize:'.82rem'}}>{a.n}</div><div style={{fontSize:'.72rem',color:'var(--t3)',fontWeight:500}}>{a.d}{a.c.length?' | '+a.c.join(', '):''}</div></div><button className="res-rm" style={{position:'absolute',top:8,right:8}} onClick={e=>{e.stopPropagation();delItem('aud',i)}}>{'\u00d7'}</button></div>)}
      {org.auds.length===0&&<p style={{color:'var(--t3)',fontSize:'.85rem',fontWeight:500}}>{t('noAudiences')}</p>}
      <button className="btn btn-secondary btn-sm" style={{marginTop:'.25rem'}} onClick={()=>openAdd('aud')}>+ {t('addAudience')}</button>
    </div>}</div>

    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('channels')}><h3>{t('channels')} ({org.channels.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('channels')?'\u2212':'+'}</span></div>{exp.includes('channels')&&<div className="strat-sec-b">
      {org.channels.map((c,i)=><div key={i} className="ch-mgmt-item">
        <div className="ch-color-dot" style={{background:c.color}} onClick={()=>setShowChColors(showChColors===i?null:i)}/>
        <span style={{flex:1,fontSize:'.85rem',fontWeight:600}}>{c.ic} {c.name}</span>
        <button className="res-rm" onClick={()=>rmCh(c.name)}>{'\u00d7'}</button>
        {showChColors===i&&<div style={{position:'absolute',marginTop:'2.5rem',zIndex:5}}><div className="ch-color-picker">{colorPalette.map(co=><div key={co} className={`ch-color-opt ${c.color===co?'sel':''}`} style={{background:co}} onClick={()=>{setChColor(c.name,co);setShowChColors(null)}}/>)}</div></div>}
      </div>)}
      {org.channels.length===0&&<p style={{color:'var(--t3)',fontSize:'.85rem',fontWeight:500}}>Ei vielä kanavia.</p>}
      <div style={{marginTop:'.75rem'}}><label style={{display:'block',fontSize:'.72rem',fontWeight:600,color:'var(--t3)',marginBottom:'.35rem',textTransform:'uppercase',letterSpacing:'.04em'}}>Lisää kanava</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem',marginBottom:'.5rem'}}>{[...presetChannels,...extraChannels].filter(c=>!org.channels.find(x=>x.name===c.name)).slice(0,8).map(c=>
          <span key={c.name} style={{padding:'.3rem .6rem',borderRadius:9999,fontSize:'.7rem',fontWeight:600,background:c.color+'15',color:c.color,border:`1px solid ${c.color}30`,cursor:'pointer'}} onClick={()=>{setOrg(p=>({...p,channels:[...p.channels,c]}));toast(c.name+' lisätty!','success')}}>{c.ic} {c.name}</span>)}</div>
        <div className="add-row"><input className="input" placeholder="Oma kanava" value={newChName} onChange={e=>setNewChName(e.target.value)} style={{flex:1}}/>
          <div style={{display:'flex',gap:3,alignItems:'center'}}>{colorPalette.slice(0,6).map(co=><div key={co} className={`ch-color-opt ${newChColor===co?'sel':''}`} style={{background:co,width:16,height:16}} onClick={()=>setNewChColor(co)}/>)}</div>
          <button className="btn btn-secondary btn-sm" onClick={addCh} disabled={!newChName.trim()}>+</button></div>
      </div>
    </div>}</div>

    {/* Team section */}
    {(org.team||[]).length>0&&<div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('team')}><h3>{t('teamMembers')} ({org.team.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('team')?'\u2212':'+'}</span></div>{exp.includes('team')&&<div className="strat-sec-b">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.75rem'}}>{org.team.map((m,i)=><div key={i} style={{background:'var(--elev)',borderRadius:'var(--r)',padding:'1.15rem',borderLeft:'3px solid var(--pri)',display:'flex',gap:'.875rem',alignItems:'flex-start'}}>
        <div className="ava" style={{width:40,height:40,fontSize:'.75rem',flexShrink:0}}>{m.name.split(' ').map(n=>n[0]).join('')}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:'.88rem',letterSpacing:'-.01em'}}>{m.name}</div>
          <div style={{fontSize:'.72rem',color:'var(--pri-l)',fontWeight:600,marginTop:'.15rem'}}>{m.role}</div>
          <div style={{fontSize:'.7rem',color:'var(--t2)',fontWeight:500,marginTop:'.35rem',lineHeight:1.5}}>{m.desc}</div>
        </div>
      </div>)}</div>
    </div>}</div>}

    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('tone')}><h3>{t('tones')} ({org.tone.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('tone')?'\u2212':'+'}</span></div>{exp.includes('tone')&&<div className="strat-sec-b">
      <div className="tone-list" style={{marginBottom:'.5rem'}}>{org.tone.map((t,i)=><span key={i} className="tone" style={{cursor:'pointer'}} onClick={()=>rmTone(i)}>{t} {'\u00d7'}</span>)}</div>
      <div className="add-row"><input className="input" placeholder="esim. Innoittava" value={toneInput} onChange={e=>setTI(e.target.value)} onKeyPress={e=>e.key==='Enter'&&addTone()} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addTone} disabled={!toneInput.trim()}>+ Lisää</button></div>
    </div>}</div>
  </div>

  {modal&&modal!=='tone'&&<div className="modal-ov" onClick={()=>setM(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-h"><h3>{modalTitle[modal]}</h3><button className="modal-x" onClick={()=>setM(null)}>{'\u2715'}</button></div>
    <div className="modal-b">
      {modal==='goal'&&<><div className="field"><label>{t('metric')}</label><input className="input" placeholder={t('metricPh')} value={fm} onChange={e=>setFm(e.target.value)}/></div>
        <div className="field"><label>{t('goalName')} *</label><input className="input" placeholder={t('goalNamePh')} value={ft} onChange={e=>setFt(e.target.value)}/></div>
        <div className="field"><label>{t('description')}</label><input className="input" placeholder={t('descPh')} value={fd} onChange={e=>setFd(e.target.value)}/></div></>}
      {modal==='aud'&&<><div className="field"><label>{t('audienceName')} *</label><input className="input" placeholder={t('audienceNamePh')} value={ft} onChange={e=>setFt(e.target.value)}/></div>

        <div className="field"><label>{t('channelsLabel')}</label><div style={{display:'flex',flexWrap:'wrap',gap:'.35rem'}}>{chOpts.map(c=><span key={c} onClick={()=>setFc(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c])} style={{cursor:'pointer',padding:'.35rem .7rem',borderRadius:9999,fontSize:'.75rem',fontWeight:600,background:fc.includes(c)?'rgba(26,143,196,.15)':'var(--elev)',color:fc.includes(c)?'var(--pri-l)':'var(--t3)',border:fc.includes(c)?'1px solid var(--pri)':'1px solid var(--border)'}}>{c}</span>)}</div></div></>}

// AI-powered keyword generator (simulated — analyses filename, folder, known patterns)
const generateAIKeywords=(file)=>{
  const name=file.name.toLowerCase();const folder=file.folder;
  const kw=new Set();
  // From folder
  if(folder==='valokuvat'){kw.add('valokuva');kw.add('photo')}
  if(folder==='grafiikat'){kw.add('grafiikka');kw.add('somekuva')}
  if(folder==='logot'){kw.add('logo');kw.add('brandi')}
  if(folder==='videot'){kw.add('video')}
  // LLFF festival photos
  if(name.includes('lapinlahden-elokuvajuhlat')||name.includes('llff')){
    kw.add('LLFF');kw.add('festivaali');kw.add('elokuvajuhlat');kw.add('Lapinlahti');
    kw.add('elokuva');kw.add('kulttuuri');kw.add('Helsinki');
    const numMatch2=name.match(/elokuvajuhlat-(\d+)/);
    if(numMatch2){const n=parseInt(numMatch2[1]);
      if(n<=20){kw.add('tunnelma');kw.add('yleisö')}
      else if(n<=40){kw.add('näytös');kw.add('tapahtuma')}
      else if(n<=60){kw.add('yhteisö');kw.add('piha')}
      else{kw.add('ilta');kw.add('ulkoilma')}
    }
    return[...kw];
  }
  // VERTU event photos — outdoor group/portrait photos from summer event
  if(name.includes('vertu')){kw.add('VERTU-tapahtuma');kw.add('vertaistuki');kw.add('tapahtuma');kw.add('henkilökuvat');kw.add('kesa 2025')}
  // Photo number ranges might indicate different scenes
  const numMatch=name.match(/ab-(\d+)/);
  if(numMatch){
    const n=parseInt(numMatch[1]);
    if(n<100){kw.add('ryhmakuva');kw.add('ulkokuva')}
    else if(n<200){kw.add('sisatilat');kw.add('keskustelu')}
    else if(n<300){kw.add('muotokuva');kw.add('henkilökuva')}
    else{kw.add('ryhmakuva');kw.add('poseeraus')}
  }
  // AVL grafiikat — social media infographics about brain health
  if(folder==='grafiikat'){
    kw.add('aivovammaliitto');kw.add('aivoterveys');kw.add('some');kw.add('infografiikka');
    kw.add('Instagram');kw.add('Facebook');kw.add('tietoisuus');kw.add('kampanja');
    kw.add('aivovaurio');kw.add('AVH');kw.add('ennaltaehkäisy')
  }
  if(folder==='valokuvat'){kw.add('aivovammaliitto');kw.add('vertaistuki');kw.add('yhteiso')}
  return[...kw];
};

function MediaBank({toast,t}){
  // Org-aware manifest: AVL uses MEDIA_MANIFEST, LEF uses LLFF_MEDIA_MANIFEST
  const manifestFiles=_activeOrg==='lef'?(window.LLFF_MEDIA_MANIFEST||[]):(window.MEDIA_MANIFEST||[]);
  const[meta,setMeta]=useOrgState('media_meta',{});// {id: {tags:[], desc:'', title:''}}
  const[uploadedFiles,setUploadedFiles]=useOrgState('media_uploaded',[]);// drag&drop files stored as small dataURLs
  const[dragging,setDragging]=useState(false);const dragCounter=useRef(0);
  const[cat,setCat]=useState('all');
  const[search,setSearch]=useState('');
  const[detailIdx,setDetailIdx]=useState(-1);// index in filtered list
  const[editingMeta,setEditingMeta]=useState(false);
  const[tagInput,setTagInput]=useState('');
  const[titleInput,setTitleInput]=useState('');
  const[descInput,setDescInput]=useState('');
  const fileRef=useRef(null);

  const categories=[
    {id:'all',label:'Kaikki',icon:'\u2588'},
    {id:'valokuvat',label:'Valokuvat',icon:'\u25a3'},
    {id:'grafiikat',label:'Grafiikat',icon:'\u25c6'},
    {id:'logot',label:'Logot',icon:'\u25c7'},
    {id:'videot',label:'Videot',icon:'\u25b7'},
    {id:'uploaded',label:'Ladatut',icon:'\u2191'}
  ];

  const formatSize=(bytes)=>{
    if(!bytes)return'';
    if(bytes<1024)return bytes+' B';
    if(bytes<1024*1024)return(bytes/1024).toFixed(1)+' KB';
    return(bytes/(1024*1024)).toFixed(1)+' MB';
  };

  // Get metadata for a file (or generate defaults)
  const getMeta=(id)=>{
    if(meta[id])return meta[id];
    const file=manifestFiles.find(f=>f.id===id)||uploadedFiles.find(f=>f.id===id);
    if(!file)return{tags:[],desc:'',title:''};
    const aiTags=generateAIKeywords(file);
    return{tags:aiTags,desc:'',title:''};
  };

  const saveMeta=(id,newMeta)=>{setMeta(p=>({...p,[id]:newMeta}))};

  // Combine manifest + uploaded into unified list
  const allFiles=[
    ...manifestFiles.map(f=>({...f,source:'manifest'})),
    ...uploadedFiles.map(f=>({...f,source:'uploaded',folder:'uploaded'}))
  ];

  // Filter by category
  const catFiltered=cat==='all'?allFiles:allFiles.filter(f=>f.folder===cat);

  // Filter by search (matches filename, tags, title, desc)
  const filtered=search.trim()?catFiltered.filter(f=>{
    const q=search.toLowerCase();
    const m=getMeta(f.id);
    return f.name.toLowerCase().includes(q)
      ||(m.title||'').toLowerCase().includes(q)
      ||(m.desc||'').toLowerCase().includes(q)
      ||(m.tags||[]).some(t=>t.toLowerCase().includes(q));
  }):catFiltered;

  const totalSize=allFiles.reduce((s,f)=>s+(f.size||0),0);

  // Upload handler (creates thumbnail dataURL for display)
  const handleUpload=async(fileList)=>{
    const newFiles=[];
    for(const file of fileList){
      const ext=file.name.split('.').pop().toLowerCase();
      const isImg=['jpg','jpeg','png','gif','webp','svg'].includes(ext);
      const isVid=['mp4','webm','mov'].includes(ext);
      // Create small thumbnail
      let thumbUrl=null;
      if(isImg){
        thumbUrl=await new Promise(res=>{
          const reader=new FileReader();
          reader.onload=e=>{
            const img=new Image();img.onload=()=>{
              const canvas=document.createElement('canvas');
              const maxW=300;const scale=Math.min(maxW/img.width,1);
              canvas.width=img.width*scale;canvas.height=img.height*scale;
              const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);
              res(canvas.toDataURL('image/jpeg',0.7));
            };img.src=e.target.result;
          };reader.readAsDataURL(file);
        });
      }
      const entry={
        id:'uploaded_'+Date.now()+'_'+Math.random().toString(36).slice(2),
        name:file.name,size:file.size,type:isImg?'image':isVid?'video':'other',
        ext,thumb:thumbUrl,path:null,folder:'uploaded',
        added:new Date().toISOString().slice(0,10)
      };
      newFiles.push(entry);
      // Auto-generate AI tags
      const aiTags=generateAIKeywords(entry);
      saveMeta(entry.id,{tags:aiTags,desc:'',title:''});
    }
    setUploadedFiles(p=>[...newFiles,...p]);
    toast(newFiles.length+' tiedostoa lisätty','success');
  };

  // Detail navigation
  const detail=detailIdx>=0&&detailIdx<filtered.length?filtered[detailIdx]:null;
  const goNext=()=>{if(detailIdx<filtered.length-1)setDetailIdx(detailIdx+1)};
  const goPrev=()=>{if(detailIdx>0)setDetailIdx(detailIdx-1)};
  const openDetail=(idx)=>{setDetailIdx(idx);setEditingMeta(false)};
  const closeDetail=()=>{setDetailIdx(-1);setEditingMeta(false)};

  // Start editing metadata
  const startEdit=()=>{
    if(!detail)return;
    const m=getMeta(detail.id);
    setTitleInput(m.title||'');setDescInput(m.desc||'');setTagInput('');
    setEditingMeta(true);
  };
  const saveEdit=()=>{
    if(!detail)return;
    const m=getMeta(detail.id);
    saveMeta(detail.id,{...m,title:titleInput,desc:descInput});
    setEditingMeta(false);toast('Tiedot tallennettu','success');
  };
  const addTag=(tag)=>{
    if(!detail||!tag.trim())return;
    const m=getMeta(detail.id);
    if(!m.tags.includes(tag.trim())){
      saveMeta(detail.id,{...m,tags:[...m.tags,tag.trim()]});
    }
    setTagInput('');
  };
  const removeTag=(tag)=>{
    if(!detail)return;
    const m=getMeta(detail.id);
    saveMeta(detail.id,{...m,tags:m.tags.filter(t=>t!==tag)});
  };

  // Keyboard navigation in detail view
  useEffect(()=>{
    if(detailIdx<0)return;
    const handler=(e)=>{
      if(e.key==='ArrowRight'||e.key==='ArrowDown')goNext();
      else if(e.key==='ArrowLeft'||e.key==='ArrowUp')goPrev();
      else if(e.key==='Escape')closeDetail();
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[detailIdx,filtered.length]);

  // Touch swipe navigation for mobile
  const touchRef=useRef(null);
  useEffect(()=>{
    if(detailIdx<0)return;
    let startX=0,startY=0;
    const onStart=(e)=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY};
    const onEnd=(e)=>{
      const dx=e.changedTouches[0].clientX-startX;
      const dy=e.changedTouches[0].clientY-startY;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
        if(dx<0)goNext();else goPrev();
      }
    };
    document.addEventListener('touchstart',onStart,{passive:true});
    document.addEventListener('touchend',onEnd,{passive:true});
    return()=>{document.removeEventListener('touchstart',onStart);document.removeEventListener('touchend',onEnd)};
  },[detailIdx,filtered.length]);

  // Collect all unique tags for tag cloud
  const allTags=[...new Set(allFiles.flatMap(f=>(getMeta(f.id).tags||[])))].sort();

  // Delete uploaded file
  const deleteUploaded=(id)=>{
    setUploadedFiles(p=>p.filter(f=>f.id!==id));
    setMeta(p=>{const n={...p};delete n[id];return n});
    if(detail&&detail.id===id)closeDetail();
    toast('Tiedosto poistettu','success');
  };

  // Drag & drop handlers
  const onDragEnter=(e)=>{e.preventDefault();e.stopPropagation();dragCounter.current++;if(dragCounter.current===1)setDragging(true)};
  const onDragLeave=(e)=>{e.preventDefault();e.stopPropagation();dragCounter.current--;if(dragCounter.current===0)setDragging(false)};
  const onDragOver=(e)=>{e.preventDefault();e.stopPropagation()};
  const onDrop=(e)=>{e.preventDefault();e.stopPropagation();setDragging(false);dragCounter.current=0;
    if(e.dataTransfer.files&&e.dataTransfer.files.length>0){handleUpload(Array.from(e.dataTransfer.files));e.dataTransfer.clearData()}};

  return(<div className="page-enter" onDragEnter={onDragEnter} onDragLeave={onDragLeave} onDragOver={onDragOver} onDrop={onDrop}>
    {/* Drag overlay */}
    {dragging&&<div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(26,143,196,.12)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      <div style={{background:'var(--card)',border:'3px dashed var(--pri)',borderRadius:20,padding:'3rem 4rem',textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}>
        <div style={{fontSize:'2rem',marginBottom:'1rem',fontFamily:'var(--font-display)',opacity:.5}}>{'\u2191'}</div>
        <h3 style={{fontSize:'1.2rem',fontWeight:800,color:'var(--t1)',marginBottom:'.5rem'}}>Pudota tiedostot tähän</h3>
        <p style={{fontSize:'.85rem',color:'var(--t2)',fontWeight:500}}>Kuvat, videot ja grafiikat</p>
      </div>
    </div>}

    {/* Header */}
    <div style={{marginBottom:'1.5rem',display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'1rem'}}>
      <div>
        <h2 style={{fontSize:'1.3rem',fontWeight:800,letterSpacing:'-.02em',marginBottom:'.3rem'}}>Mediapankki</h2>
        <p style={{fontSize:'.85rem',color:'var(--t2)',fontWeight:500}}>{allFiles.length} tiedostoa \u00b7 {formatSize(totalSize)}</p>
      </div>
      <div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
        <div style={{position:'relative'}}>
          <input className="input" placeholder="Hae nimellä tai avainsanalla..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{width:280,paddingLeft:'2rem',fontSize:'.82rem'}}/>

        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>fileRef.current?.click()}>+ Lisää</button>
        <input ref={fileRef} type="file" multiple accept="image/*,video/*,.svg,.pdf,.doc,.docx" style={{display:'none'}} onChange={e=>{if(e.target.files.length)handleUpload(Array.from(e.target.files));e.target.value=''}}/>
      </div>

      onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--pri)';e.currentTarget.style.background='rgba(26,143,196,.04)'}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--elev)'}}>

      {categories.map(c=>{
