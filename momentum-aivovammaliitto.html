              style={{position:'absolute',right:'.5rem',top:'50%',transform:'translateY(-50%)',background:'rgba(0,0,0,.6)',border:'1px solid rgba(255,255,255,.1)',color:detailIdx<filtered.length-1?'#fff':'rgba(255,255,255,.2)',fontSize:'1.3rem',width:44,height:44,borderRadius:'50%',cursor:detailIdx<filtered.length-1?'pointer':'default',zIndex:10,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(8px)',transition:'all .2s'}}>
              {'\u2192'}</button>

            {detail.type==='image'&&<img src={detail.path||detail.thumb} alt={getMeta(detail.id).title||detail.name}
              onError={e=>{if(detail.thumb&&!e.target.dataset.fell){e.target.dataset.fell='1';e.target.src=detail.thumb}}}
              style={{maxWidth:'calc(100% - 100px)',maxHeight:'85vh',objectFit:'contain',borderRadius:'var(--r)',boxShadow:'0 8px 40px rgba(0,0,0,.5)'}}
              onClick={e=>e.stopPropagation()}/>}
            {detail.type==='video'&&<video src={detail.path} controls autoPlay style={{maxWidth:'calc(100% - 100px)',maxHeight:'85vh',borderRadius:'var(--r)'}} onClick={e=>e.stopPropagation()}/>}
          </div>

          {/* Sidebar info panel — hidden on mobile, toggle with info button */}
          <div className="lb-sidebar" style={{width:320,flexShrink:0,background:'var(--card)',borderLeft:'1px solid var(--border)',padding:'1.25rem',overflowY:'auto',display:'flex',flexDirection:'column',gap:'1rem'}} onClick={e=>e.stopPropagation()}>
            <div>
              <h3 style={{fontSize:'1rem',fontWeight:700,letterSpacing:'-.01em',marginBottom:'.25rem',wordBreak:'break-word'}}>{getMeta(detail.id).title||detail.name}</h3>
              <p style={{fontSize:'.78rem',color:'var(--t2)',fontWeight:500}}>{formatSize(detail.size)} {'\u00b7'} {detail.ext.toUpperCase()} {'\u00b7'} {detail.folder}</p>
            </div>

            {getMeta(detail.id).desc&&<p style={{fontSize:'.82rem',color:'var(--t2)',lineHeight:1.6,fontWeight:500}}>{getMeta(detail.id).desc}</p>}

            {/* Tags / AI Keywords */}
            <div>
              <h4 style={{fontSize:'.72rem',fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:'.5rem'}}>Avainsanat (AI + omat)</h4>
              <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem',marginBottom:'.5rem'}}>
                {(getMeta(detail.id).tags||[]).map((tag,j)=><span key={j} style={{
                  fontSize:'.68rem',padding:'.2rem .5rem',borderRadius:9999,fontWeight:600,cursor:'pointer',
                  background:'rgba(26,143,196,.1)',color:'var(--pri-l)',border:'1px solid rgba(26,143,196,.15)',
                  display:'flex',alignItems:'center',gap:'.2rem'
                }} onClick={()=>removeTag(tag)}>{tag} <span style={{opacity:.5}}>{'\u00d7'}</span></span>)}
              </div>
              <div style={{display:'flex',gap:'.3rem'}}>
                <input className="input" placeholder="Lisää avainsana..." value={tagInput} onChange={e=>setTagInput(e.target.value)}
                  onKeyPress={e=>{if(e.key==='Enter')addTag(tagInput)}} style={{flex:1,fontSize:'.78rem',padding:'.4rem .6rem'}}/>
                <button className="btn btn-secondary btn-sm" onClick={()=>addTag(tagInput)} disabled={!tagInput.trim()}>+</button>
              </div>
            </div>

            {/* Editable title & description */}
            {!editingMeta?<button className="btn btn-secondary btn-sm" onClick={startEdit} style={{alignSelf:'flex-start'}}>Muokkaa tietoja</button>
            :<div style={{display:'flex',flexDirection:'column',gap:'.5rem'}}>
              <div><label style={{fontSize:'.68rem',fontWeight:600,color:'var(--t3)',textTransform:'uppercase'}}>Otsikko</label>
                <input className="input" value={titleInput} onChange={e=>setTitleInput(e.target.value)} placeholder={detail.name} style={{fontSize:'.82rem',padding:'.45rem .6rem'}}/></div>
              <div><label style={{fontSize:'.68rem',fontWeight:600,color:'var(--t3)',textTransform:'uppercase'}}>Kuvaus</label>
                <textarea className="input textarea" value={descInput} onChange={e=>setDescInput(e.target.value)} placeholder="Kuvaile sisältöä..." style={{fontSize:'.82rem',padding:'.45rem .6rem',minHeight:80}}/></div>
              <div style={{display:'flex',gap:'.3rem'}}>
                <button className="btn btn-primary btn-sm" onClick={saveEdit}>Tallenna</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setEditingMeta(false)}>Peruuta</button>
              </div>
            </div>}

            {/* File info */}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:'.75rem',marginTop:'auto'}}>
              <div style={{fontSize:'.72rem',color:'var(--t3)',fontWeight:500,lineHeight:1.8}}>
                <div><strong>Tiedosto:</strong> {detail.name}</div>
                <div><strong>Koko:</strong> {formatSize(detail.size)}</div>
                <div><strong>Tyyppi:</strong> {detail.ext.toUpperCase()}</div>
                <div><strong>Kansio:</strong> {detail.folder}</div>
                {detail.added&&<div><strong>Lisätty:</strong> {detail.added}</div>}
              </div>
              {detail.source==='uploaded'&&<button className="btn btn-sm" onClick={()=>deleteUploaded(detail.id)}
                style={{marginTop:'.75rem',color:'var(--red,#ef4444)',border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.05)',width:'100%',fontSize:'.75rem',fontWeight:600}}>
                Poista tiedosto</button>}
            </div>

            {/* Thumbnail strip for quick navigation */}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:'.75rem'}}>
              <div style={{fontSize:'.68rem',fontWeight:600,color:'var(--t3)',textTransform:'uppercase',marginBottom:'.4rem'}}>Selää ({filtered.length})</div>
              <div style={{display:'flex',gap:'3px',flexWrap:'wrap',maxHeight:120,overflowY:'auto'}}>
                {filtered.map((f,i)=>{
                  const th=f.thumb||(f.source==='uploaded'?null:f.path);
                  return<div key={f.id} onClick={()=>openDetail(i)} style={{
                    width:36,height:36,borderRadius:4,overflow:'hidden',cursor:'pointer',flexShrink:0,
                    border:i===detailIdx?'2px solid var(--pri)':'2px solid transparent',opacity:i===detailIdx?1:.6
                  }}>{th?<img src={th} style={{width:'100%',height:'100%',objectFit:'cover'}} loading="lazy"/>
                    :<div style={{width:'100%',height:'100%',background:'var(--elev)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.5rem',color:'var(--t3)'}}>{f.ext}</div>}
                  </div>})}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>}
  </div>);}

// ══════ SETTINGS ══════
function Settings({toast,org,setOrg,resetAll,t,lang,setLang,activeOrg}){
  const[confirm,setConfirm]=useState(false);
  const[editName,setEN]=useState(org.name);const[editShort,setES]=useState(org.s);const[editSlogan,setESl]=useState(org.slogan);
  const saveBasic=()=>{setOrg(p=>({...p,name:editName,s:editShort,slogan:editSlogan}));toast(t('updated'),'success')};
  return(<div className="page-enter" style={{maxWidth:700}}>
    <div className="bcard"><div className="bcard-h"><h3>Organisaatio</h3></div><div className="bcard-b">
      <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
        {Object.values(ORG_REGISTRY).map(o=><button key={o.id} className={`btn ${activeOrg===o.id?'btn-primary':'btn-secondary'}`} onClick={()=>{if(activeOrg!==o.id)switchOrg(o.id)}}>{o.name}</button>)}
      </div>
      <p style={{color:'var(--t3)',fontSize:'.75rem',marginTop:'.5rem',fontWeight:500}}>Vaihda organisaatiota — jokaisen data on erillinen.</p>
    </div></div>
    <div className="bcard"><div className="bcard-h"><h3>{t('language')}</h3></div><div className="bcard-b">
      <div style={{display:'flex',gap:'.5rem'}}>
        <button className={`btn ${lang==='fi'?'btn-primary':'btn-secondary'}`} onClick={()=>setLang('fi')}>Suomi</button>
        <button className={`btn ${lang==='en'?'btn-primary':'btn-secondary'}`} onClick={()=>setLang('en')}>English</button>
      </div>
    </div></div>
    <div className="bcard"><div className="bcard-h"><h3>{t('orgBasicInfo')}</h3></div><div className="bcard-b">
      <div className="field"><label>{t('obOrgName')}</label><input className="input" value={editName} onChange={e=>setEN(e.target.value)}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
        <div className="field"><label>{t('obShortName')}</label><input className="input" value={editShort} onChange={e=>setES(e.target.value)}/></div>
        <div className="field"><label>{t('obSlogan')}</label><input className="input" value={editSlogan} onChange={e=>setESl(e.target.value)}/></div>
      </div>
      <button className="btn btn-primary" onClick={saveBasic}>{t('save')}</button>
    </div></div>
    <div className="bcard" style={{borderColor:'rgba(239,107,107,.3)'}}><div className="bcard-h"><h3 style={{color:'var(--red)'}}>{t('dangerZone')}</h3></div><div className="bcard-b">
      <p style={{color:'var(--t2)',fontSize:'.88rem',marginBottom:'1rem',fontWeight:500}}>{t('resetWarning')}</p>
      {!confirm?<button className="btn" style={{background:'rgba(239,107,107,.12)',color:'var(--red)',border:'1px solid rgba(239,107,107,.3)'}} onClick={()=>setConfirm(true)}>{t('resetButton')}</button>
      :<div style={{display:'flex',gap:'.75rem',alignItems:'center'}}><span style={{fontSize:'.85rem',color:'var(--red)',fontWeight:600}}>{t('resetConfirm')}</span>
        <button className="btn" style={{background:'var(--red)',color:'#fff'}} onClick={resetAll}>{t('resetYes')}</button>
        <button className="btn btn-ghost" onClick={()=>setConfirm(false)}>{t('cancel')}</button></div>}
    </div></div>
  </div>);}

// ══════ APP ══════
function App(){const{toasts,add}=useToast();const[ob,setOB]=usePersistedState('onboarded',true);const[v,setV]=useState('home');
  const activeOrg=_activeOrg;
  const orgCtx=ORG_CONTEXTS[activeOrg]||AVL_CONTEXT;
  const orgDef=ORG_DEFAULTS[activeOrg]||ORG_DEFAULTS.avl;
  const[org,setOrg]=useOrgState('org',orgDef.org);
  const[prj,setPrj]=useOrgState('projects',[]);
  const[events,setEvents]=useOrgState('events',orgDef.events);
  const[chStats,setChStats]=useOrgState('channelStats',orgCtx.channelStats);
  const[lang,setLang]=usePersistedState('lang','fi');
  const t=mkT(lang);

  const resetAll=()=>{clearOrgData(activeOrg);setOB(false);setOrg(orgDef.org);setPrj([]);setEvents(orgDef.events);setChStats(orgCtx.channelStats);setLang('fi');setV('home')};

  const[chatOpen,setChatOpen]=useState(false);
  const[mobNav,setMobNav]=useState(false);
  useEffect(()=>{if(mobNav)document.body.classList.add('no-scroll');else document.body.classList.remove('no-scroll');return()=>document.body.classList.remove('no-scroll')},[mobNav]);
  const goTo=(page)=>{setV(page);setMobNav(false)};
  if(!ob)return<><Toasts t={toasts}/><Onboarding onDone={()=>setOB(true)} toast={add} setOrg={setOrg} t={t}/></>;
  const nav=[{id:'home',l:t('home'),ic:'\u25c9'},{id:'strategy',l:t('strategy'),ic:'\u25c8'},{id:'pipeline',l:t('projects'),ic:'\u2630',cnt:prj.length},{id:'calendar',l:t('calendar'),ic:'\u25a6'},{id:'media',l:'Mediapankki',ic:'\u25a3'}];
  const hdr={home:{t:t('home'),s:(org.s||org.name||'Hetki')},pipeline:{t:t('projects'),s:prj.length+' '+t('projects').toLowerCase()},calendar:{t:t('calendar'),s:events.length+' '+t('publications_plural')},strategy:{t:t('strategy'),s:org.slogan||t('strategy')},media:{t:'Mediapankki',s:'Valokuvat, videot ja grafiikat'},settings:{t:t('settings'),s:t('manageOrg')}};
  const h=hdr[v]||hdr.home;
  const navContent=<>
    <div className="side-hd" style={{position:'relative'}}><div className="logo-text"><img src="media/brand/hetki-logo-white.png" alt="Hetki"/> Momentum</div></div>
    <div className="ws-box" onClick={()=>goTo('settings')}><div className="ws-name">{org.name||'Organisaatio'}</div><div className="ws-plan">Free Plan</div></div>
    <nav style={{flex:1,padding:'.5rem 0',overflowY:'auto'}}>
      <div className="nav-sec">{t('tools')}</div>
      {nav.map(n=><div key={n.id} className={`nav-i ${v===n.id?'act':''}`} onClick={()=>goTo(n.id)}><span className="nav-ic">{n.ic}</span><span>{n.l}</span>{n.badge&&<span className="badge badge-ai">AI</span>}{n.cnt>0&&<span className="badge badge-c">{n.cnt}</span>}</div>)}
      <div className="nav-sec">{t('system')}</div>
      <div className={`nav-i ${v==='settings'?'act':''}`} onClick={()=>goTo('settings')}><span className="nav-ic">{'\u2699'}</span><span>{t('settings')}</span></div>
    </nav>
    <div className="side-ft"><div className="color-band" style={{position:'absolute',top:0,left:0,right:0}}><span style={{background:'var(--hetki-blue)'}}/><span style={{background:'var(--hetki-green)'}}/><span style={{background:'var(--hetki-yellow)'}}/><span style={{background:'var(--hetki-pink)'}}/><span style={{background:'var(--hetki-black)'}}/></div><div className="ava">{'AB'}</div><div><div style={{fontSize:'.8rem',fontWeight:600}}>Anton Baer</div><div style={{fontSize:'.62rem',color:'var(--t3)',fontWeight:500}}>Viestintävastaava</div></div></div>
  </>;
  return(<div className="app"><Toasts t={toasts}/>
    {/* Desktop sidebar */}
    <aside className="side">{navContent}</aside>
    {/* Mobile drawer */}
    {mobNav&&<div className="mob-overlay" style={{display:'block'}} onClick={()=>setMobNav(false)}/>}
    <div className={`mob-drawer ${mobNav?'open':''}`}>
      <button className="mob-close" onClick={()=>setMobNav(false)}>{'\u2715'}</button>
      {navContent}
    </div>
    <main className="main">
      <header className="topbar">
        <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
          <button className="mob-toggle" onClick={()=>setMobNav(true)}>{'\u2630'}</button>
          <div><h1>{h.t}</h1><p>{h.s}</p></div>
        </div>
      </header>
      <div className="page">
        {v==='home'&&<Home go={setV} toast={add} prj={prj} events={events} org={org} t={t} chStats={chStats} setChStats={setChStats} orgCtx={orgCtx}/>}
        {v==='pipeline'&&<Pipeline prj={prj} setPrj={setPrj} toast={add} t={t} org={org}/>}
        {v==='calendar'&&<Cal toast={add} events={events} setEvents={setEvents} org={org} t={t}/>}
        {v==='strategy'&&<Strat toast={add} org={org} setOrg={setOrg} t={t} chStats={chStats}/>}
        {v==='media'&&<MediaBank toast={add} t={t}/>}
        {v==='settings'&&<Settings toast={add} org={org} setOrg={setOrg} resetAll={resetAll} t={t} lang={lang} setLang={setLang} activeOrg={activeOrg}/>}
      </div>
    </main>
    {/* Global AI Chat */}
    {!chatOpen&&<button className="chat-fab" onClick={()=>setChatOpen(true)}>AI</button>}
    {chatOpen&&<><div className="chat-panel-ov" onClick={()=>setChatOpen(false)}/><div className="chat-panel"><Chat toast={add} org={org} t={t} chStats={chStats} orgCtx={orgCtx} events={events} prj={prj} onClose={()=>setChatOpen(false)}/></div></>}
  </div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
