<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momentum</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <style>
    :root {
      --pri:#1a8fc4;--pri-l:#3aabde;--pri-d:#0d6e99;
      --bg:#06080c;--card:#0c0f15;--card2:#111520;--elev:#161b27;--border:#1e2433;--border-l:#2a3144;
      --t1:#f0f2f5;--t2:#8b95a8;--t3:#505a6e;
      --green:#2dd4a0;--yellow:#f5c542;--red:#ef6b6b;--purple:#9b7cf6;--purple-l:#b49bfa;--pink:#e879a8;--orange:#f09a52;--cyan:#4ad8d8;
      --r:10px;--rl:14px;--rxl:18px;
      --glass:rgba(12,15,21,.7);--glass-border:rgba(255,255,255,.06);
      --shadow:0 4px 24px rgba(0,0,0,.3);
      --font:'Plus Jakarta Sans',system-ui,sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg);color:var(--t1);line-height:1.5}
    ::selection{background:var(--pri);color:#fff}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
    @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(26,143,196,.15)}50%{box-shadow:0 0 30px rgba(26,143,196,.25)}}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* ─── TOAST ─── */
    .toast-wrap{position:fixed;top:1.5rem;right:1.5rem;z-index:1000;display:flex;flex-direction:column;gap:.5rem}
    .toast{padding:.875rem 1.25rem;border-radius:var(--rl);animation:fadeUp .3s;min-width:300px;font-size:.85rem;backdrop-filter:blur(16px);font-weight:500}
    .toast.success{background:rgba(45,212,160,.12);border:1px solid rgba(45,212,160,.3);color:var(--green)}
    .toast.info{background:rgba(26,143,196,.12);border:1px solid rgba(26,143,196,.3);color:var(--pri-l)}

    /* ─── FORMS ─── */
    .field{margin-bottom:1.25rem}
    .field label{display:block;font-size:.75rem;font-weight:600;color:var(--t3);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.04em}
    .input{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:var(--r);font-size:.9rem;background:var(--elev);color:var(--t1);font-family:var(--font);transition:all .2s}
    .input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(26,143,196,.12)}
    .input::placeholder{color:var(--t3)}
    .textarea{resize:vertical;min-height:120px;line-height:1.7}
    .textarea-lg{min-height:180px;font-size:1rem;padding:1.25rem}

    /* ─── BUTTONS ─── */
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.25rem;border-radius:var(--r);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:var(--font);letter-spacing:-.01em}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .btn-primary{background:linear-gradient(135deg,var(--pri),var(--pri-l));color:#fff;box-shadow:0 2px 12px rgba(26,143,196,.25)}
    .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(26,143,196,.35)}
    .btn-secondary{background:var(--elev);color:var(--t1);border:1px solid var(--border)}
    .btn-secondary:hover:not(:disabled){border-color:var(--pri);background:rgba(26,143,196,.05)}
    .btn-ghost{background:transparent;color:var(--t2);padding:.4rem .6rem;font-weight:500}
    .btn-ghost:hover{color:var(--t1)}
    .btn-lg{padding:.875rem 2rem;font-size:.95rem;border-radius:var(--rl)}
    .btn-sm{padding:.4rem .8rem;font-size:.78rem}
    .btn-hetki{background:linear-gradient(135deg,var(--pri-d),var(--pri),var(--pri-l));background-size:200% 200%;animation:gradientShift 3s ease infinite;color:#fff;font-weight:700;box-shadow:0 2px 16px rgba(26,143,196,.3)}
    .btn-hetki:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(26,143,196,.4)}

    /* ─── ONBOARDING ─── */
    .onb{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 50% 0%,rgba(26,143,196,.08) 0%,transparent 60%)}
    .onb-wrap{width:100%;max-width:640px;animation:scaleIn .5s ease}
    .onb-logo{text-align:center;margin-bottom:2.5rem}
    .onb-logo h1{font-size:2.8rem;font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,var(--pri-l),var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .onb-logo p{color:var(--t2);font-size:.9rem;margin-top:.3rem;font-weight:500}
    .onb-card{background:var(--card);border:1px solid var(--glass-border);border-radius:var(--rxl);overflow:hidden;backdrop-filter:blur(20px);box-shadow:var(--shadow)}
    .onb-head{padding:1.75rem 2rem;border-bottom:1px solid var(--border)}
    .onb-head h2{font-size:1.15rem;font-weight:700;letter-spacing:-.02em}
    .onb-head p{color:var(--t2);font-size:.82rem;margin-top:.3rem}
    .onb-body{padding:2rem}
    .onb-foot{padding:1.25rem 2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .onb-dots{display:flex;gap:.5rem}
    .onb-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .4s}
    .onb-dot.active{background:var(--pri);width:28px;border-radius:5px}
    .onb-dot.done{background:var(--green)}

    .ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .ch-card{background:var(--elev);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:.875rem}
    .ch-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
    .ch-card.on{border-color:var(--green);background:rgba(45,212,160,.04);box-shadow:0 0 0 1px rgba(45,212,160,.15)}
    .ch-icon{width:42px;height:42px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .ch-info h4{font-size:.85rem;font-weight:700}
    .ch-info p{font-size:.72rem;color:var(--t3);margin-top:.1rem}
    .ch-stat{margin-left:auto;text-align:right}
    .ch-stat .num{font-size:1rem;font-weight:800;color:var(--t1);animation:countUp .4s ease}
    .ch-stat .lbl{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
    .ch-status{font-size:.65rem;padding:.25rem .55rem;border-radius:9999px;font-weight:600;margin-left:auto}

    .strat-opts{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.25rem}
    .strat-opt{background:var(--elev);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem 1.25rem;cursor:pointer;transition:all .25s}
    .strat-opt:hover{border-color:var(--pri)}
    .strat-opt.sel{border-color:var(--pri);background:rgba(26,143,196,.06);box-shadow:0 0 0 1px rgba(26,143,196,.15)}
    .strat-opt h4{font-size:.9rem;font-weight:700;margin-bottom:.2rem}
    .strat-opt p{font-size:.78rem;color:var(--t3)}
    .tip-box{background:linear-gradient(135deg,rgba(26,143,196,.06),rgba(155,124,246,.06));border:1px solid rgba(26,143,196,.12);border-radius:var(--r);padding:.875rem 1.1rem;font-size:.82rem;color:var(--pri-l);margin-top:1rem;line-height:1.6}
    .skip{color:var(--t3);font-size:.82rem;cursor:pointer;font-weight:500;transition:color .2s}
    .skip:hover{color:var(--t1)}

    /* AI Dialog */
    .ai-dialog{display:flex;flex-direction:column;gap:.75rem;max-height:380px;overflow-y:auto;padding-right:.25rem}
    .ai-bub{display:flex;gap:.6rem;animation:fadeUp .3s ease}
    .ai-bub.user{flex-direction:row-reverse}
    .ai-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0}
    .ai-bub.assistant .ai-av{background:linear-gradient(135deg,var(--pri),var(--purple));color:#fff}
    .ai-bub.user .ai-av{background:var(--elev);color:var(--t2)}
    .ai-bub-c{padding:.8rem 1rem;border-radius:var(--rl);max-width:85%;font-size:.85rem;line-height:1.65}
    .ai-bub.assistant .ai-bub-c{background:var(--elev);border:1px solid var(--border)}
    .ai-bub.user .ai-bub-c{background:linear-gradient(135deg,var(--pri),var(--pri-l));color:#fff}
    .ai-bub-c p{margin-bottom:.4rem}.ai-bub-c p:last-child{margin-bottom:0}
    .ai-opts{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
    .ai-opt-btn{background:var(--card);border:1px solid var(--border);padding:.45rem .8rem;border-radius:9999px;font-size:.75rem;cursor:pointer;color:var(--t2);font-family:var(--font);font-weight:500;transition:all .2s}
    .ai-opt-btn:hover{border-color:var(--pri);color:var(--pri-l);background:rgba(26,143,196,.05)}
    .typing{display:flex;gap:.25rem;padding:.3rem}
    .typing span{width:6px;height:6px;background:var(--t3);border-radius:50%;animation:bounce 1.4s infinite}
    .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}

    /* ─── APP SHELL ─── */
    .app{display:flex;min-height:100vh}
    .side{width:264px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:50}
    .side-hd{padding:1.5rem 1.5rem 1.25rem;border-bottom:1px solid var(--border)}
    .logo-text{font-weight:800;font-size:1.15rem;letter-spacing:-.03em;background:linear-gradient(135deg,var(--pri-l),var(--purple-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .ws-box{margin:.875rem 1.25rem;padding:.8rem 1rem;background:var(--elev);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s}
    .ws-box:hover{border-color:var(--pri)}
    .ws-name{font-weight:700;font-size:.82rem;letter-spacing:-.01em}
    .ws-plan{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:.2rem;font-weight:600}
    .nav-sec{padding:1.25rem 1.5rem .5rem;font-size:.6rem;text-transform:uppercase;color:var(--t3);letter-spacing:.08em;font-weight:700}
    .nav-i{display:flex;align-items:center;padding:.7rem 1.5rem;color:var(--t2);cursor:pointer;font-size:.87rem;position:relative;transition:all .15s;gap:.65rem;font-weight:500}
    .nav-i:hover{background:rgba(255,255,255,.02);color:var(--t1)}
    .nav-i.act{color:var(--pri-l);background:linear-gradient(90deg,rgba(26,143,196,.08),transparent)}
    .nav-i.act::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:linear-gradient(180deg,var(--pri),var(--purple));border-radius:0 3px 3px 0}
    .nav-ic{width:20px;text-align:center;font-size:.85rem;opacity:.5}
    .nav-i.act .nav-ic{opacity:1}
    .badge{margin-left:auto;font-size:.6rem;padding:.2rem .55rem;border-radius:9999px;font-weight:700}
    .badge-ai{background:linear-gradient(135deg,var(--pri),var(--purple));color:#fff}
    .badge-n{background:rgba(45,212,160,.12);color:var(--green);border:1px solid rgba(45,212,160,.2)}
    .badge-c{background:var(--elev);color:var(--t3);border:1px solid var(--border)}
    .side-ft{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
    .ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--purple));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff}

    .main{flex:1;margin-left:264px;display:flex;flex-direction:column}
    .topbar{background:rgba(12,15,21,.85);backdrop-filter:blur(16px);padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
    .topbar h1{font-size:1.3rem;font-weight:800;letter-spacing:-.02em}
    .topbar p{font-size:.78rem;color:var(--t2);font-weight:500}
    .page{flex:1;padding:2rem;overflow-y:auto}
    .page-enter{animation:fadeUp .4s ease}

    /* ─── DASHBOARD ─── */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.75rem}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem 1.4rem;animation:fadeUp .4s ease backwards;position:relative;overflow:hidden}
    .stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
    .stat:nth-child(1)::after{background:linear-gradient(90deg,var(--pri),var(--pri-l))}.stat:nth-child(1){animation-delay:0s}
    .stat:nth-child(2)::after{background:linear-gradient(90deg,var(--green),var(--cyan))}.stat:nth-child(2){animation-delay:.05s}
    .stat:nth-child(3)::after{background:linear-gradient(90deg,var(--yellow),var(--orange))}.stat:nth-child(3){animation-delay:.1s}
    .stat:nth-child(4)::after{background:linear-gradient(90deg,var(--purple),var(--pink))}.stat:nth-child(4){animation-delay:.15s}
    .stat-num{font-size:2.2rem;font-weight:800;letter-spacing:-.03em}
    .stat-lbl{font-size:.72rem;color:var(--t2);font-weight:500;margin-top:.1rem}
    .dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem}
    .dash-w{grid-column:span 2}
    .dc{background:var(--card);border:1px solid var(--border);border-radius:var(--rxl);overflow:hidden;animation:fadeUp .4s ease backwards}
    .dc:nth-child(2){animation-delay:.05s}.dc:nth-child(3){animation-delay:.1s}.dc:nth-child(4){animation-delay:.15s}
    .dc-h{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .dc-h h3{font-size:.92rem;font-weight:700;letter-spacing:-.01em}
    .dc-b{padding:1.5rem}

    /* AI Recommend card */
    .ai-rec{background:linear-gradient(135deg,rgba(26,143,196,.08),rgba(155,124,246,.06));border:1px solid rgba(26,143,196,.15);border-radius:var(--rxl);padding:1.5rem;margin-bottom:1.75rem;display:flex;gap:1.25rem;align-items:flex-start;animation:fadeUp .5s ease .1s backwards}
    .ai-rec-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:#fff;flex-shrink:0;animation:glow 2s ease infinite}
    .ai-rec-body{flex:1}
    .ai-rec-body h3{font-size:.95rem;font-weight:700;margin-bottom:.35rem;display:flex;align-items:center;gap:.5rem}
    .ai-rec-body h3 .ai-badge{font-size:.55rem;padding:.2rem .5rem;border-radius:9999px;background:linear-gradient(135deg,var(--pri),var(--purple));color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .ai-rec-body p{font-size:.85rem;color:var(--t2);line-height:1.6}
    .ai-rec-actions{display:flex;gap:.5rem;margin-top:.75rem}

    /* Pulse */
    .pulse-wrap{display:flex;align-items:center;gap:2rem}
    .pulse-ring{position:relative;width:120px;height:120px;flex-shrink:0}
    .pulse-ring svg{transform:rotate(-90deg)}
    .pulse-sc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .pulse-sc .n{font-size:2rem;font-weight:800;letter-spacing:-.03em}
    .pulse-sc .l{font-size:.6rem;color:var(--t3);font-weight:600}
    .pulse-items{flex:1;display:flex;flex-direction:column;gap:.35rem}
    .pulse-it{display:flex;justify-content:space-between;padding:.35rem 0;font-size:.78rem;font-weight:500}

    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
    .qcard{background:var(--elev);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem;cursor:pointer;transition:all .25s;display:flex;align-items:flex-start;gap:.8rem}
    .qcard:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 16px rgba(26,143,196,.08)}
    .qi{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .qt h4{font-size:.82rem;font-weight:700;margin-bottom:.15rem;letter-spacing:-.01em}
    .qt p{font-size:.7rem;color:var(--t3);font-weight:500}

    .act-it{display:flex;gap:.75rem;padding:.55rem 0;border-bottom:1px solid var(--border)}
    .act-it:last-child{border:none}
    .act-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}

    /* ─── BRIEF ─── */
    .brief-wrap{max-width:920px;margin:0 auto}
    .bcard{background:var(--card);border:1px solid var(--border);border-radius:var(--rxl);overflow:hidden;margin-bottom:1.5rem}
    .bcard-h{padding:1.4rem 1.75rem;border-bottom:1px solid var(--border)}
    .bcard-h h3{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}
    .bcard-h p{font-size:.82rem;color:var(--t2);margin-top:.2rem;font-weight:500}
    .bcard-b{padding:1.75rem}
    .res-sec{margin-top:1.75rem;padding-top:1.5rem;border-top:1px solid var(--border)}
    .res-sec h4{font-size:.92rem;font-weight:700;margin-bottom:.25rem}
    .res-sec>p{font-size:.8rem;color:var(--t2);margin-bottom:1rem;font-weight:500}
    .res-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
    .res-tab{padding:.5rem 1rem;border-radius:9999px;font-size:.8rem;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);font-family:var(--font);font-weight:600;transition:all .2s}
    .res-tab.act{background:linear-gradient(135deg,var(--pri),var(--pri-l));border-color:transparent;color:#fff}
    .res-per{background:var(--elev);border:1px solid var(--border);border-radius:var(--r);padding:.875rem;margin-bottom:.55rem;display:flex;gap:.75rem;align-items:center;transition:all .2s}
    .res-per:hover{border-color:var(--border-l)}
    .res-per .nm{font-size:.85rem;font-weight:600}.res-per .sk{font-size:.72rem;color:var(--t3);font-weight:500}
    .res-rm{background:none;border:none;color:var(--t3);cursor:pointer;font-size:1.1rem;transition:color .15s;margin-left:auto}
    .res-rm:hover{color:var(--red)}
    .add-row{display:flex;gap:.5rem;margin-top:.75rem}

    /* AI Response */
    .ai-resp{background:var(--card);border:1px solid rgba(26,143,196,.3);border-radius:var(--rxl);overflow:hidden;margin-bottom:1.5rem;animation:scaleIn .4s ease;box-shadow:0 0 40px rgba(26,143,196,.06)}
    .ai-resp-h{padding:1.1rem 1.5rem;background:linear-gradient(135deg,rgba(26,143,196,.06),rgba(155,124,246,.04));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem}
    .ai-resp-h h4{font-size:.9rem;font-weight:700}.ai-resp-h p{font-size:.7rem;color:var(--t2);font-weight:500}
    .ai-resp-b{padding:1.75rem}
    .ai-resp-b h4{font-size:.95rem;font-weight:700;margin-bottom:.75rem;letter-spacing:-.01em}
    .ai-resp-b>p{color:var(--t2);line-height:1.7;margin-bottom:1rem;font-size:.9rem;font-weight:500}
    .prelim{background:linear-gradient(135deg,rgba(245,197,66,.06),rgba(240,154,82,.04));border:1px solid rgba(245,197,66,.15);border-radius:var(--r);padding:1rem 1.15rem;margin-bottom:1.25rem;display:flex;gap:.75rem;align-items:flex-start}
    .prelim .ic{font-size:1.1rem;flex-shrink:0}.prelim .tx{font-size:.85rem;color:var(--yellow);line-height:1.55;font-weight:500}
    .proposal{background:var(--elev);border-radius:var(--rl);padding:1.25rem;margin-bottom:.75rem;border-left:3px solid var(--pri);transition:all .2s;position:relative}
    .proposal:hover{border-left-color:var(--pri-l);background:rgba(22,27,39,.9)}
    .proposal h5{font-size:.85rem;font-weight:700;margin-bottom:.35rem;color:var(--pri-l);display:flex;justify-content:space-between;letter-spacing:-.01em}
    .proposal>p{font-size:.85rem;color:var(--t2);margin:0;font-weight:500}

// ══════ FILE READING ══════
const readFileAsText=async(file)=>{
  if(file.name.endsWith('.txt')||file.name.endsWith('.md')){
    return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file)})
  }
  if(file.name.endsWith('.pdf')&&window.pdfjsLib){
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const data=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(new Uint8Array(e.target.result));r.onerror=rej;r.readAsArrayBuffer(file)});
    const pdf=await window.pdfjsLib.getDocument({data}).promise;
    let text='';for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const content=await page.getTextContent();text+=content.items.map(x=>x.str).join(' ')+'\n'}
    return text
  }
  return null
};

// ══════ SMART STRATEGY PARSER ══════
const parseStrategyText=(text)=>{
  // Split into paragraphs (not just lines) for better context
  const paras=text.split(/\n{2,}|\r\n{2,}/).map(p=>p.replace(/\s+/g,' ').trim()).filter(p=>p.length>10);
  // Also collect individual sentences
  const sentences=text.split(/[.!?]\s+/).map(s=>s.trim()).filter(s=>s.length>8&&s.length<200);
  const goals=[];const auds=[];const vals=[];const tones=[];const excerpts={goals:[],auds:[],vals:[],tone:[]};

  // Goal patterns — look for numbers + context
  const numPat=/(\d[\d\s,.]*)\s*(prosentti|%|€|euroa|kpl|hlö|henki|kavij|kerta|vuosi|kk|kuukau|visitor|euro|increase|target|user|member|subscriber|follower)/gi;
  const goalContext=/tavoite|paämäärä|kasv|saavut|mittari|KPI|tavoittee|pyri|goal|target|objective|increase|achieve|metric|reach|grow/i;
  // Audience patterns
  const audContext=/kohde|kohderyhmä|yleisö|asiakas|segmentt|ikäryhmä|ikäluok|perhe|nuor|aikuis|ammattilai|kuluttaj|audience|target.?group|customer|segment|demographic|persona|user.?group/i;
  // Value patterns
  const valContext=/arvo|brändi|brand|periaate|lupauk|ydin|arvomme|brändiarvo|missi|visi|value|principle|mission|vision|purpose|commitment|pillar/i;
  // Tone patterns
  const toneContext=/sävy|tyyli|ääni|viestinnän|tone|voice|style|manner|communication.?style/i;
  const toneAdj=/innostav|asiallinen|läpinäkyvä|iloinen|lämmin|rohkea|ammattimai|leikkis|rauhallinen|virallinen|helposti|rento|inspiring|professional|friendly|warm|bold|playful|calm|formal|approachable|casual|energetic|trustworthy|authentic/gi;

  // Process paragraphs for context-aware extraction
  paras.forEach(p=>{const lo=p.toLowerCase();
    // Goals: paragraphs with numbers and goal-related words
    if(goalContext.test(lo)){
      const nums=[...p.matchAll(numPat)];
      if(nums.length){nums.forEach(nm=>{
        // Get the sentence containing this number
        const idx=p.indexOf(nm[0]);const start=Math.max(0,p.lastIndexOf('.',idx-1)+1);const end=Math.min(p.length,p.indexOf('.',idx+1));
        const sent=p.slice(start,end>start?end:undefined).trim();
        if(sent.length>5)goals.push({m:nm[1].trim()+' '+nm[2],t:sent.slice(0,60).replace(/[.:;,]+$/,''),d:'',p:0,excerpt:p.slice(0,120)})
      })} else {
        // Goal paragraph without numbers
        const sents=p.split(/[.!?]+/).filter(s=>goalContext.test(s.toLowerCase())&&s.trim().length>10);
        sents.slice(0,2).forEach(s=>goals.push({m:'\u2014',t:s.trim().slice(0,60).replace(/[.:;,]+$/,''),d:'',p:0,excerpt:p.slice(0,120)}))
      }
      excerpts.goals.push(p.slice(0,150));
    }
    // Audiences
    if(audContext.test(lo)){
      const sents=p.split(/[.!?]+/).filter(s=>s.trim().length>10);
      sents.forEach(s=>{const st=s.trim();if(audContext.test(st.toLowerCase())&&st.length>10){
        auds.push({n:st.slice(0,40).replace(/[.:;,]+$/,''),d:st.slice(0,80),c:['Some'],excerpt:p.slice(0,120)})
      }});excerpts.auds.push(p.slice(0,150));
    }
    // Values
    if(valContext.test(lo)){
      const sents=p.split(/[.!?:•\-–]+/).filter(s=>s.trim().length>3&&s.trim().length<80);
      sents.forEach(s=>{const st=s.trim();if(st.length>3&&valContext.test(lo)){
        vals.push({i:st[0]?.toUpperCase()||'*',t:st.slice(0,35).replace(/[.:;,]+$/,''),d:st.slice(0,60),excerpt:p.slice(0,120)})
      }});excerpts.vals.push(p.slice(0,150));
    }
    // Tones
    if(toneContext.test(lo)||toneAdj.test(lo)){
      const matches=[...p.matchAll(toneAdj)];
      matches.forEach(m=>{const w=m[0];if(w.length>3)tones.push(w.charAt(0).toUpperCase()+w.slice(1))});
      if(matches.length)excerpts.tone.push(p.slice(0,150));
    }
  });

  // Deduplicate
  const uniqGoals=goals.filter((g,i,a)=>a.findIndex(x=>x.t===g.t)===i).slice(0,6);
  const uniqAuds=auds.filter((a,i,arr)=>arr.findIndex(x=>x.n===a.n)===i).slice(0,6);
  const uniqVals=vals.filter((v,i,a)=>a.findIndex(x=>x.t===v.t)===i).slice(0,5);
  const uniqTones=[...new Set(tones)].slice(0,8);

  return{goals:uniqGoals,auds:uniqAuds,vals:uniqVals,tone:uniqTones,excerpts,rawLength:text.length,paraCount:paras.length}
};

const genBrief=(text,budget,res,org)=>{const l=text.toLowerCase(),b=parseInt(budget)||0,ppl=res.filter(r=>r.ty==='person'),low=b>0&&b<500;
  const gNames=org.goals.map(g=>g.t);const g1=gNames[0]||'Paatavoite';const g2=gNames[1]||'Tavoittavuus';
  let r={sum:'',props:[],time:'',goals:[],warn:''};

  } else {
    r.sum=`${org.vals.length?'Brandiarvojenne tulee nakya toteutuksessa.':'Analysoin tarpeenne.'}${ppl.length?' Tiimillanne on osaamista joka kannattaa hyodyntaa.':''}`;r.goals=[g2];
    r.props=[{t:'Viestintasuunnitelma',d:'Raataloity tavoitteiden pohjalta.',b:Math.round(b*.3)+'\u20ac',g:g2,pp:ppl[0]?[ppl[0].n]:[],mo:Math.round(b*.3)},{t:'Sisaltotuotanto',d:'Graafinen suunnittelu, tekstit.',b:Math.round(b*.5)+'\u20ac',g:g1,pp:ppl.map(p=>p.n),mo:Math.round(b*.5)},{t:'Kampanjan hallinta',d:'Ajastus ja raportointi.',b:Math.round(b*.2)+'\u20ac',g:g2,pp:[],mo:Math.round(b*.2)}];
    r.time='Sovitaan yhdessa';}return r;};

const genChat=(q,org)=>{const l=q.toLowerCase();const nm=org.s||org.name||'Organisaatio';

  const toggleCh=(ch)=>setSelChs(p=>p.find(c=>c.name===ch.name)?p.filter(c=>c.name!==ch.name):[...p,ch]);
  const isChSel=(name)=>selChs.some(c=>c.name===name);
  const[showExtra,setShowExtra]=useState(false);
  const[customName,setCustomName]=useState('');const[customColor,setCustomColor]=useState('#9b7cf6');
  const addCustomCh=()=>{if(customName.trim()&&!isChSel(customName)){setSelChs(p=>[...p,{name:customName,color:customColor,ic:'📢'}]);setCustomName('')}};
  const selChannels=selChs.map(c=>c.name);

  const addGoal=()=>{if(gt.trim()){setGoals(p=>[...p,{m:gm||'—',t:gt,d:gd,p:0}]);setGm('');setGt('');setGd('')}};
  const addAud=()=>{if(an.trim()){setAuds(p=>[...p,{n:an,d:ad,c:selChannels.length?selChannels:['Some']}]);setAn('');setAd('')}};
  const addVal=()=>{if(vt.trim()){setVals(p=>[...p,{i:vi||vt[0]?.toUpperCase()||'*',t:vt,d:vd}]);setVi('');setVt('');setVd('')}};
  const addTone=()=>{if(toneInput.trim()&&!tones.includes(toneInput.trim())){setTones(p=>[...p,toneInput.trim()]);setToneInput('')}};

  const parseStrategy=(text)=>{
    // Simulated AI parsing of free-form strategy text
    const lines=text.split(/[\n.!]+/).map(l=>l.trim()).filter(Boolean);
    const pg=[];const pa=[];const pv=[];const pt=[];
    lines.forEach(l=>{const lo=l.toLowerCase();
      if(lo.match(/tavoite|goal|kavij|kasv|myyn|lisä/)){pg.push({m:'—',t:l.slice(0,40),d:'',p:0})}
      else if(lo.match(/kohde|yleiso|asiak|segmen|nuor|perh/)){pa.push({n:l.slice(0,30),d:l.slice(0,60),c:selChannels.length?selChannels:['Some']})}
      else if(lo.match(/arvo|brand|laatu|luotet|yhteis|avoin/)){pv.push({i:l[0]?.toUpperCase()||'*',t:l.slice(0,25),d:l.slice(0,50)})}
      else if(lo.match(/savy|tyyli|tone|innos|asial|lapin|iloi/)){pt.push(l.slice(0,20))}
    });
    return{goals:pg.slice(0,4),auds:pa.slice(0,4),vals:pv.slice(0,3),tone:pt.slice(0,5)};
  };

  const startAI=async()=>{
    setStep(3);
    const hasSt=(sMode==='text'&&sText.trim())||(sMode==='manual'&&(goals.length||auds.length));
    let finalGoals=goals,finalAuds=auds,finalVals=vals,finalTones=tones;
    if(sMode==='text'&&sText.trim()){const parsed=parseStrategy(sText);finalGoals=parsed.goals;finalAuds=parsed.auds;finalVals=parsed.vals;finalTones=parsed.tone}

    await wait(600);setMsgs([{r:'assistant',c:`Hienoa! Analysoin nyt ${name||'organisaationne'} tietoja${hasSt?' ja strategiaa':''}.`}]);
    setTyping(true);await wait(1800);setTyping(false);

    let summary=`Tassa on yhteenvetoni:\n\n`;
    summary+=`Organisaatio: ${name||'(ei nimetty)'}${slogan?' — "'+slogan+'"':''}\n`;
    summary+=`Kanavat: ${selChannels.length?selChannels.join(', '):'ei valittu'}\n`;
    if(finalGoals.length)summary+=`\nTavoitteet (${finalGoals.length}):\n${finalGoals.map(g=>'\u2022 '+g.t+(g.m&&g.m!=='—'?' ('+g.m+')':'')).join('\n')}`;
    if(finalAuds.length)summary+=`\n\nKohderyhmat (${finalAuds.length}):\n${finalAuds.map(a=>'\u2022 '+a.n+(a.d?': '+a.d:'')).join('\n')}`;
    if(finalVals.length)summary+=`\n\nArvot: ${finalVals.map(v=>v.t).join(', ')}`;
    if(finalTones.length)summary+=`\nSavyt: ${finalTones.join(', ')}`;
    if(!hasSt)summary+=`\n\nStrategiaa ei viela syotetty. Voit lisata sen myohemmin Strategia-sivulta.`;
    summary+=`\n\nOnko tama oikein?`;

    setMsgs(p=>[...p,{r:'assistant',c:summary,opts:['Kylla, oikein!','Haluan tarkentaa myohemmin']}]);

    // Save org data — channels as objects with name+color
    setOrg({name:name||'',s:shortName||'',slogan:slogan||'',goals:finalGoals,vals:finalVals,auds:finalAuds,tone:finalTones,channels:selChs});
  };

  const clickOpt=async o=>{setMsgs(p=>[...p,{r:'user',c:o}]);setTyping(true);await wait(1000);setTyping(false);
    if(!done){setMsgs(p=>[...p,{r:'assistant',c:'Loistavaa! Voit aina tarkentaa naita Strategia-sivulta.\n\nTervetuloa Momentumiin!',opts:['Aloitetaan \u2192']}]);setDone(true)}
    else onDone()};

  if(step===0)return(
    <div className="onb"><div className="onb-wrap"><div className="onb-logo"><h1>Momentum</h1><p>{t('obWelcome')}</p></div>
    <div className="onb-card"><div className="onb-head"><h2>{t('obLogin')}</h2><p>{t('obStart')}</p></div>
    <div className="onb-body">
      <div className="field"><label>{t('obEmail')}</label><input className="input" placeholder="nimi@yritys.fi"/></div>
      <div className="field"><label>{t('obPassword')}</label><input type="password" className="input" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022"/></div>
      <button className="btn btn-primary btn-lg" style={{width:'100%',marginTop:'.25rem'}} onClick={()=>setStep(1)}>{t('login')}</button>
      <div style={{display:'flex',alignItems:'center',gap:'1rem',margin:'1.25rem 0',color:'var(--t3)',fontSize:'.78rem',fontWeight:500}}><div style={{flex:1,height:1,background:'var(--border)'}}/>{t('obOr')}<div style={{flex:1,height:1,background:'var(--border)'}}/></div>
      <button className="btn btn-secondary" style={{width:'100%'}} onClick={()=>setStep(1)}>
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        {t('obGoogle')}</button>
    </div><div className="onb-foot"><div className="onb-dots"><div className="onb-dot active"/><div className="onb-dot"/><div className="onb-dot"/><div className="onb-dot"/></div><div/></div></div></div></div>);

  if(step===1)return(
    <div className="onb"><div className="onb-wrap"><div className="onb-logo"><h1>Momentum</h1><p>{t('obOrgTitle')}</p></div>
    <div className="onb-card"><div className="onb-head"><h2>{t('obOrgTitle')}</h2><p>{t('obOrgSub')}</p></div>
    <div className="onb-body">
      <div className="field"><label>{t('obOrgName')} *</label><input className="input" placeholder={t('obOrgNamePh')} value={name} onChange={e=>setName(e.target.value)}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
        <div className="field"><label>{t('obShortName')}</label><input className="input" placeholder={t('obShortNamePh')} value={shortName} onChange={e=>setShort(e.target.value)}/></div>
        <div className="field"><label>{t('obSlogan')}</label><input className="input" placeholder={t('obSloganPh')} value={slogan} onChange={e=>setSlogan(e.target.value)}/></div>
      </div>
      <div style={{marginTop:'1rem'}}><label style={{display:'block',fontSize:'.75rem',fontWeight:600,color:'var(--t3)',marginBottom:'.5rem',textTransform:'uppercase',letterSpacing:'.04em'}}>{t('obChannels')}</label>
      <div className="ch-grid">{presetChannels.map(c=>(
        <div key={c.name} className={`ch-card ${isChSel(c.name)?'on':''}`} onClick={()=>toggleCh(c)}>
          <div className="ch-icon" style={{background:c.color+'18',color:c.color}}>{c.ic}</div>
          <div className="ch-info"><h4>{c.name}</h4></div>
          {isChSel(c.name)?<span className="ch-status" style={{background:'rgba(45,212,160,.12)',color:'var(--green)'}}>Valittu</span>
          :<span className="ch-status" style={{background:'var(--elev)',color:'var(--t3)'}}>Valitse</span>}
        </div>))}</div>
      <div style={{marginTop:'1rem'}}><span className="skip" onClick={()=>setShowExtra(!showExtra)}>{showExtra?'Piilota lisäkanavat \u25b2':'+ Lisaa kanavia (uutiskirje, sisainen viestinta...)'}</span></div>
      {showExtra&&<div style={{marginTop:'.75rem'}}>
        <div className="ch-grid" style={{marginBottom:'.75rem'}}>{extraChannels.filter(c=>!isChSel(c.name)).map(c=>(
          <div key={c.name} className="ch-card" onClick={()=>toggleCh(c)}>
            <div className="ch-icon" style={{background:c.color+'18',color:c.color}}>{c.ic}</div>
            <div className="ch-info"><h4>{c.name}</h4></div>
            <span className="ch-status" style={{background:'var(--elev)',color:'var(--t3)'}}>Valitse</span>
          </div>))}</div>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:'.75rem'}}><label style={{display:'block',fontSize:'.72rem',fontWeight:600,color:'var(--t3)',marginBottom:'.35rem',textTransform:'uppercase',letterSpacing:'.04em'}}>Oma kanava</label>
        <div className="add-row"><input className="input" placeholder="Kanavan nimi" value={customName} onChange={e=>setCustomName(e.target.value)} style={{flex:1}}/>
          <div style={{display:'flex',gap:3,alignItems:'center'}}>{colorPalette.slice(0,8).map(co=><div key={co} className={`ch-color-opt ${customColor===co?'sel':''}`} style={{background:co}} onClick={()=>setCustomColor(co)}/>)}</div>
          <button className="btn btn-secondary btn-sm" onClick={addCustomCh} disabled={!customName.trim()}>+</button></div></div>
      </div>}
      {selChs.length>0&&<div style={{marginTop:'.75rem',display:'flex',flexWrap:'wrap',gap:'.3rem'}}>{selChs.map(c=><span key={c.name} style={{display:'inline-flex',alignItems:'center',gap:'.3rem',padding:'.25rem .6rem',borderRadius:9999,fontSize:'.7rem',fontWeight:600,background:c.color+'20',color:c.color,border:`1px solid ${c.color}40`,cursor:'pointer'}} onClick={()=>toggleCh(c)}>{c.ic} {c.name} {'\u00d7'}</span>)}</div>}
      </div>
    </div><div className="onb-foot"><div className="onb-dots"><div className="onb-dot done"/><div className="onb-dot active"/><div className="onb-dot"/><div className="onb-dot"/></div><button className="btn btn-primary" onClick={()=>setStep(2)} disabled={!name.trim()}>Jatka \u2192</button></div></div></div></div>);

  if(step===2)return(
    <div className="onb"><div className="onb-wrap" style={{maxWidth:700}}><div className="onb-logo"><h1>Momentum</h1><p>{t('obStratTitle')}</p></div>
    <div className="onb-card"><div className="onb-head"><h2>{t('obStratTitle')}</h2><p>{t('obStratSub')}</p></div>
    <div className="onb-body" style={{maxHeight:'65vh',overflowY:'auto'}}>
      <div className="strat-opts">
        <div className={`strat-opt ${sMode==='text'?'sel':''}`} onClick={()=>setSMode('text')}><h4>✏️ {t('obFreeText')}</h4><p>{t('obFreeTextSub')}</p></div>
        <div className={`strat-opt ${sMode==='manual'?'sel':''}`} onClick={()=>setSMode('manual')}><h4>📋 {t('obManual')}</h4><p>{t('obManualSub')}</p></div>
        <div className={`strat-opt ${sMode==='upload'?'sel':''}`} onClick={()=>setSMode('upload')}><h4>📄 {t('obUpload')}</h4><p>{t('obUploadSub')}</p></div>
      </div>

      {sMode==='text'&&<div>
        <textarea className="input textarea textarea-lg" placeholder="Kerro organisaatiosi viestintastrategiasta vapaasti. Esim:\n\nTavoitteenamme on kasvattaa kavijamaaraa 4500:een. Kohderyhmamme ovat nuoret aikuiset ja perheet. Brandiarvomme ovat ammattimaisuus ja yhteisollisyys. Viestinnan savy on innoittava ja asiallinen." value={sText} onChange={e=>setSText(e.target.value)}/>
        <div className="tip-box">💡 AI jasentaa tekstistasi tavoitteet, kohderyhmat, arvot ja savyt automaattisesti. Voit tarkentaa myohemmin.</div>
      </div>}

      {sMode==='manual'&&<div>
        <div style={{marginBottom:'1.5rem'}}>
          <h4 style={{fontSize:'.88rem',fontWeight:700,marginBottom:'.5rem'}}>Tavoitteet</h4>
          {goals.map((g,i)=><div key={i} className="res-per"><div style={{flex:1}}><div className="nm">{g.t}</div><div className="sk">{g.m}{g.d?' — '+g.d:''}</div></div><button className="res-rm" onClick={()=>setGoals(p=>p.filter((_,j)=>j!==i))}>\u00d7</button></div>)}
          <div className="add-row"><input className="input" placeholder="Mittari (esim. 4500)" value={gm} onChange={e=>setGm(e.target.value)} style={{flex:.6}}/><input className="input" placeholder="Tavoite *" value={gt} onChange={e=>setGt(e.target.value)} style={{flex:1}}/><input className="input" placeholder="Kuvaus" value={gd} onChange={e=>setGd(e.target.value)} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addGoal} disabled={!gt.trim()}>+</button></div>
        </div>
        <div style={{marginBottom:'1.5rem'}}>
          <h4 style={{fontSize:'.88rem',fontWeight:700,marginBottom:'.5rem'}}>Kohderyhmat</h4>
          {auds.map((a,i)=><div key={i} className="res-per"><div style={{flex:1}}><div className="nm">{a.n}</div><div className="sk">{a.d}</div></div><button className="res-rm" onClick={()=>setAuds(p=>p.filter((_,j)=>j!==i))}>\u00d7</button></div>)}
          <div className="add-row"><input className="input" placeholder="Nimi *" value={an} onChange={e=>setAn(e.target.value)} style={{flex:1}}/><input className="input" placeholder="Kuvaus" value={ad} onChange={e=>setAd(e.target.value)} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addAud} disabled={!an.trim()}>+</button></div>
        </div>
        <div style={{marginBottom:'1.5rem'}}>
          <h4 style={{fontSize:'.88rem',fontWeight:700,marginBottom:'.5rem'}}>Brandiarvot</h4>
          {vals.map((v,i)=><div key={i} className="res-per"><div className="ava" style={{width:32,height:32,fontSize:'.7rem'}}>{v.i}</div><div style={{flex:1}}><div className="nm">{v.t}</div><div className="sk">{v.d}</div></div><button className="res-rm" onClick={()=>setVals(p=>p.filter((_,j)=>j!==i))}>\u00d7</button></div>)}
          <div className="add-row"><input className="input" placeholder="Kirjain" value={vi} onChange={e=>setVi(e.target.value)} style={{flex:.3}}/><input className="input" placeholder="Arvo *" value={vt} onChange={e=>setVt(e.target.value)} style={{flex:1}}/><input className="input" placeholder="Kuvaus" value={vd} onChange={e=>setVd(e.target.value)} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addVal} disabled={!vt.trim()}>+</button></div>
        </div>
        <div>
          <h4 style={{fontSize:'.88rem',fontWeight:700,marginBottom:'.5rem'}}>Viestinnan savyt</h4>
          <div className="tone-list" style={{marginBottom:'.5rem'}}>{tones.map((t,i)=><span key={i} className="tone" style={{cursor:'pointer'}} onClick={()=>setTones(p=>p.filter((_,j)=>j!==i))}>{t} \u00d7</span>)}</div>
          <div className="add-row"><input className="input" placeholder="esim. Innoittava" value={toneInput} onChange={e=>setToneInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&addTone()} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addTone} disabled={!toneInput.trim()}>+</button></div>
        </div>
      </div>}

      {sMode==='upload'&&<div style={{background:'var(--elev)',border:'2px dashed var(--border)',borderRadius:'var(--rl)',padding:'2rem',textAlign:'center',cursor:'pointer'}} onClick={()=>{setSMode('text');toast('Demossa: kayta tekstikenttaa tai tayta kentat','info')}}><p style={{color:'var(--t3)',fontSize:'.82rem',fontWeight:500}}>Raahaa tiedosto tahan tai klikkaa</p></div>}
    </div><div className="onb-foot"><div className="onb-dots"><div className="onb-dot done"/><div className="onb-dot done"/><div className="onb-dot active"/><div className="onb-dot"/></div><div style={{display:'flex',gap:'.75rem',alignItems:'center'}}><span className="skip" onClick={startAI}>Ohita</span><button className="btn btn-primary" onClick={startAI}>Jatka \u2192</button></div></div></div></div></div>);

  // Step 3: AI analysis
  return(
    <div className="onb"><div className="onb-wrap" style={{maxWidth:700}}><div className="onb-logo"><h1>Momentum</h1><p>{t('obAITitle')}</p></div>
    <div className="onb-card"><div className="onb-head"><div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
      <div className="ai-av" style={{width:38,height:38,fontSize:'.8rem',background:'linear-gradient(135deg,var(--pri),var(--purple))',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'#fff'}}>AI</div>
      <div><h2 style={{fontSize:'1.05rem'}}>{t('obAITitle')}</h2><p style={{fontSize:'.75rem',color:'var(--t2)',marginTop:'.1rem',fontWeight:500}}>{t('obAISub')}</p></div></div></div>
    <div className="onb-body" style={{maxHeight:400,overflowY:'auto'}}>
      <div className="ai-dialog">{msgs.map((m,i)=>(
        <div key={i} className={`ai-bub ${m.r}`}><div className="ai-av">{m.r==='assistant'?'AI':'ME'}</div><div>
          <div className="ai-bub-c">{m.c.split('\n').map((l,j)=>l?<p key={j}>{l}</p>:<br key={j}/>)}</div>
          {m.opts&&<div className="ai-opts">{m.opts.map((o,j)=><button key={j} className="ai-opt-btn" onClick={()=>clickOpt(o)}>{o}</button>)}</div>}
        </div></div>))}
        {typing&&<div className="ai-bub assistant"><div className="ai-av">AI</div><div className="ai-bub-c"><div className="typing"><span/><span/><span/></div></div></div>}
        <div ref={ref}/></div>
    </div><div className="onb-foot"><div className="onb-dots"><div className="onb-dot done"/><div className="onb-dot done"/><div className="onb-dot done"/><div className="onb-dot active"/></div>{done&&<button className="btn btn-primary" onClick={onDone}>{t('obGoMomentum')} \u2192</button>}</div></div></div></div>);}

// ══════ DASHBOARD ══════
function Home({go,toast,prj,events,org,t}){
  const hasStrat=org.goals.length>0||org.auds.length>0||org.vals.length>0;
  const hasPrj=prj.length>0;const hasEv=events.length>0;
  const stratParts=[];
  if(org.goals.length)stratParts.push(org.goals.length+' '+t('foundGoals'));
  if(org.auds.length)stratParts.push(org.auds.length+' '+t('foundAuds'));
  if(org.vals.length)stratParts.push(org.vals.length+' '+t('foundVals'));
  if(org.tone.length)stratParts.push(org.tone.length+' '+t('foundTones'));
  if(org.channels.length)stratParts.push(org.channels.length+' '+t('channels').toLowerCase());
  const missingParts=[];
  if(!org.goals.length)missingParts.push(t('goals').toLowerCase());
  if(!org.auds.length)missingParts.push(t('audiences').toLowerCase());
  if(!org.channels.length)missingParts.push(t('channels').toLowerCase());

  // Upcoming events (next 14 days)
  const now=new Date();const upcoming=events.filter(e=>{if(e.month===undefined)return false;const d=new Date(e.year,e.month,e.day);return d>=now&&d<=new Date(now.getTime()+14*86400000)}).slice(0,5);

  const steps=[
    {key:'strat',title:t('step1Title'),desc:t('step1Desc'),icon:'\u25c8',done:hasStrat,action:()=>go('strategy'),color:'var(--purple)'},
    {key:'prj',title:t('step2Title'),desc:t('step2Desc'),icon:'+',done:hasPrj,action:()=>go('brief'),color:'var(--pri-l)'},
    {key:'cal',title:t('step3Title'),desc:t('step3Desc'),icon:'\u25a6',done:hasEv,action:()=>go('calendar'),color:'var(--yellow)'}];

  return(<div className="page-enter" style={{maxWidth:860,margin:'0 auto'}}>
    {/* Hero */}
    <div style={{marginBottom:'2.5rem',animation:'fadeUp .5s ease'}}>
      <h1 style={{fontSize:'2rem',fontWeight:800,letterSpacing:'-.03em',marginBottom:'.5rem'}}>{t('welcomeTo')}{org.name?', '+org.name:''}</h1>
      <p style={{color:'var(--t2)',fontSize:'1rem',lineHeight:1.7,maxWidth:600,fontWeight:500}}>{t('welcomeDesc')}</p>
    </div>

    {/* Get Started steps */}
    <div style={{marginBottom:'2rem'}}>
      <h3 style={{fontSize:'.85rem',fontWeight:700,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'1rem'}}>{t('getStarted')}</h3>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'1rem'}}>
        {steps.map((s,i)=>{const status=s.done?t('stepDone'):i===0||(i>0&&steps[i-1].done)?t('stepNext'):t('stepTodo');
          const isNext=!s.done&&(i===0||(i>0&&steps[i-1].done));
          return<div key={s.key} className="dc" style={{cursor:'pointer',border:isNext?'1px solid var(--pri)':'1px solid var(--border)',animation:`fadeUp .4s ease ${i*.08}s backwards`}} onClick={s.action}>
            <div style={{padding:'1.5rem'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1rem'}}>
                <div style={{width:44,height:44,borderRadius:'var(--r)',background:s.done?'rgba(45,212,160,.1)':'rgba(26,143,196,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',color:s.done?'var(--green)':s.color,fontWeight:800}}>{s.done?'\u2713':s.icon}</div>

        {(()=>{const pp=res.filter(r=>r.ty==='person').length;const mo=resp.props.reduce((s,p)=>s+(p.mo||0),0);const tot=pp*500+mo;if(!tot)return null;const pPct=Math.round(pp*500/tot*100);return<div className="alloc"><div className="alloc-lbl"><span>{t('resourceAlloc')}</span></div><div className="alloc-track">{pPct>0&&<div className="alloc-seg" style={{width:pPct+'%',background:'linear-gradient(90deg,var(--pri),var(--pri-l))'}}/>}{(100-pPct)>0&&<div className="alloc-seg" style={{width:(100-pPct)+'%',background:'linear-gradient(90deg,var(--yellow),var(--orange))'}}/>}</div><div className="alloc-leg">{pPct>0&&<div className="alloc-leg-it"><div className="alloc-leg-dot" style={{background:'var(--pri-l)'}}/>{t('ownWork')} ({pPct}%)</div>}{(100-pPct)>0&&<div className="alloc-leg-it"><div className="alloc-leg-dot" style={{background:'var(--yellow)'}}/>{t('purchasedServices')} ({100-pPct}%)</div>}</div></div>})()}

function Pipeline({prj,setPrj,toast,t}){

// ══════ CALENDAR ══════
function Cal({toast,events,setEvents,org,t}){
  const[year,setYear]=useState(new Date().getFullYear());const[month,setMonth]=useState(new Date().getMonth());
  const[view,setView]=useState('month');
  const[filter,setFilter]=useState('all');const[modal,setModal]=useState(null);const[hover,setHover]=useState(null);
  const months=t('months');const monthsShort=t('monthsShort');const ds=t('days');
  const today=new Date();
  const chList=org.channels.length?org.channels:[{name:'Muu',color:'#8b95a8',ic:'📌'}];
  const getColor=(chName)=>{const ch=chList.find(c=>c.name===chName);return ch?ch.color:'#8b95a8'};
  const defaultCh=chList[0]?.name||'Muu';

  // Events for a given month/year, optionally filtered
  const getMonthEvents=(m,y)=>{let evs=events.filter(e=>(e.month===undefined&&m===3&&y===2025)||(e.month===m&&e.year===y));if(filter!=='all')evs=evs.filter(e=>e.ch===filter);return evs};
  const getYearEvents=(y)=>events.filter(e=>(e.year===y)||(e.month===undefined&&y===2025));
  const monthEvents=getMonthEvents(month,year);

  // Month grid
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const prevDays=new Date(year,month,0).getDate();
  const cs=[];
  for(let i=firstDay-1;i>=0;i--)cs.push({n:prevDays-i,o:true});
  for(let d=1;d<=daysInMonth;d++)cs.push({n:d,o:false,tod:today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d});
  const rm=7-cs.length%7;if(rm<7)for(let i=1;i<=rm;i++)cs.push({n:i,o:true});

  const prev=()=>{if(view==='year')setYear(y=>y-1);else if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)};
  const next=()=>{if(view==='year')setYear(y=>y+1);else if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)};
  const goMonth=(m)=>{setMonth(m);setView('month')};

  const openNew=(day)=>setModal({t:'',ch:defaultCh,day,month,year});
  const saveEv=()=>{if(!modal.t.trim())return;setEvents(p=>[...p,{day:modal.day,month:modal.month,year:modal.year,t:modal.t,co:getColor(modal.ch),ch:modal.ch}]);toast('Julkaisu lisatty!','success');setModal(null)};
  const delEv=(idx)=>{setEvents(p=>p.filter((_,i)=>i!==idx));toast('Poistettu','info')};

  // ── YEAR CLOCK (SVG) ──
  const YearClock=()=>{
    const cx=140,cy=140,outerR=130,innerR=50;const yearEvs=getYearEvents(year);
    const chNames=[...new Set(yearEvs.map(e=>e.ch))];if(!chNames.length&&!chList.length)return null;
    const usedChs=chList.filter(c=>chNames.includes(c.name));if(!usedChs.length&&chNames.length)usedChs.push({name:chNames[0],color:'#8b95a8'});
    const bandW=usedChs.length?(outerR-innerR)/Math.max(usedChs.length,1):outerR-innerR;
    const sectorAngle=Math.PI*2/12;

    const polarToCart=(cx,cy,r,angle)=>({x:cx+r*Math.cos(angle-Math.PI/2),y:cy+r*Math.sin(angle-Math.PI/2)});
    const arcPath=(cx,cy,r1,r2,a1,a2)=>{const s1=polarToCart(cx,cy,r1,a1),e1=polarToCart(cx,cy,r1,a2),s2=polarToCart(cx,cy,r2,a2),e2=polarToCart(cx,cy,r2,a1);const large=a2-a1>Math.PI?1:0;return`M${s1.x},${s1.y} A${r1},${r1} 0 ${large} 1 ${e1.x},${e1.y} L${s2.x},${s2.y} A${r2},${r2} 0 ${large} 0 ${e2.x},${e2.y} Z`};

    return(<div className="clock-wrap"><div style={{position:'relative'}}>
      <svg width={cx*2} height={cy*2} viewBox={`0 0 ${cx*2} ${cy*2}`}>
        {/* Grid lines */}
        {Array.from({length:12}).map((_,mi)=>{const a=mi*sectorAngle;const p1=polarToCart(cx,cy,innerR-2,a);const p2=polarToCart(cx,cy,outerR+2,a);
          return<line key={mi} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="var(--border)" strokeWidth="0.5"/>})}
        {/* Sectors per channel */}
        {Array.from({length:12}).map((_,mi)=>{const a1=mi*sectorAngle+0.02;const a2=(mi+1)*sectorAngle-0.02;
          const mEvs=yearEvs.filter(e=>(e.month===mi)||(e.month===undefined&&mi===3));
          return usedChs.map((ch,ci)=>{const count=mEvs.filter(e=>e.ch===ch.name).length;if(!count)return null;
            const r1=innerR+ci*bandW;const r2=Math.min(r1+bandW*Math.min(count,5)/5,outerR);
            return<path key={`${mi}-${ci}`} d={arcPath(cx,cy,r1+1,r2,a1,a2)} fill={ch.color} opacity={0.7}
              style={{cursor:'pointer',transition:'opacity .15s'}}
              onMouseEnter={()=>setHover({m:mi,ch:ch.name,count})} onMouseLeave={()=>setHover(null)}
              onClick={()=>goMonth(mi)}/>})
        })}
        {/* Month labels */}
        {Array.from({length:12}).map((_,mi)=>{const a=mi*sectorAngle+sectorAngle/2;const p=polarToCart(cx,cy,outerR+14,a);
          return<text key={mi} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
            style={{fontSize:'.55rem',fill:'var(--t3)',fontWeight:600,fontFamily:'var(--font)',cursor:'pointer'}} onClick={()=>goMonth(mi)}>{monthsShort[mi]}</text>})}
        {/* Center */}
        <circle cx={cx} cy={cy} r={innerR-2} fill="var(--card)"/>
        <text x={cx} y={cy-8} textAnchor="middle" style={{fontSize:'1.4rem',fill:'var(--t1)',fontWeight:800,fontFamily:'var(--font)'}}>{year}</text>
        <text x={cx} y={cy+12} textAnchor="middle" style={{fontSize:'.6rem',fill:'var(--t3)',fontWeight:600,fontFamily:'var(--font)'}}>{yearEvs.length} julkaisua</text>
      </svg>
      {hover&&<div className="clock-hover" style={{top:60,left:cx+30}}><strong>{monthsShort[hover.m]}</strong>: {hover.count} {hover.ch}</div>}
    </div>
    <div className="clock-legend">{chList.map((c,i)=><div key={i} className="clock-leg-item"><div className="clock-leg-dot" style={{background:c.color}}/>{c.name}</div>)}
      <div style={{marginTop:'.75rem',fontSize:'.68rem',color:'var(--t3)',fontWeight:500}}>{t('clickMonthToOpen')}</div>
    </div></div>)};

  // ── CHANNEL FILTERS ──
  const FilterBar=()=><div className="cal-filters">
    <button className={`cal-ch-btn ${filter==='all'?'act':''}`} style={filter==='all'?{background:'var(--pri)',borderColor:'var(--pri)',color:'#fff'}:{}} onClick={()=>setFilter('all')}>{t('all')}</button>
    {chList.map(c=><button key={c.name} className={`cal-ch-btn ${filter===c.name?'act':''}`}
      style={filter===c.name?{background:c.color,borderColor:c.color,color:'#fff'}:{borderColor:c.color+'40',color:c.color}} onClick={()=>setFilter(filter===c.name?'all':c.name)}>{c.name}</button>)}
  </div>;

  return(<div className="page-enter">
    <div className="cal-h"><h2>{view==='month'?months[month]+' '+year:year}</h2>
      <div style={{display:'flex',gap:'.75rem',alignItems:'center'}}>

// ══════ STRATEGY ══════
function Strat({toast,org,setOrg,t}){
  const[exp,sE]=useState(['goals','brand','aud','tone','channels','upload']);
  const fileRef=useRef(null);const[uploading,setUploading]=useState(false);
  const[parseResults,setParseResults]=useState(null);const[selParsed,setSelParsed]=useState({});

  const handleFile=async(file)=>{setUploading(true);try{
    const text=await readFileAsText(file);
    if(!text){toast('Tiedostotyyppia ei tueta','info');setUploading(false);return}
    setOrg(p=>({...p,strategyText:text,strategyFileName:file.name}));
    await wait(1500);// simulate analysis
    const parsed=parseStrategyText(text);
    if(parsed.goals.length||parsed.auds.length||parsed.vals.length||parsed.tone.length){
      setParseResults(parsed);
      // pre-select all
      const sel={};parsed.goals.forEach((_,i)=>sel['goals'+i]=true);parsed.auds.forEach((_,i)=>sel['auds'+i]=true);
      parsed.vals.forEach((_,i)=>sel['vals'+i]=true);parsed.tone.forEach((_,i)=>sel['tone'+i]=true);
      setSelParsed(sel);toast(t('documentLoaded'),'success')
    } else {setOrg(p=>({...p,strategyText:text,strategyFileName:file.name}));toast(t('documentLoaded'),'success')}
  }catch(e){toast('Virhe: '+e.message,'info')}setUploading(false)};

  const applyParsed=()=>{if(!parseResults)return;
    const newGoals=parseResults.goals.filter((_,i)=>selParsed['goals'+i]);
    const newAuds=parseResults.auds.filter((_,i)=>selParsed['auds'+i]);
    const newVals=parseResults.vals.filter((_,i)=>selParsed['vals'+i]);
    const newTones=parseResults.tone.filter((_,i)=>selParsed['tone'+i]);
    setOrg(p=>({...p,goals:[...p.goals,...newGoals],auds:[...p.auds,...newAuds],vals:[...p.vals,...newVals],tone:[...new Set([...p.tone,...newTones])]}));
    setParseResults(null);setSelParsed({});toast(t('added'),'success')};
  const[modal,setM]=useState(null); // null | 'goal' | 'aud' | 'val' | 'tone'
  const[editIdx,setEditIdx]=useState(-1); // -1 = new
  // edit fields
  const[fm,setFm]=useState('');const[ft,setFt]=useState('');const[fd,setFd]=useState('');const[fi,setFi]=useState('');const[fc,setFc]=useState([]);
  const[toneInput,setTI]=useState('');
  const tog=s=>sE(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  const openAdd=(type)=>{setM(type);setEditIdx(-1);setFm('');setFt('');setFd('');setFi('');setFc([])};
  const openEdit=(type,idx)=>{setM(type);setEditIdx(idx);
    if(type==='goal'){const g=org.goals[idx];setFm(g.m);setFt(g.t);setFd(g.d||'')}
    else if(type==='aud'){const a=org.auds[idx];setFt(a.n);setFd(a.d||'');setFc(a.c||[])}
    else if(type==='val'){const v=org.vals[idx];setFi(v.i);setFt(v.t);setFd(v.d||'')}};

  const saveItem=()=>{if(!ft.trim())return;
    if(modal==='goal'){const item={m:fm||'\u2014',t:ft,d:fd,p:0};
      setOrg(p=>({...p,goals:editIdx===-1?[...p.goals,item]:p.goals.map((g,i)=>i===editIdx?item:g)}))}
    else if(modal==='aud'){const item={n:ft,d:fd,c:fc.length?fc:['Some']};
      setOrg(p=>({...p,auds:editIdx===-1?[...p.auds,item]:p.auds.map((a,i)=>i===editIdx?item:a)}))}
    else if(modal==='val'){const item={i:fi||ft[0]?.toUpperCase()||'*',t:ft,d:fd};
      setOrg(p=>({...p,vals:editIdx===-1?[...p.vals,item]:p.vals.map((v,i)=>i===editIdx?item:v)}))}
    setM(null);toast(editIdx===-1?'Lisatty!':'Paivitetty!','success')};

  const delItem=(type,idx)=>{
    if(type==='goal')setOrg(p=>({...p,goals:p.goals.filter((_,i)=>i!==idx)}));
    else if(type==='aud')setOrg(p=>({...p,auds:p.auds.filter((_,i)=>i!==idx)}));
    else if(type==='val')setOrg(p=>({...p,vals:p.vals.filter((_,i)=>i!==idx)}));

  const addTone=()=>{if(toneInput.trim()&&!org.tone.includes(toneInput.trim())){setOrg(p=>({...p,tone:[...p.tone,toneInput.trim()]}));setTI('')}};
  const rmTone=(idx)=>setOrg(p=>({...p,tone:p.tone.filter((_,i)=>i!==idx)}));

  const rmCh=(name)=>setOrg(p=>({...p,channels:p.channels.filter(c=>c.name!==name)}));

  const modalTitle={goal:editIdx===-1?t('addGoal'):t('editGoal'),aud:editIdx===-1?t('addAudience'):t('editAudience'),val:editIdx===-1?t('addValue'):t('editValue')};

  const stratItems=[
    {k:'goals',l:t('goals'),n:org.goals.length,c:'var(--green)',sec:'goals'},
    {k:'auds',l:t('audiences'),n:org.auds.length,c:'var(--pri-l)',sec:'aud'},
    {k:'vals',l:t('brandValues'),n:org.vals.length,c:'var(--purple)',sec:'brand'},

  return(<div className="page-enter"><div className="strat-lay"><div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>

      {/* Inline completeness */}
      <div style={{marginTop:'1rem',display:'flex',gap:'.5rem',flexWrap:'wrap'}}>{stratItems.map(s=><span key={s.k} onClick={()=>{if(!exp.includes(s.sec))sE(p=>[...p,s.sec])}} style={{padding:'.3rem .7rem',borderRadius:9999,fontSize:'.68rem',fontWeight:700,cursor:'pointer',background:s.n>0?s.c+'18':'rgba(255,255,255,.08)',color:s.n>0?s.c:'rgba(255,255,255,.4)',border:`1px solid ${s.n>0?s.c+'30':'rgba(255,255,255,.08)'}`}}>{s.n>0?'\u2713':'\u25cb'} {s.l} {s.n>0?`(${s.n})`:''}</span>)}</div>
    </div>

    {/* PDF Upload */}
    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('upload')}><h3>{t('uploadStrategy')}</h3><span style={{color:'var(--t3)'}}>{exp.includes('upload')?'\u2212':'+'}</span></div>{exp.includes('upload')&&<div className="strat-sec-b">
      <p style={{fontSize:'.82rem',color:'var(--t2)',marginBottom:'.75rem',fontWeight:500}}>{t('uploadStrategyDesc')}</p>
      {org.strategyText?<div style={{background:'rgba(45,212,160,.06)',border:'1px solid rgba(45,212,160,.2)',borderRadius:'var(--r)',padding:'.875rem',marginBottom:'.75rem',display:'flex',alignItems:'center',gap:'.75rem'}}>
        <span style={{color:'var(--green)',fontSize:'1.1rem'}}>{'\u2713'}</span>
        <div style={{flex:1}}><div style={{fontSize:'.82rem',fontWeight:600,color:'var(--green)'}}>{t('documentLoaded')}{org.strategyFileName?' — '+org.strategyFileName:''}</div><div style={{fontSize:'.7rem',color:'var(--t3)',fontWeight:500}}>{org.strategyText.length} chars</div></div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setOrg(p=>({...p,strategyText:'',strategyFileName:''}))}>{'\u00d7'}</button>
      </div>:null}
      <div style={{background:'var(--elev)',border:'2px dashed var(--border)',borderRadius:'var(--rl)',padding:'2rem',textAlign:'center',cursor:'pointer',transition:'all .2s',position:'relative'}} onClick={()=>fileRef.current?.click()}
        onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--pri)'}} onDragLeave={e=>{e.currentTarget.style.borderColor='var(--border)'}}
        onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--border)';const f=e.dataTransfer.files[0];if(f)handleFile(f)}}>
        {uploading?<div className="typing"><span/><span/><span/></div>
        :<><p style={{color:'var(--t2)',fontSize:'.85rem',fontWeight:500,marginBottom:'.25rem'}}>{t('dragOrClick')}</p><p style={{color:'var(--t3)',fontSize:'.7rem',fontWeight:500}}>{t('supportedFormats')}</p></>}
        <input ref={fileRef} type="file" accept=".pdf,.txt,.md" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f)handleFile(f);e.target.value=''}}/>
      </div>
      {/* Guided strategy review after upload */}
      {parseResults&&<div style={{marginTop:'1rem',animation:'scaleIn .3s ease'}}>
        <div style={{background:'linear-gradient(135deg,rgba(26,143,196,.06),rgba(155,124,246,.04))',border:'1px solid rgba(26,143,196,.2)',borderRadius:'var(--rl)',overflow:'hidden'}}>
          <div style={{padding:'1rem 1.25rem',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'.75rem'}}>
            <div className="ava" style={{width:32,height:32,fontSize:'.7rem'}}>AI</div>
            <div><h4 style={{fontSize:'.88rem',fontWeight:700}}>{t('aiFound')}</h4>
              <p style={{fontSize:'.7rem',color:'var(--t2)',fontWeight:500}}>{parseResults.paraCount} kappaletta luettu \u2022 {parseResults.rawLength} merkkia</p></div>

            {/* Each category: show what was found + excerpts + add button */}

              {key:'goals',items:parseResults.goals,label:t('goals'),color:'var(--green)',icon:'\ud83c\udfaf',
                render:g=><span>{g.m!=='\u2014'&&<strong>{g.m}</strong>}{g.m!=='\u2014'?' \u2014 ':''}{g.t}</span>},
              {key:'auds',items:parseResults.auds,label:t('audiences'),color:'var(--pri-l)',icon:'\ud83d\udc65',
                render:a=><span><strong>{a.n}</strong>{a.d?' \u2014 '+a.d.slice(0,50):''}</span>},

                render:v=><span><strong>{v.t}</strong>{v.d?' \u2014 '+v.d.slice(0,40):''}</span>},
              {key:'tone',items:parseResults.tone,label:t('tones'),color:'var(--yellow)',icon:'\ud83c\udfa8',

            ].map(cat=><div key={cat.key} style={{marginBottom:'1.25rem',background:'var(--card)',borderRadius:'var(--r)',border:'1px solid var(--border)',overflow:'hidden'}}>

                    <div>{cat.render(item)}{item.excerpt&&<div style={{fontSize:'.68rem',color:'var(--t3)',marginTop:'.2rem',fontStyle:'italic'}}>"{item.excerpt.slice(0,100)}..."</div>}</div>
                  </label>)
                  :<div style={{display:'flex',flexWrap:'wrap',gap:'.3rem'}}>{cat.items.map((tn,i)=><span key={i} onClick={()=>setSelParsed(p=>({...p,[cat.key+i]:!p[cat.key+i]}))} style={{padding:'.3rem .65rem',borderRadius:9999,fontSize:'.72rem',fontWeight:600,cursor:'pointer',background:selParsed[cat.key+i]?cat.color+'18':'var(--elev)',color:selParsed[cat.key+i]?cat.color:'var(--t3)',border:selParsed[cat.key+i]?`1px solid ${cat.color}40`:'1px solid var(--border)'}}>{tn}</span>)}</div>}
                </div>

              </div>
            </div>)}

            {/* Document preview */}
            {org.strategyText&&<details style={{marginTop:'.5rem'}}>
              <summary style={{fontSize:'.75rem',color:'var(--t3)',cursor:'pointer',fontWeight:600}}>Nayta dokumentin teksti</summary>

            </details>}

          <div style={{padding:'.75rem 1.25rem',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.72rem',color:'var(--t2)',fontWeight:500}}>Valitse mitka lisataan strategiaan. Voit taydentaa manuaalisesti myohemmin.</span>
            <div style={{display:'flex',gap:'.5rem'}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>setParseResults(null)}>{t('cancel')}</button>
              <button className="btn btn-primary btn-sm" onClick={applyParsed}>{t('addSelected')}</button>
            </div>
          </div>
        </div>
      </div>}
    </div>}</div>

    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('goals')}><h3>{t('goals')} ({org.goals.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('goals')?'\u2212':'+'}</span></div>{exp.includes('goals')&&<div className="strat-sec-b">
      {org.goals.length>0?<div className="goal-grid">{org.goals.map((g,i)=><div key={i} className="goal" style={{cursor:'pointer',position:'relative'}} onClick={()=>openEdit('goal',i)}><div className="met">{g.m}</div><h4>{g.t}</h4><p>{g.d}</p><button className="res-rm" style={{position:'absolute',top:8,right:8}} onClick={e=>{e.stopPropagation();delItem('goal',i)}}>{'\u00d7'}</button></div>)}</div>

    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('brand')}><h3>{t('brandValues')} ({org.vals.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('brand')?'\u2212':'+'}</span></div>{exp.includes('brand')&&<div className="strat-sec-b">
