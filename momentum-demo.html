        {showChColors===i&&<div style={{position:'absolute',marginTop:'2.5rem',zIndex:5}}><div className="ch-color-picker">{colorPalette.map(co=><div key={co} className={`ch-color-opt ${c.color===co?'sel':''}`} style={{background:co}} onClick={()=>{setChColor(c.name,co);setShowChColors(null)}}/>)}</div></div>}
      </div>)}
      {org.channels.length===0&&<p style={{color:'var(--t3)',fontSize:'.85rem',fontWeight:500}}>Ei viela kanavia.</p>}
      <div style={{marginTop:'.75rem'}}><label style={{display:'block',fontSize:'.72rem',fontWeight:600,color:'var(--t3)',marginBottom:'.35rem',textTransform:'uppercase',letterSpacing:'.04em'}}>Lisaa kanava</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem',marginBottom:'.5rem'}}>{[...presetChannels,...extraChannels].filter(c=>!org.channels.find(x=>x.name===c.name)).slice(0,8).map(c=>
          <span key={c.name} style={{padding:'.3rem .6rem',borderRadius:9999,fontSize:'.7rem',fontWeight:600,background:c.color+'15',color:c.color,border:`1px solid ${c.color}30`,cursor:'pointer'}} onClick={()=>{setOrg(p=>({...p,channels:[...p.channels,c]}));toast(c.name+' lisatty!','success')}}>{c.ic} {c.name}</span>)}</div>
        <div className="add-row"><input className="input" placeholder="Oma kanava" value={newChName} onChange={e=>setNewChName(e.target.value)} style={{flex:1}}/>
          <div style={{display:'flex',gap:3,alignItems:'center'}}>{colorPalette.slice(0,6).map(co=><div key={co} className={`ch-color-opt ${newChColor===co?'sel':''}`} style={{background:co,width:16,height:16}} onClick={()=>setNewChColor(co)}/>)}</div>
          <button className="btn btn-secondary btn-sm" onClick={addCh} disabled={!newChName.trim()}>+</button></div>
      </div>
    </div>}</div>

    <div className="strat-sec"><div className="strat-sec-h" onClick={()=>tog('tone')}><h3>{t('tones')} ({org.tone.length})</h3><span style={{color:'var(--t3)'}}>{exp.includes('tone')?'\u2212':'+'}</span></div>{exp.includes('tone')&&<div className="strat-sec-b">
      <div className="tone-list" style={{marginBottom:'.5rem'}}>{org.tone.map((t,i)=><span key={i} className="tone" style={{cursor:'pointer'}} onClick={()=>rmTone(i)}>{t} {'\u00d7'}</span>)}</div>
      <div className="add-row"><input className="input" placeholder="esim. Innoittava" value={toneInput} onChange={e=>setTI(e.target.value)} onKeyPress={e=>e.key==='Enter'&&addTone()} style={{flex:1}}/><button className="btn btn-secondary btn-sm" onClick={addTone} disabled={!toneInput.trim()}>+ Lisaa</button></div>
    </div>}</div>
  </div><div><Chat toast={toast} org={org} t={t}/></div>

  {modal&&modal!=='tone'&&<div className="modal-ov" onClick={()=>setM(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-h"><h3>{modalTitle[modal]}</h3><button className="modal-x" onClick={()=>setM(null)}>{'\u2715'}</button></div>
    <div className="modal-b">
      {modal==='goal'&&<><div className="field"><label>{t('metric')}</label><input className="input" placeholder={t('metricPh')} value={fm} onChange={e=>setFm(e.target.value)}/></div>
        <div className="field"><label>{t('goalName')} *</label><input className="input" placeholder={t('goalNamePh')} value={ft} onChange={e=>setFt(e.target.value)}/></div>
        <div className="field"><label>{t('description')}</label><input className="input" placeholder={t('descPh')} value={fd} onChange={e=>setFd(e.target.value)}/></div></>}
      {modal==='aud'&&<><div className="field"><label>{t('audienceName')} *</label><input className="input" placeholder={t('audienceNamePh')} value={ft} onChange={e=>setFt(e.target.value)}/></div>
        <div className="field"><label>{t('description')}</label><input className="input" placeholder={t('audienceDescPh')} value={fd} onChange={e=>setFd(e.target.value)}/></div>
        <div className="field"><label>{t('channelsLabel')}</label><div style={{display:'flex',flexWrap:'wrap',gap:'.35rem'}}>{chOpts.map(c=><span key={c} onClick={()=>setFc(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c])} style={{cursor:'pointer',padding:'.35rem .7rem',borderRadius:9999,fontSize:'.75rem',fontWeight:600,background:fc.includes(c)?'rgba(26,143,196,.15)':'var(--elev)',color:fc.includes(c)?'var(--pri-l)':'var(--t3)',border:fc.includes(c)?'1px solid var(--pri)':'1px solid var(--border)'}}>{c}</span>)}</div></div></>}
      {modal==='val'&&<><div style={{display:'grid',gridTemplateColumns:'80px 1fr',gap:'1rem'}}><div className="field"><label>{t('letter')}</label><input className="input" placeholder="A" value={fi} onChange={e=>setFi(e.target.value)} maxLength={2}/></div>
        <div className="field"><label>{t('valueName')} *</label><input className="input" placeholder={t('valueNamePh')} value={ft} onChange={e=>setFt(e.target.value)}/></div></div>
        <div className="field"><label>{t('description')}</label><input className="input" placeholder={t('valueDescPh')} value={fd} onChange={e=>setFd(e.target.value)}/></div></>}
    </div>
    <div className="modal-f"><button className="btn btn-secondary" onClick={()=>setM(null)}>{t('cancel')}</button><button className="btn btn-primary" onClick={saveItem} disabled={!ft.trim()}>{editIdx===-1?t('add'):t('save')}</button></div>
  </div></div>}
  </div></div>);}

// ══════ CHAT ══════
function Chat({toast,org,t}){const nm=org.s||org.name||t('organization');
  const[msgs,setM]=useState([{r:'assistant',c:`Hei! ${org.name?'Tunnen '+nm+' strategian.':'Strategiaa ei ole viela syotetty.'}\n\nKysy tavoitteista, kohderyhmista tai sisaltoideoista!`}]);const[inp,setI]=useState('');const[ty,setTy]=useState(false);const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:'smooth'})},[msgs]);
  const send=async()=>{if(!inp.trim())return;const m=inp.trim();setI('');setM(p=>[...p,{r:'user',c:m}]);setTy(true);await wait(700+Math.random()*500);setTy(false);setM(p=>[...p,{r:'assistant',c:genChat(m,org)}])};
  return(<div className="ai-chat"><div className="ai-chat-h"><div className="ava" style={{width:34,height:34,fontSize:'.72rem'}}>AI</div><div><h3 style={{fontSize:'.85rem',fontWeight:700}}>AI-kumppani</h3><p style={{fontSize:'.65rem',color:'var(--t3)',fontWeight:500}}>Strategiatietoinen</p></div></div>
  <div className="ai-chat-msgs">{msgs.map((m,i)=><div key={i} className={`ai-bub ${m.r}`}><div className="ai-av">{m.r==='assistant'?'AI':'ME'}</div><div className="ai-bub-c">{m.c.split('\n').map((l,j)=>l?<p key={j}>{l}</p>:<br key={j}/>)}</div></div>)}{ty&&<div className="ai-bub assistant"><div className="ai-av">AI</div><div className="ai-bub-c"><div className="typing"><span/><span/><span/></div></div></div>}<div ref={ref}/></div>
  <div className="ai-chat-sugs">{['Tavoitteet?','Kohderyhmat?','Ideoita?','Arvot?','Savyt?'].map((s,i)=><button key={i} className="chat-sug" onClick={()=>setI(s)}>{s}</button>)}</div>
  <div className="ai-chat-in-area"><input className="chat-in" placeholder="Kysy strategiasta..." value={inp} onChange={e=>setI(e.target.value)} onKeyPress={e=>e.key==='Enter'&&send()}/><button className="chat-send" onClick={send} disabled={!inp.trim()}>{'\u2192'}</button></div></div>);}

// ══════ SETTINGS ══════
function Settings({toast,org,setOrg,resetAll,t,lang,setLang}){
  const[confirm,setConfirm]=useState(false);
  const[editName,setEN]=useState(org.name);const[editShort,setES]=useState(org.s);const[editSlogan,setESl]=useState(org.slogan);
  const saveBasic=()=>{setOrg(p=>({...p,name:editName,s:editShort,slogan:editSlogan}));toast(t('updated'),'success')};
  return(<div className="page-enter" style={{maxWidth:700}}>
    <div className="bcard"><div className="bcard-h"><h3>{t('language')}</h3></div><div className="bcard-b">
      <div style={{display:'flex',gap:'.5rem'}}>
        <button className={`btn ${lang==='fi'?'btn-primary':'btn-secondary'}`} onClick={()=>setLang('fi')}>Suomi</button>
        <button className={`btn ${lang==='en'?'btn-primary':'btn-secondary'}`} onClick={()=>setLang('en')}>English</button>
      </div>
    </div></div>
    <div className="bcard"><div className="bcard-h"><h3>{t('orgBasicInfo')}</h3></div><div className="bcard-b">
      <div className="field"><label>{t('obOrgName')}</label><input className="input" value={editName} onChange={e=>setEN(e.target.value)}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
        <div className="field"><label>{t('obShortName')}</label><input className="input" value={editShort} onChange={e=>setES(e.target.value)}/></div>
        <div className="field"><label>{t('obSlogan')}</label><input className="input" value={editSlogan} onChange={e=>setESl(e.target.value)}/></div>
      </div>
      <button className="btn btn-primary" onClick={saveBasic}>{t('save')}</button>
    </div></div>
    <div className="bcard" style={{borderColor:'rgba(239,107,107,.3)'}}><div className="bcard-h"><h3 style={{color:'var(--red)'}}>{t('dangerZone')}</h3></div><div className="bcard-b">
      <p style={{color:'var(--t2)',fontSize:'.88rem',marginBottom:'1rem',fontWeight:500}}>{t('resetWarning')}</p>
      {!confirm?<button className="btn" style={{background:'rgba(239,107,107,.12)',color:'var(--red)',border:'1px solid rgba(239,107,107,.3)'}} onClick={()=>setConfirm(true)}>{t('resetButton')}</button>
      :<div style={{display:'flex',gap:'.75rem',alignItems:'center'}}><span style={{fontSize:'.85rem',color:'var(--red)',fontWeight:600}}>{t('resetConfirm')}</span>
        <button className="btn" style={{background:'var(--red)',color:'#fff'}} onClick={resetAll}>{t('resetYes')}</button>
        <button className="btn btn-ghost" onClick={()=>setConfirm(false)}>{t('cancel')}</button></div>}
    </div></div>
  </div>);}

// ══════ APP ══════
function App(){const{toasts,add}=useToast();const[ob,setOB]=usePersistedState('onboarded',false);const[v,setV]=useState('home');
  const[org,setOrg]=usePersistedState('org',defaultOrg);
  const[prj,setPrj]=usePersistedState('projects',[]);
  const[events,setEvents]=usePersistedState('events',[]);
  const[lang,setLang]=usePersistedState('lang','fi');
  const t=mkT(lang);

  const resetAll=()=>{clearAllData();setOB(false);setOrg(defaultOrg);setPrj([]);setEvents([]);setLang('fi');setV('home')};

  if(!ob)return<><Toasts t={toasts}/><Onboarding onDone={()=>setOB(true)} toast={add} setOrg={setOrg} t={t}/></>;
  const nav=[{id:'home',l:t('home'),ic:'\u25c9'},{id:'strategy',l:t('strategy'),ic:'\u25c8'},{id:'brief',l:t('newProject'),ic:'+',badge:true},{id:'pipeline',l:t('projects'),ic:'\u2630',cnt:prj.length},{id:'calendar',l:t('calendar'),ic:'\u25a6'}];
  const hdr={home:{t:t('home'),s:(org.s||org.name||'Momentum')},brief:{t:t('newProject'),s:'AI'},pipeline:{t:t('projects'),s:prj.length+' '+t('projects').toLowerCase()},calendar:{t:t('calendar'),s:events.length+' '+t('publications_plural')},strategy:{t:t('strategy'),s:org.slogan||t('strategy')},orders:{t:t('orders'),s:t('fromHetki')},settings:{t:t('settings'),s:t('manageOrg')}};
  const h=hdr[v]||hdr.home;
  return(<div className="app"><Toasts t={toasts}/>
    <aside className="side"><div className="side-hd"><div className="logo-text">Momentum</div></div>
      <div className="ws-box" onClick={()=>setV('settings')}><div className="ws-name">{org.name||'Organisaatio'}</div><div className="ws-plan">Free Plan</div></div>
      <nav style={{flex:1,padding:'.5rem 0',overflowY:'auto'}}>
        <div className="nav-sec">{t('tools')}</div>
        {nav.map(n=><div key={n.id} className={`nav-i ${v===n.id?'act':''}`} onClick={()=>setV(n.id)}><span className="nav-ic">{n.ic}</span><span>{n.l}</span>{n.badge&&<span className="badge badge-ai">AI</span>}{n.cnt>0&&<span className="badge badge-c">{n.cnt}</span>}</div>)}
        <div className="nav-sec">{t('hetki')}</div>
        <div className={`nav-i ${v==='orders'?'act':''}`} onClick={()=>setV('orders')}><span className="nav-ic">{'\u2b21'}</span><span>{t('orders')}</span>{prj.filter(p=>p.st==='proposal').length>0&&<span className="badge badge-n">{prj.filter(p=>p.st==='proposal').length}</span>}</div>
        <div className="nav-i" onClick={()=>add('tuki@hetki.fi','info')}><span className="nav-ic">?</span><span>{t('askHelp')}</span></div>
        <div className="nav-sec">{t('system')}</div>
        <div className={`nav-i ${v==='settings'?'act':''}`} onClick={()=>setV('settings')}><span className="nav-ic">{'\u2699'}</span><span>{t('settings')}</span></div>
      </nav>
      <div className="side-ft"><div className="ava">{(org.name||'U')[0]}</div><div><div style={{fontSize:'.8rem',fontWeight:600}}>{org.name||t('user')}</div><div style={{fontSize:'.62rem',color:'var(--t3)',fontWeight:500}}>{t('admin')}</div></div></div>
    </aside>
    <main className="main">
      <header className="topbar"><div><h1>{h.t}</h1><p>{h.s}</p></div>
        {(v==='home'||v==='pipeline')&&<button className="btn btn-primary" onClick={()=>setV('brief')}>+ {t('newProject')}</button>}
      </header>
      <div className="page">
        {v==='home'&&<Home go={setV} toast={add} prj={prj} events={events} org={org} t={t}/>}
        {v==='brief'&&<Brief toast={add} prj={prj} setPrj={setPrj} go={setV} org={org} t={t}/>}
        {v==='pipeline'&&<Pipeline prj={prj} setPrj={setPrj} toast={add} t={t}/>}
        {v==='calendar'&&<Cal toast={add} events={events} setEvents={setEvents} org={org} t={t}/>}
        {v==='strategy'&&<Strat toast={add} org={org} setOrg={setOrg} t={t}/>}
        {v==='settings'&&<Settings toast={add} org={org} setOrg={setOrg} resetAll={resetAll} t={t} lang={lang} setLang={setLang}/>}
        {v==='orders'&&<div className="page-enter">{prj.filter(p=>p.st==='proposal').length>0?prj.filter(p=>p.st==='proposal').map(p=><div key={p.id} className="bcard" style={{marginBottom:'1rem'}}><div className="bcard-b" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><h3 style={{fontSize:'1rem',fontWeight:700,marginBottom:'.25rem'}}>{p.t}</h3><p style={{fontSize:'.85rem',color:'var(--t2)',fontWeight:500}}>{p.d}</p><div style={{marginTop:'.5rem',display:'flex',gap:'.5rem'}}><span className="pipe-tag" style={{background:'rgba(26,143,196,.1)',color:'var(--pri-l)'}}>{p.b}</span><span className="pipe-tag" style={{background:'rgba(245,197,66,.1)',color:'var(--yellow)'}}>{t('waitingQuote')}</span></div></div><span className="cb-st" style={{background:'rgba(245,197,66,.1)',color:'var(--yellow)',padding:'.4rem .8rem',fontSize:'.78rem'}}>{t('processing')}</span></div></div>)
          :<div style={{textAlign:'center',padding:'4rem',color:'var(--t3)'}}><div style={{fontSize:'3rem',marginBottom:'1rem',opacity:.5}}>{'\u2b21'}</div><h3 style={{color:'var(--t2)',marginBottom:'.5rem',fontWeight:700}}>{t('noOrders')}</h3><p style={{fontSize:'.88rem',marginBottom:'1.5rem',fontWeight:500}}>{t('createAndQuote')}</p><button className="btn btn-primary" onClick={()=>setV('brief')}>+ {t('newProject')}</button></div>}</div>}
      </div>
    </main>
  </div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
